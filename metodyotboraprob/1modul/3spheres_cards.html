<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <meta name="google" content="notranslate" />
  <title>Когда среда мстит за ошибку</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;500;600;700&display=swap');

    :root {
      --bg-silk: #f3fbf7;
      --green-accent: #007760;
      --green-gradient: linear-gradient(135deg, #19a86e, #007760);
      --green-border: #19a86e;
      --text-dark: #2c2c2c;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Montserrat', sans-serif;
      background-color: var(--bg-silk);
      margin: 0;
      padding: 8px;
      display: flex;
      justify-content: center;
    }

    #deck-app {
      background: #ffffff;
      border: 1px solid var(--green-border);
      border-radius: 4px;
      padding: 20px 30px 24px 30px;
      width: 100%;
      max-width: 1040px;
      box-shadow: 0 24px 60px rgba(0, 119, 96, 0.18);
    }

    header {
      text-align: center;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(0,119,96,0.12);
      padding-bottom: 8px;
    }

    h2 {
      font-family: 'Playfair Display', serif;
      color: var(--green-accent);
      font-size: 20px;
      margin: 0;
      text-transform: uppercase;
    }

    .deck-subtitle {
      margin-top: 8px;
      font-size: 14px;
      color: var(--text-dark);
    }

    .wa-cardsdeck {
      font-family: 'Montserrat', sans-serif;
      color: var(--text-dark);
    }

    /* барабан */
    .wa-cardsdeck__stack-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 24px;
      gap: 24px;
    }

    .wa-cardsdeck__arrow-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.12);
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      color: #555;
      transition: 0.2s;
      user-select: none;
    }

    .wa-cardsdeck__arrow-btn:hover {
      background: #f3fbf7;
      border-color: var(--green-accent);
      color: var(--green-accent);
    }

    .wa-cardsdeck__stack {
      position: relative;
      width: 360px;
      height: 200px;
      overflow: hidden;
    }

    .wa-cardsdeck__stack-card {
      position: absolute;
      top: 20px;
      left: 0;
      right: 0;
      margin: 0 auto;
      width: 100%;
      height: 160px;
      border-radius: 12px;
      border: 1px solid #e0e0e0;
      background: #ffffff;
      box-shadow: 0 10px 24px rgba(0,0,0,0.06);
      padding: 18px 20px;
      font-size: 14px;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: move;
    }

    .wa-cardsdeck__stack-card.bg-1 {
      transform: translateY(8px) scale(0.98);
      opacity: 0.6;
    }

    .wa-cardsdeck__stack-card.bg-2 {
      transform: translateY(16px) scale(0.96);
      opacity: 0.4;
    }

    .wa-cardsdeck__stack-card.main {
      z-index: 3;
      opacity: 1;
    }

    .wa-cardsdeck__stack-empty {
      width: 360px;
      height: 160px;
      border-radius: 12px;
      border: 1px dashed rgba(0,119,96,0.3);
      background: #f7faf9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #777;
      text-align: center;
    }

    /* усиленный эффект барабана */
    .card-out-up {
      animation: cardOutUp 0.7s forwards;
    }

    .card-in-back {
      animation: cardInBack 0.7s forwards;
    }

    @keyframes cardOutUp {
      0% {
        transform: translateY(0) scale(1) rotate(0deg);
        opacity: 1;
      }
      40% {
        transform: translateY(-40px) scale(1.04) rotate(-3deg);
        opacity: 1;
      }
      100% {
        transform: translateY(24px) scale(0.96) rotate(0deg);
        opacity: 0.7;
      }
    }

    @keyframes cardInBack {
      0% {
        transform: translateY(-60px) scale(1.05) rotate(3deg);
        opacity: 0;
      }
      100% {
        transform: translateY(0) scale(1) rotate(0deg);
        opacity: 1;
      }
    }

    /* колонки */
    .wa-cardsdeck__columns {
      margin-top: 8px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .wa-cardsdeck-column__title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #527a6b;
      margin-bottom: 6px;
      text-align: center;
      font-weight: 600;
    }

    .wa-cardsdeck-column__body {
      min-height: 140px;
      padding: 10px;
      border-radius: 8px;
      background: #f7faf9;
      border: 1px dashed rgba(0,119,96,0.2);
      transition: 0.2s;
    }

    .wa-cardsdeck-column__body.drag-over {
      background: #ecf7f2;
      border-color: var(--green-accent);
    }

    .wa-cardsdeck-column-card {
      border-radius: 8px;
      border: 1px solid #e0e0e0;
      background: #ffffff;
      font-size: 13px;
      color: var(--text-dark);
      box-shadow: 0 3px 10px rgba(0,119,96,0.08);
      padding: 8px 10px;
      margin-bottom: 6px;
      cursor: move;
    }

    .wa-cardsdeck-column-card:last-child {
      margin-bottom: 0;
    }

    .wa-cardsdeck__footer {
      margin-top: 24px;
      text-align: center;
    }

    .wa-cardsdeck__btn-check,
    .wa-cardsdeck__btn-reset {
      background: var(--green-gradient);
      border-radius: 20px;
      padding: 9px 24px;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      box-shadow: 0 10px 24px rgba(0,119,96,0.25);
      border: none;
      color: #ffffff;
      cursor: pointer;
      margin: 0 6px;
    }

    .wa-cardsdeck__btn-check:hover,
    .wa-cardsdeck__btn-reset:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 32px rgba(0,119,96,0.35);
    }

    .wa-cardsdeck__comment {
      font-size: 13px;
      color: var(--text-dark);
      margin-top: 10px;
      min-height: 18px;
    }

    .wa-cardsdeck__comment_success {
      color: #007760;
    }

    .wa-cardsdeck__comment_error {
      color: #c0392b;
    }
  </style>

  <script>
    window.docId = 'd5c5677b-60bd-4851-b686-628777f7bc7f';
    window.docName = 'Отбор проб. Три среды';
    window.locale = 'ru';
    window.id = '682';
    window.moduleId = '247';
  </script>
</head>
<body>
<div id="deck-app">
  <header>
    <h2> Типичные ошибки при отборе проб </h2>
    <div class="deck-subtitle">
      Перетащите ошибки из стопки по трем колонкам: вода, почва и воздух.
    </div>
  </header>

  <div class="wa-cardsdeck">
    <div class="wa-cardsdeck__stack-wrapper">
      <div class="wa-cardsdeck__arrow-btn" id="prev-card">&lt;</div>

      <div class="wa-cardsdeck__stack" id="stack"></div>

      <div class="wa-cardsdeck__arrow-btn" id="next-card">&gt;</div>
    </div>

    <div class="wa-cardsdeck__columns">
      <div class="wa-cardsdeck-column" data-column="1">
        <div class="wa-cardsdeck-column__title">Вода</div>
        <div class="wa-cardsdeck-column__body"></div>
      </div>
      <div class="wa-cardsdeck-column" data-column="2">
        <div class="wa-cardsdeck-column__title">Почва</div>
        <div class="wa-cardsdeck-column__body"></div>
      </div>
      <div class="wa-cardsdeck-column" data-column="3">
        <div class="wa-cardsdeck-column__title">Воздух</div>
        <div class="wa-cardsdeck-column__body"></div>
      </div>
    </div>

    <div class="wa-cardsdeck__footer">
      <button class="wa-cardsdeck__btn-check" id="check-btn">Проверить результат</button>
      <button class="wa-cardsdeck__btn-reset" id="reset-btn">Пройти заново</button>
      <div class="wa-cardsdeck__comment" id="comment"></div>
    </div>
  </div>
</div>

<script>
// 1 – вода, 2 – почва, 3 – воздух
var cardsStack = [
  {
    columnId: '1',
    title: 'Вода',
    cards: [
      { id: 'c1',
        text: 'Точку отбора сточных вод выбрали не по программе ПЭК, а в удобном технологическом колодце внутри цеха.' },
      { id: 'c2',
        text: 'Пробы сточной воды отобрали до зоны перемешивания потока, хотя методика требует отбор из хорошо перемешанного потока.' },
      { id: 'c3',
        text: 'Не отобрали фоновые пробы воды выше по течению, поэтому влияние предприятия нельзя отделить от фонового загрязнения.' },
      { id: 'c4',
        text: 'Нарушили объем и условия консервации пробы воды, из-за этого часть показателей нельзя считать достоверными.' }
    ]
  },
  {
    columnId: '2',
    title: 'Почва',
    cards: [
      { id: 'c5',
        text: 'Пробы почвы на загрязненной площадке взяли только с поверхности 0–5 см, хотя методика требует отбор на большей глубине.' },
      { id: 'c6',
        text: 'На неоднородном участке сделали одну точечную пробу и по ней оценили весь полигон вместо объединенных проб по схеме.' },
      { id: 'c7',
        text: 'Не составили схему пробных площадок и не зафиксировали координаты точек отбора почвы с привязкой к источнику загрязнения.' }
    ]
  },
  {
    columnId: '3',
    title: 'Воздух',
    cards: [
      { id: 'c8',
        text: 'Точки отбора воздуха на границе санитарно защитной-зоны разместили только с подветренной стороны, без учета зон максимальных концентраций.' },
      { id: 'c9',
        text: 'Замеры атмосферного воздуха провели при нетипичных метеоусловиях, не соответствующих требованиям методики.' },
      { id: 'c10',
        text: 'Отбор проб воздуха на границе санитарно-защитной зоны поручили лаборатории, у которой нет аккредитации на такие работы.' }
    ]
  }
];

var allCards = [];
cardsStack.forEach(function(group) {
  group.cards.forEach(function(card) {
    allCards.push({
      id: card.id,
      text: card.text,
      correctColumn: group.columnId
    });
  });
});

// перемешиваем порядок для барабана
function shuffle(array) {
  for (var i = array.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = array[i];
    array[i] = array[j];
    array[j] = tmp;
  }
}

shuffle(allCards);

var placedCards = {}; // cardId -> columnId
var currentIndex = 0;
var draggedCardId = null;
var isAnimating = false;

function getRemainingCards() {
  return allCards.filter(function(card) {
    return !placedCards[card.id];
  });
}

function renderStack(direction) {
  var stackEl = document.getElementById('stack');
  var remaining = getRemainingCards();

  if (remaining.length === 0) {
    stackEl.innerHTML = '';
    var empty = document.createElement('div');
    empty.className = 'wa-cardsdeck__stack-empty';
    empty.textContent = 'Все карточки распределены по колонкам.';
    stackEl.appendChild(empty);
    return;
  }

  if (currentIndex >= remaining.length) currentIndex = 0;
  if (currentIndex < 0) currentIndex = remaining.length - 1;

  var oldMain = stackEl.querySelector('.wa-cardsdeck__stack-card.main');

  if (oldMain && direction) {
    isAnimating = true;
    oldMain.classList.add('card-out-up');
    setTimeout(function() {
      stackEl.innerHTML = '';
      buildStackContent(remaining, true);
      isAnimating = false;
    }, 350);
  } else {
    stackEl.innerHTML = '';
    buildStackContent(remaining, false);
  }
}

function buildStackContent(remaining, animateIn) {
  var stackEl = document.getElementById('stack');

  var mainCard = remaining[currentIndex];
  var prevCard = remaining[currentIndex - 1];
  var nextCard = remaining[currentIndex + 1];

  if (nextCard) {
    var nextEl = document.createElement('div');
    nextEl.className = 'wa-cardsdeck__stack-card bg-2';
    nextEl.textContent = nextCard.text;
    stackEl.appendChild(nextEl);
  }

  if (prevCard) {
    var prevEl = document.createElement('div');
    prevEl.className = 'wa-cardsdeck__stack-card bg-1';
    prevEl.textContent = prevCard.text;
    stackEl.appendChild(prevEl);
  }

  var mainEl = document.createElement('div');
  mainEl.className = 'wa-cardsdeck__stack-card main';
  if (animateIn) {
    mainEl.classList.add('card-in-back');
    setTimeout(function() {
      mainEl.classList.remove('card-in-back');
    }, 350);
  }
  mainEl.textContent = mainCard.text;
  mainEl.dataset.cardId = mainCard.id;
  mainEl.draggable = true;

  mainEl.addEventListener('dragstart', function(e) {
    draggedCardId = mainCard.id;
    e.dataTransfer.effectAllowed = 'move';
  });

  mainEl.addEventListener('dragend', function() {
    draggedCardId = null;
  });

  stackEl.appendChild(mainEl);
}

function initColumnsDnD() {
  var bodies = document.querySelectorAll('.wa-cardsdeck-column__body');

  bodies.forEach(function(body) {
    body.addEventListener('dragover', function(e) {
      e.preventDefault();
      body.classList.add('drag-over');
    });

    body.addEventListener('dragleave', function() {
      body.classList.remove('drag-over');
    });

    body.addEventListener('drop', function(e) {
      e.preventDefault();
      body.classList.remove('drag-over');
      if (!draggedCardId) return;

      var columnId = body.parentElement.dataset.column;

      // если карта уже была в другой колонке – удаляем из старой
      var oldColumnId = placedCards[draggedCardId];
      if (oldColumnId) {
        var oldBody = document.querySelector('.wa-cardsdeck-column[data-column="' + oldColumnId + '"] .wa-cardsdeck-column__body');
        if (oldBody) {
          var oldEl = oldBody.querySelector('.wa-cardsdeck-column-card[data-card-id="' + draggedCardId + '"]');
          if (oldEl) oldBody.removeChild(oldEl);
        }
      }

      placedCards[draggedCardId] = columnId;

      var cardData = allCards.find(function(c) { return c.id === draggedCardId; });
      if (!cardData) return;

      var cardEl = document.createElement('div');
      cardEl.className = 'wa-cardsdeck-column-card';
      cardEl.textContent = cardData.text;
      cardEl.dataset.cardId = cardData.id;
      cardEl.draggable = true;

      // перетаскивание из колонок в другие колонки
      cardEl.addEventListener('dragstart', function(e2) {
        draggedCardId = cardData.id;
        e2.dataTransfer.effectAllowed = 'move';
      });
      cardEl.addEventListener('dragend', function() {
        draggedCardId = null;
      });

      body.appendChild(cardEl);

      currentIndex += 1;
      renderStack('next');
    });
  });
}

function checkAnswers() {
  var commentEl = document.getElementById('comment');
  var errors = 0;

  allCards.forEach(function(card) {
    var placedColumn = placedCards[card.id];
    if (!placedColumn || placedColumn !== card.correctColumn) {
      errors += 1;
    }
  });

  if (errors === 0 && getRemainingCards().length === 0) {
    commentEl.innerHTML =
      'Все карточки в верных колонках. Отлично.<br><br>' +
      'В реальных условиях любая такая ошибка в отборе проб ' +
      'искажает результаты контроля, а значит, влияет на решения по ' +
      'очистным сооружениям, природоохранным мероприятиям и отчетности. ' +
      'Поэтому важно не только знать методики, но и строго следовать им ' +
      'на каждом этапе – от выбора точки до консервации и передачи проб.';
    commentEl.className = 'wa-cardsdeck__comment wa-cardsdeck__comment_success';
  } else {
    commentEl.textContent = 'Есть ошибки или не все карточки распределены. Проверьте еще раз.';
    commentEl.className = 'wa-cardsdeck__comment wa-cardsdeck__comment_error';
  }
}

function resetGame() {
  placedCards = {};
  currentIndex = 0;
  draggedCardId = null;

  // заново перемешиваем порядок
  shuffle(allCards);

  var commentEl = document.getElementById('comment');
  commentEl.textContent = '';
  commentEl.className = 'wa-cardsdeck__comment';

  document.querySelectorAll('.wa-cardsdeck-column__body').forEach(function(body) {
    body.innerHTML = '';
  });

  renderStack();
}

document.addEventListener('DOMContentLoaded', function() {
  renderStack();
  initColumnsDnD();

  document.getElementById('prev-card').addEventListener('click', function() {
    if (isAnimating || getRemainingCards().length === 0) return;
    currentIndex -= 1;
    renderStack('prev');
  });

  document.getElementById('next-card').addEventListener('click', function() {
    if (isAnimating || getRemainingCards().length === 0) return;
    currentIndex += 1;
    renderStack('next');
  });

  document.getElementById('check-btn').addEventListener('click', checkAnswers);
  document.getElementById('reset-btn').addEventListener('click', resetGame);
});
</script>
</body>
</html>
