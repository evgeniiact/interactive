<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <meta name="google" content="notranslate" />
  <title>Когда среда мстит за ошибку</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;500;600;700&display=swap');

    :root {
      --bg-silk: #f3fbf7;
      --green-accent: #007760;
      --green-gradient: linear-gradient(135deg, #19a86e, #007760);
      --green-border: #19a86e;
      --text-dark: #2c2c2c;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Montserrat', sans-serif;
      background-color: var(--bg-silk);
      margin: 0;
      padding: 8px;
      display: flex;
      justify-content: center;
    }

    #deck-app {
      background: #ffffff;
      border: 1px solid var(--green-border);
      border-radius: 4px;
      padding: 20px 30px 24px 30px;
      width: 100%;
      max-width: 1040px;
      box-shadow: 0 24px 60px rgba(0, 119, 96, 0.18);
    }

    header {
      text-align: center;
      margin-bottom: 12px;
      border-bottom: 1px solid rgba(0,119,96,0.12);
      padding-bottom: 8px;
    }

    h2 {
      font-family: 'Playfair Display', serif;
      color: var(--green-accent);
      font-size: 20px;
      margin: 0;
      text-transform: uppercase;
    }

    .deck-subtitle {
      margin-top: 8px;
      font-size: 14px;
      color: var(--text-dark);
    }

    /* Переопределяем оформление виджета под зеленый стиль */
    .wa-cardsdeck__title {
      display: none !important;
    }

    .wa-cardsdeck__description {
      display: none !important;
    }

    .wa-cardsdeck {
      font-family: 'Montserrat', sans-serif !important;
      color: var(--text-dark) !important;
      margin-top: 10px !important;       /* чтобы виджет был внутри рамки */
    }

    .wa-cardsdeck__columns {
      margin-top: 8px !important;
    }

    .wa-cardsdeck-column__title {
      font-size: 13px !important;
      text-transform: uppercase !important;
      letter-spacing: 0.05em !important;
      color: #527a6b !important;
      margin-bottom: 6px !important;
    }

    .wa-cardsdeck-card {
      border-radius: 8px !important;
      border: 1px solid #e0e0e0 !important;
      background: #ffffff !important;
      font-size: 13px !important;
      color: var(--text-dark) !important;
      box-shadow: 0 3px 10px rgba(0,119,96,0.08) !important;
      padding: 10px 12px !important;
    }

    .wa-cardsdeck-card__inner {
      padding: 0 !important;
    }

    .wa-cardsdeck-card:hover {
      border-color: var(--green-accent) !important;
      background: #f3fbf7 !important;
      transform: translateY(-1px) !important;
      transition: 0.2s !important;
    }

    .wa-cardsdeck__btn-check {
      background: var(--green-gradient) !important;
      border-radius: 20px !important;
      padding: 9px 32px !important;
      font-size: 13px !important;
      font-weight: 700 !important;
      text-transform: uppercase !important;
      box-shadow: 0 10px 24px rgba(0,119,96,0.25) !important;
      border: none !important;
    }

    .wa-cardsdeck__btn-check:hover {
      transform: translateY(-1px) !important;
      box-shadow: 0 16px 32px rgba(0,119,96,0.35) !important;
    }

    .wa-cardsdeck__footer {
      margin-top: 14px !important;
    }

    .wa-cardsdeck__comment {
      font-size: 13px !important;
      color: var(--text-dark) !important;
    }
  </style>

  <script>
    window.docId = 'd5c5677b-60bd-4851-b686-628777f7bc7f';
    window.docName = 'Отбор проб. Три среды';
    window.locale = 'ru';
    window.id = '682';
    window.moduleId = '247';
  </script>
</head>
<body>
<div id="deck-app">
  <header>
    <h2>Когда среда мстит за ошибку</h2>
    <div class="deck-subtitle">
      Распределите ошибки при отборе проб по трем колонкам: вода, почва и воздух.
    </div>
  </header>
</div>

<script type="text/javascript">
  // 1 — вода, 2 — почва, 3 — воздух
  var cardsStack = [
    {
      columnId: '1',
      title: 'Вода',
      imageUrl: null,
      cards: [
        {
          text: 'Точку отбора сточных вод выбрали не по программе ПЭК, а в удобном технологическом колодце внутри цеха.',
          imageUrl: null
        },
        {
          text: 'Пробы сточной воды отобрали до зоны перемешивания потока, хотя методика требует отбор из хорошо перемешанного потока.',
          imageUrl: null
        },
        {
          text: 'Не отобрали фоновые пробы воды выше и ниже по течению, поэтому влияние предприятия нельзя отделить от фонового загрязнения.',
          imageUrl: null
        },
        {
          text: 'Нарушили объем и условия консервации пробы воды, из за этого часть показателей нельзя считать достоверными.',
          imageUrl: null
        }
      ]
    },
    {
      columnId: '2',
      title: 'Почва',
      imageUrl: null,
      cards: [
        {
          text: 'Пробы почвы на загрязненной площадке взяли только с поверхности 0–5 см, хотя методика требует отбор на большей глубине.',
          imageUrl: null
        },
        {
          text: 'На неоднородном участке сделали одну точечную пробу и по ней оценили весь полигон вместо объединенных проб по схеме.',
          imageUrl: null
        },
        {
          text: 'Не составили схему пробных площадок и не зафиксировали координаты точек отбора почвы с привязкой к источнику загрязнения.',
          imageUrl: null
        }
      ]
    },
    {
      columnId: '3',
      title: 'Воздух',
      imageUrl: null,
      cards: [
        {
          text: 'Точки отбора воздуха на границе санитарно защитной зоны разместили без учета розы ветров.',
          imageUrl: null
        },
        {
          text: 'Замеры атмосферного воздуха провели при нетипичных метеоусловиях, не соответствующих требованиям методики.',
          imageUrl: null
        },
        {
          text: 'Отбор проб воздуха на границе санитарно защитной зоны поручили лаборатории, у которой нет аккредитации на такие работы.',
          imageUrl: null
        }
      ]
    }
  ];

  // перемешиваем порядок карточек внутри каждой колонки
  cardsStack.forEach(function (col) {
    col.cards = col.cards
      .map(value => ({ value, sort: Math.random() }))
      .sort((a, b) => a.sort - b.sort)
      .map(({ value }) => value);
  });
  // если захотите менять порядок колонок, можно раскомментировать:
  // cardsStack = cardsStack
  //   .map(value => ({ value, sort: Math.random() }))
  //   .sort((a, b) => a.sort - b.sort)
  //   .map(({ value }) => value);

  var env = 'prod';
  var title = 'Типичные ошибки при отборе проб';
  var description = 'Распределите ошибки по трем колонкам: вода, почва и воздух.';
  var comment = '';
</script>

<script type="text/javascript">
  (function () {
    const script = document.createElement('script');
    script.async = true;
    script.src = 'https://' + 'cdn.action-mcfr.ru' + '/widgets/loader.js';
    script.onload = onLoad;
    script.onerror = onError;
    document.getElementsByTagName('head')[0].appendChild(script);
  })();

  function onLoad() {
    if (window.env === 'dev' || window.env === 'test') {
      window.WidgetLoader.dev();
    }
    if (window.env === 'rc') {
      window.WidgetLoader.rc();
    }
    window.WidgetLoader.setLanguage('ru');
    window.WidgetLoader.load(
      {
        name: 'waCardsDeck',
        version: '1_0_0'
      },
      initCardsDeck
    );
  }

  function onError() {
    if (true) {
      var script = document.createElement('script');
      script.async = true;
      script.src = 'https://' + 's3.action-media.ru' + '/widgets/loader.js';
      script.onload = onLoad;
      document.getElementsByTagName('head')[0].appendChild(script);
    }
  }

  function initCardsDeck() {
    window.ActionCardsDeck.init({
      title,
      description,
      comment,
      cardsStack
    });
  }
</script>

<script type="text/javascript"
        src="https://shkola.action360.ru/interactive/common/js/iframeResizer.contentWindow.min.js"></script>
</body>
</html>
