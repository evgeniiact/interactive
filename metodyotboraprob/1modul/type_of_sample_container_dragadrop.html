<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="google" content="notranslate" />
<title>Подберите тару для пробы</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap');

:root {
  --bg-silk: #f3fbf7;
  --green-accent: #007760;
  --green-gradient: linear-gradient(135deg, #19a86e, #007760);
  --green-border: #19a86e;
  --text-dark: #2c2c2c;
}

* { box-sizing: border-box; }

body {
  font-family: 'Montserrat', sans-serif;
  background-color: var(--bg-silk);
  margin: 0;
  padding: 8px;
  display: flex;
  justify-content: center;
}

#deck-app {
  font-family: 'Montserrat', sans-serif;
  background: #ffffff;
  border: 1px solid var(--green-border);
  border-radius: 4px;
  padding: 16px 18px 20px 18px;
  width: 100%;
  max-width: 560px;
  max-height: 800px;
  box-shadow: 0 18px 40px rgba(0, 119, 96, 0.16);
  overflow: hidden;
}

header {
  text-align: left;
  margin-bottom: 12px;
  border-bottom: 1px solid rgba(0,119,96,0.12);
  padding-bottom: 8px;
}

h2 {
  font-family: 'Montserrat', sans-serif;
  color: var(--green-accent);
  font-size: 16px;
  margin: 0;
  text-transform: none;
  font-weight: 700;
}

.deck-subtitle {
  margin-top: 6px;
  font-size: 12px;
  color: var(--text-dark);
}

.wa-cardsdeck {
  font-size: 12px;
  color: var(--text-dark);
}

/* зона с картой */
.wa-cardsdeck__stack-wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  margin-bottom: 14px;
  gap: 16px;
}

.wa-cardsdeck__arrow-btn {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  border: 1px solid rgba(0,0,0,0.12);
  background: #ffffff;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 16px;
  color: #555;
  transition: 0.2s;
  user-select: none;
}

.wa-cardsdeck__arrow-btn:hover {
  background: #f3fbf7;
  border-color: var(--green-accent);
  color: var(--green-accent);
}

.wa-cardsdeck__stack {
  position: relative;
  width: 260px;
  height: 150px;
  overflow: hidden;
}

.wa-cardsdeck__stack-card {
  position: absolute;
  top: 12px;
  left: 0;
  right: 0;
  margin: 0 auto;
  width: 100%;
  height: 126px;
  border-radius: 10px;
  border: 1px solid #e0e0e0;
  background: #ffffff;
  box-shadow: 0 8px 20px rgba(0,0,0,0.05);
  padding: 10px 12px;
  font-size: 12px;
  text-align: left;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: move;
}

.wa-cardsdeck__stack-card.bg-1 {
  transform: translateY(6px) scale(0.98);
  opacity: 0.6;
}

.wa-cardsdeck__stack-card.bg-2 {
  transform: translateY(12px) scale(0.96);
  opacity: 0.4;
}

.wa-cardsdeck__stack-card.main {
  z-index: 3;
  opacity: 1;
}

.wa-cardsdeck__stack-empty {
  width: 260px;
  height: 126px;
  border-radius: 10px;
  border: 1px dashed rgba(0,119,96,0.3);
  background: #f7faf9;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: #777;
  text-align: center;
}

/* анимация */
.card-out-up {
  animation: cardOutUp 0.3s forwards;
}

.card-in-back {
  animation: cardInBack 0.3s forwards;
}

@keyframes cardOutUp {
  0%   { transform: translateY(0) scale(1); opacity: 1; }
  40%  { transform: translateY(-28px) scale(1.04); opacity: 1; }
  100% { transform: translateY(16px) scale(0.96); opacity: 0.4; }
}

@keyframes cardInBack {
  0%   { transform: translateY(-24px) scale(1.03); opacity: 0; }
  100% { transform: translateY(0) scale(1); opacity: 1; }
}

/* контейнер для колонок и всплывающего комментария */
.wa-cardsdeck__columns-wrapper {
  position: relative;
}

/* всплывающий комментарий */
.wa-cardsdeck__details-popup {
  position: absolute;
  left: 50%;
  top: -4px;
  transform: translate(-50%, -100%);
  max-width: 90%;
  background: #ffffff;
  border-radius: 8px;
  border: 1px solid rgba(0,119,96,0.35);
  box-shadow: 0 10px 26px rgba(0,119,96,0.2);
  padding: 6px 8px;
  font-size: 11px;
  color: var(--text-dark);
  z-index: 5;
}

/* треугольник под попапом */
.wa-cardsdeck__details-popup::after {
  content: "";
  position: absolute;
  left: 50%;
  bottom: -6px;
  transform: translateX(-50%);
  border-width: 6px 6px 0 6px;
  border-style: solid;
  border-color: rgba(0,119,96,0.35) transparent transparent transparent;
}

/* колонки */
.wa-cardsdeck__columns {
  margin-top: 4px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.wa-cardsdeck-column__title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: #527a6b;
  margin-bottom: 4px;
  text-align: center;
  font-weight: 600;
}

.wa-cardsdeck-column__body {
  min-height: 90px;
  max-height: 190px;
  padding: 6px;
  border-radius: 8px;
  background: #f7faf9;
  border: 1px dashed rgba(0,119,96,0.25);
  overflow-y: auto;
  transition: 0.2s;
}

.wa-cardsdeck-column__body.drag-over {
  background: #ecf7f2;
  border-color: var(--green-accent);
}

.wa-cardsdeck-column-card {
  border-radius: 6px;
  border: 1px solid #e0e0e0;
  background: #ffffff;
  font-size: 11px;
  color: var(--text-dark);
  box-shadow: 0 3px 10px rgba(0,119,96,0.08);
  padding: 6px 7px;
  margin-bottom: 4px;
  cursor: move;
}

.wa-cardsdeck-column-card.correct {
  border-color: #1e9150;
  box-shadow: 0 0 0 1px rgba(30,145,80,0.45);
}

.wa-cardsdeck-column-card.incorrect {
  border-color: #c0392b;
  box-shadow: 0 0 0 1px rgba(192,57,43,0.4);
}

.wa-cardsdeck-column-card:last-child {
  margin-bottom: 0;
}

/* подвал */
.wa-cardsdeck__footer {
  margin-top: 14px;
  text-align: center;
}

.wa-cardsdeck__btn-check,
.wa-cardsdeck__btn-reset {
  font-family: 'Montserrat', sans-serif;
  background: var(--green-gradient);
  border-radius: 18px;
  padding: 7px 20px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  box-shadow: 0 10px 22px rgba(0,119,96,0.25);
  border: none;
  color: #ffffff;
  cursor: pointer;
  margin: 0 4px;
}

.wa-cardsdeck__btn-reset {
  background: #f0f4f3;
  color: var(--green-accent);
  box-shadow: none;
}

.wa-cardsdeck__btn-check:hover,
.wa-cardsdeck__btn-reset:hover {
  transform: translateY(-1px);
}

.wa-cardsdeck__comment {
  font-size: 11px;
  color: var(--text-dark);
  margin-top: 8px;
  min-height: 18px;
  text-align: left;
}

.wa-cardsdeck__comment_success {
  color: #007760;
}

.wa-cardsdeck__comment_error {
  color: #c0392b;
}
</style>
</head>
<body>
<div id="deck-app">
  <header>
    <h2>Подберите тару для пробы</h2>
    <div class="deck-subtitle">
      Перетащите карточку в колонку с подходящим материалом емкости.
    </div>
  </header>

  <div class="wa-cardsdeck">
    <div class="wa-cardsdeck__stack-wrapper">
      <div class="wa-cardsdeck__arrow-btn" id="prev-card">&lt;</div>
      <div class="wa-cardsdeck__stack" id="stack"></div>
      <div class="wa-cardsdeck__arrow-btn" id="next-card">&gt;</div>
    </div>

    <div class="wa-cardsdeck__columns-wrapper">
      <div class="wa-cardsdeck__columns">
        <div class="wa-cardsdeck-column" data-column="glass">
          <div class="wa-cardsdeck-column__title">Стеклянная емкость</div>
          <div class="wa-cardsdeck-column__body"></div>
        </div>
        <div class="wa-cardsdeck-column" data-column="plastic">
          <div class="wa-cardsdeck-column__title">Пластиковая емкость</div>
          <div class="wa-cardsdeck-column__body"></div>
        </div>
        <div class="wa-cardsdeck-column" data-column="sterile">
          <div class="wa-cardsdeck-column__title">Стерильная емкость</div>
          <div class="wa-cardsdeck-column__body"></div>
        </div>
      </div>
      <div class="wa-cardsdeck__details-popup" id="details" style="display:none;">
        <div id="details-body"></div>
      </div>
    </div>

    <div class="wa-cardsdeck__footer">
      <button class="wa-cardsdeck__btn-check" id="check-btn">Проверить</button>
      <button class="wa-cardsdeck__btn-reset" id="reset-btn">Сбросить</button>
      <div class="wa-cardsdeck__comment" id="comment"></div>
    </div>
  </div>
</div>

<script>
// карточки
var allCards = [
  { id: 'c1', text: 'Сточные воды завода ЛКМ на нефтепродукты', correctColumn: 'glass' },
  { id: 'c2', text: 'Выброс из газоочистки на летучие органические соединения', correctColumn: 'glass' },
  { id: 'c3', text: 'Воздух в цехе на бенз(а)пирен', correctColumn: 'glass' },
  { id: 'c4', text: 'Сточные воды после локальных очистных на хлориды и сульфаты', correctColumn: 'plastic' },
  { id: 'c5', text: 'Сточные воды гальванического участка на никель и цинк', correctColumn: 'plastic' },
  { id: 'c6', text: 'Почва с промплощадки на тяжелые металлы', correctColumn: 'plastic' },
  { id: 'c7', text: 'Питьевая вода из крана на общее микробное число', correctColumn: 'sterile' },
  { id: 'c8', text: 'Смывы с поверхности оборудования на бактерии', correctColumn: 'sterile' },
  { id: 'c9', text: 'Вода оборотной системы на термотолерантные колиформы', correctColumn: 'sterile' }
];

var commentsById = {
  c1: 'Нефтепродукты берут в стекло, чтобы пластик не сорбировал фракции и не давал органический фон.',
  c2: 'Летучую органику собирают в стеклянные приборы и флаконы, полимеры дают лишний риск.',
  c3: 'ПАУ фиксируют в стеклянных пробирках и на сорбентах в стекле, так лучше сохраняется состав.',
  c4: 'Устойчивые минеральные ионы можно везти в полиэтиленовой бутылке, если методика это допускает.',
  c5: 'Для металлов часто применяют пластиковую тару с консервированием – удобно и безопасно.',
  c6: 'Почву на металлы хранят в плотных пластиковых пакетах или контейнерах, не в ткани и не в бумаге.',
  c7: 'Микробиологические пробы берут только в заранее стерильный флакон, который нельзя ополаскивать.',
  c8: 'Смывы сразу помещают в стерильный флакон, чтобы не внести постороннюю микрофлору.',
  c9: 'Санитарно микробиологические показатели всегда требуют стерильной посуды и жестких условий хранения.'
};

var placedCards = {}; // id -> column
var currentIndex = 0;
var draggedCardId = null;
var isAnimating = false;
var gameCompleted = false;

function shuffle(array) {
  for (var i = array.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = array[i]; array[i] = array[j]; array[j] = tmp;
  }
}

function getRemainingCards() {
  return allCards.filter(function(c){ return !placedCards[c.id]; });
}

function buildStackContent(remaining, animateIn) {
  var stackEl = document.getElementById('stack');
  var mainCard = remaining[currentIndex];
  var prevCard = remaining[currentIndex - 1];
  var nextCard = remaining[currentIndex + 1];

  if (nextCard) {
    var nextEl = document.createElement('div');
    nextEl.className = 'wa-cardsdeck__stack-card bg-2';
    nextEl.textContent = nextCard.text;
    stackEl.appendChild(nextEl);
  }
  if (prevCard) {
    var prevEl = document.createElement('div');
    prevEl.className = 'wa-cardsdeck__stack-card bg-1';
    prevEl.textContent = prevCard.text;
    stackEl.appendChild(prevEl);
  }

  var mainEl = document.createElement('div');
  mainEl.className = 'wa-cardsdeck__stack-card main';
  if (animateIn) {
    mainEl.classList.add('card-in-back');
    setTimeout(function(){ mainEl.classList.remove('card-in-back'); }, 300);
  }
  mainEl.textContent = mainCard.text;
  mainEl.dataset.cardId = mainCard.id;
  mainEl.draggable = true;
  mainEl.addEventListener('dragstart', function(e){
    draggedCardId = mainCard.id;
    e.dataTransfer.effectAllowed = 'move';
  });
  mainEl.addEventListener('dragend', function(){
    draggedCardId = null;
  });
  stackEl.appendChild(mainEl);
}

function renderStack(direction) {
  var stackEl = document.getElementById('stack');
  var remaining = getRemainingCards();
  if (remaining.length === 0) {
    stackEl.innerHTML = '';
    var empty = document.createElement('div');
    empty.className = 'wa-cardsdeck__stack-empty';
    empty.textContent = 'Все карточки лежат в колонках. Можно проверить результат.';
    stackEl.appendChild(empty);
    return;
  }
  if (currentIndex >= remaining.length) currentIndex = 0;
  if (currentIndex < 0) currentIndex = remaining.length - 1;

  var oldMain = stackEl.querySelector('.wa-cardsdeck__stack-card.main');
  if (oldMain && direction) {
    isAnimating = true;
    oldMain.classList.add('card-out-up');
    setTimeout(function(){
      stackEl.innerHTML = '';
      buildStackContent(remaining, true);
      isAnimating = false;
    }, 300);
  } else {
    stackEl.innerHTML = '';
    buildStackContent(remaining, false);
  }
}

function initColumnsDnD() {
  var bodies = document.querySelectorAll('.wa-cardsdeck-column__body');
  bodies.forEach(function(body){
    body.addEventListener('dragover', function(e){
      e.preventDefault();
      body.classList.add('drag-over');
    });
    body.addEventListener('dragleave', function(){
      body.classList.remove('drag-over');
    });
    body.addEventListener('drop', function(e){
      e.preventDefault();
      body.classList.remove('drag-over');
      if (!draggedCardId) return;
      var columnId = body.parentElement.dataset.column;

      var oldColumn = placedCards[draggedCardId];
      if (oldColumn) {
        var oldBody = document.querySelector('.wa-cardsdeck-column[data-column="'+oldColumn+'"] .wa-cardsdeck-column__body');
        if (oldBody) {
          var oldEl = oldBody.querySelector('.wa-cardsdeck-column-card[data-card-id="'+draggedCardId+'"]');
          if (oldEl) oldBody.removeChild(oldEl);
        }
      }

      placedCards[draggedCardId] = columnId;
      var cardData = allCards.find(function(c){ return c.id === draggedCardId; });
      if (!cardData) return;

      var cardEl = document.createElement('div');
      cardEl.className = 'wa-cardsdeck-column-card';
      cardEl.textContent = cardData.text;
      cardEl.dataset.cardId = cardData.id;
      cardEl.draggable = true;
      cardEl.addEventListener('dragstart', function(e2){
        draggedCardId = cardData.id;
        e2.dataTransfer.effectAllowed = 'move';
      });
      cardEl.addEventListener('dragend', function(){
        draggedCardId = null;
      });

      body.appendChild(cardEl);
      currentIndex += 1;
      renderStack('next');
    });
  });
}

function clearMarks() {
  document.querySelectorAll('.wa-cardsdeck-column-card').forEach(function(el){
    el.classList.remove('correct','incorrect');
  });
}

function attachCardClickForComments() {
  var bodies = document.querySelectorAll('.wa-cardsdeck-column__body');
  bodies.forEach(function(body){
    body.querySelectorAll('.wa-cardsdeck-column-card').forEach(function(cardEl){
      cardEl.onclick = function() {
        if (!gameCompleted) return;
        var id = cardEl.dataset.cardId;
        var text = commentsById[id] || '';
        if (!text) return;
        var details = document.getElementById('details');
        var bodyEl = document.getElementById('details-body');
        bodyEl.textContent = text;
        details.style.display = 'block';
      };
    });
  });
}

function checkAnswers() {
  clearMarks();
  document.getElementById('details').style.display = 'none';
  document.getElementById('details-body').innerHTML = '';
  gameCompleted = false;

  var commentEl = document.getElementById('comment');
  var errors = 0;

  allCards.forEach(function(card){
    var placed = placedCards[card.id];
    if (!placed || placed !== card.correctColumn) {
      errors += 1;
    }
  });

  allCards.forEach(function(card){
    var placed = placedCards[card.id];
    if (!placed) return;
    var body = document.querySelector('.wa-cardsdeck-column[data-column="'+placed+'"] .wa-cardsdeck-column__body');
    if (!body) return;
    var el = body.querySelector('.wa-cardsdeck-column-card[data-card-id="'+card.id+'"]');
    if (!el) return;
    if (placed === card.correctColumn) {
      el.classList.add('correct');
    } else {
      el.classList.add('incorrect');
    }
  });

  if (errors === 0 && getRemainingCards().length === 0) {
    commentEl.textContent =
      'Все пробы в подходящей таре. Нажмите на любую карточку, чтобы увидеть пояснение.';
    commentEl.className = 'wa-cardsdeck__comment wa-cardsdeck__comment_success';
    gameCompleted = true;
    attachCardClickForComments();
  } else {
    commentEl.textContent =
      'Есть ошибки или не все карточки распределены. Попробуйте еще раз.';
    commentEl.className = 'wa-cardsdeck__comment wa-cardsdeck__comment_error';
  }
}

function resetGame() {
  placedCards = {};
  currentIndex = 0;
  draggedCardId = null;
  gameCompleted = false;
  shuffle(allCards);
  document.getElementById('comment').textContent = '';
  document.getElementById('comment').className = 'wa-cardsdeck__comment';
  document.getElementById('details').style.display = 'none';
  document.getElementById('details-body').innerHTML = '';
  document.querySelectorAll('.wa-cardsdeck-column__body').forEach(function(b){ b.innerHTML=''; });
  renderStack();
}

document.addEventListener('DOMContentLoaded', function(){
  shuffle(allCards);
  renderStack();
  initColumnsDnD();

  document.getElementById('prev-card').addEventListener('click', function(){
    if (isAnimating || getRemainingCards().length === 0) return;
    currentIndex -= 1;
    renderStack('prev');
  });
  document.getElementById('next-card').addEventListener('click', function(){
    if (isAnimating || getRemainingCards().length === 0) return;
    currentIndex += 1;
    renderStack('next');
  });
  document.getElementById('check-btn').addEventListener('click', checkAnswers);
  document.getElementById('reset-btn').addEventListener('click', resetGame);
});
</script>
</body>
</html>
