<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="google" content="notranslate" />
<title>План предприятия – точки отбора проб</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap');

:root {
  --bg-silk: #f3fbf7;
  --green-accent: #007760;
  --green-gradient: linear-gradient(135deg, #19a86e, #007760);
  --green-border: #19a86e;
  --text-dark: #2c2c2c;
}

/* контейнер 560x800 */
* { box-sizing: border-box; }

body {
  margin: 0;
  padding: 0;
  background: var(--bg-silk);
  font-family: 'Montserrat', sans-serif;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

#app {
  width: 560px;
  height: 800px;
  background: #ffffff;
  border: 1px solid var(--green-border);
  border-radius: 4px;
  box-shadow: 0 18px 40px rgba(0, 119, 96, 0.16);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* шапка и прогресс по точкам */
header {
  padding: 10px 14px 6px 14px;
  border-bottom: 1px solid rgba(0,119,96,0.12);
}

h2 {
  margin: 0;
  font-size: 16px;
  font-weight: 700;
  color: var(--green-accent);
}

.subtitle {
  margin-top: 4px;
  font-size: 12px;
  color: var(--text-dark);
}

/* прогресс-бар по точкам */
.progress-row {
  margin-top: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
}

.progress-row span.label {
  color: #557267;
}

.progress-dots {
  display: flex;
  gap: 4px;
}

.progress-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: 2px solid #b3c7bd;
  background: #ffffff;
}

.progress-dot.done {
  border-color: var(--green-accent);
  background: #19a86e;
}

/* основное поле */
.main {
  flex: 1;
  padding: 8px 10px 10px 10px;
}

.map-wrapper {
  position: relative;
  width: 100%;
  height: 100%;
  border-radius: 8px;
  border: 1px solid rgba(0,119,96,0.25);
  background: #f7faf9;
  overflow: hidden;
}

.map-wrapper img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}

/* точки на схеме */
.point {
  position: absolute;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #ffffff;
  border: 2px solid #19a86e;
  cursor: pointer;
  box-shadow: 0 0 0 2px rgba(0,119,96,0.18);
  transform: translate(-50%, -50%);
  transition: transform 0.15s, background 0.15s, border-color 0.15s;
}

.point:hover {
  transform: translate(-50%, -52%);
}

.point::after {
  content: '';
  position: absolute;
  left: 4px;
  top: 3px;
  width: 7px;
  height: 9px;
  border-right: 2px solid #19a86e;
  border-bottom: 2px solid #19a86e;
  transform: rotate(35deg);
}

.point.done {
  background: #19a86e;
  border-color: #004f3f;
}
.point.done::after {
  border-color: #ffffff;
}

/* модальное окно */
.modal {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.32);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

.modal-inner {
  width: 90%;
  max-width: 480px;
  background: #ffffff;
  border-radius: 8px;
  border: 1px solid var(--green-border);
  box-shadow: 0 18px 40px rgba(0, 119, 96, 0.3);
  padding: 12px 14px 14px 14px;
  font-size: 12px;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.modal-title {
  font-weight: 700;
  color: var(--green-accent);
}

.modal-close {
  border-radius: 50%;
  width: 22px;
  height: 22px;
  border: 1px solid rgba(0,0,0,0.15);
  background: #ffffff;
  cursor: pointer;
  font-size: 13px;
}

.step-indicator {
  font-size: 10px;
  color: #557267;
}

.modal-body {
  margin-top: 8px;
}

.modal-question {
  font-weight: 600;
  margin-bottom: 6px;
}

/* множественный выбор */
.options {
  list-style: none;
  padding: 0;
  margin: 0;
}

.option {
  padding: 6px 7px;
  border-radius: 6px;
  border: 1px solid #e0e0e0;
  margin-bottom: 4px;
  cursor: pointer;
  display: flex;
  align-items: flex-start;
  gap: 6px;
}

.option:hover {
  background: #f0f7f3;
}

.option-checkbox {
  width: 14px;
  height: 14px;
  margin-top: 2px;
  border-radius: 3px;
  border: 1px solid #9ba8a2;
  flex-shrink: 0;
}

.option.selected .option-checkbox {
  background: #19a86e;
  border-color: #19a86e;
}

.option-text {
  flex: 1;
}

.option.correct {
  border-color: #19a86e;
  background: #e7f7ee;
}

.option.wrong {
  border-color: #c0392b;
  background: #fff3f1;
}

/* кнопка проверки в модалке */
.modal-actions {
  margin-top: 6px;
  display: flex;
  justify-content: flex-end;
}

.btn-check {
  font-family: 'Montserrat', sans-serif;
  border-radius: 14px;
  padding: 5px 14px;
  font-size: 11px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  background: var(--green-gradient);
  color: #ffffff;
}

/* подвал модалки */
.modal-footer {
  margin-top: 6px;
  font-size: 11px;
  min-height: 18px;
}

.modal-footer_ok {
  color: var(--green-accent);
}
</style>
</head>
<body>
<div id="app">
  <header>
    <h2>Где и как вы возьмете пробу</h2>
    <div class="subtitle">
      Нажмите на объект. Сначала выберите тип пробы, потом – ключевые строки акта отбора.
    </div>
    <div class="progress-row">
      <span class="label">Точки пройдены</span>
      <div class="progress-dots">
        <div class="progress-dot" data-dot="stack" title="Источник выброса"></div>
        <div class="progress-dot" data-dot="outfall" title="Сброс в реку"></div>
        <div class="progress-dot" data-dot="well" title="Колодец"></div>
        <div class="progress-dot" data-dot="szz" title="Граница СЗЗ"></div>
        <div class="progress-dot" data-dot="soil" title="Почва у отходов НП"></div>
      </div>
    </div>
  </header>

  <div class="main">
    <div class="map-wrapper" id="map">
      <img src="plant-map.png" alt="План предприятия" />

      <!-- координаты под картинку -->
      <div class="point" data-key="stack"   style="left:23%; top:26%;"></div>
      <div class="point" data-key="outfall" style="left:74%; top:68%;"></div>
      <div class="point" data-key="well"    style="left:62%; top:57%;"></div>
      <div class="point" data-key="szz"     style="left:66%; top:20%;"></div>
      <div class="point" data-key="soil"    style="left:36%; top:60%;"></div>

      <!-- модалка -->
      <div class="modal" id="modal">
        <div class="modal-inner">
          <div class="modal-header">
            <div>
              <div class="modal-title" id="modal-title"></div>
              <div class="step-indicator" id="step-indicator"></div>
            </div>
            <button class="modal-close" id="modal-close">×</button>
          </div>
          <div class="modal-body" id="modal-body"></div>
          <div class="modal-actions">
            <button class="btn-check" id="btn-check">Проверить</button>
          </div>
          <div class="modal-footer" id="modal-footer"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
var state = {
  completed: { stack:false, outfall:false, well:false, szz:false, soil:false },
  currentPoint: null,
  currentStep: 1,
  selectedIndexes: []
};

/* конфигурация по точкам */
var tasks = {
  stack: {
    title: 'Источник выброса',
    sampleQuestion: 'Какую пробу вы планируете отбирать на трубе?',
    // несколько вариантов, 2 правильных
    sampleOptions: [
      {
        text: 'Газовую пробу отходящих газов на загрязняющие вещества по программе ПЭК.',
        correct: true
      },
      {
        text: 'Пробу воздуха рабочей зоны у оператора площадки.',
        correct: false
      },
      {
        text: 'Газовую пробу на содержание кислорода и влаги для корректировки расчетов концентраций.',
        correct: true
      },
      {
        text: 'Пробу конденсата с внутренней стенки дымовой трубы.',
        correct: false
      }
    ],
    methodQuestion: 'Какие элементы вы обязательно зафиксируете в акте отбора из источника выброса?',
    methodOptions: [
      {
        text: 'Номер источника, схему и высоту точки отбора по ГВС.',
        correct: true
      },
      {
        text: 'Режим работы: нагрузка, вид и расход топлива, наличие резервных агрегатов.',
        correct: true
      },
      {
        text: 'Координаты цеха в WGS‑84 без пересчета в ГСК‑2011.',
        correct: false
      },
      {
        text: 'Температуру и влажность ГВС, время начала и окончания отбора.',
        correct: true
      },
      {
        text: 'Только номер лабораторного протокола измерений.',
        correct: false
      }
    ]
  },
  outfall: {
    title: 'Сброс в реку',
    sampleQuestion: 'Какие типы проб у устья выпуска вы считаете обоснованными?',
    sampleOptions: [
      {
        text: 'Усредненную пробу сточных вод за период, соответствующий методике и режиму работы очистных.',
        correct: true
      },
      {
        text: 'Разовую пробу воды в реке выше по течению от места сброса.',
        correct: false
      },
      {
        text: 'Фоновую пробу воды выше по течению и отдельную пробу смеси в створе разбавления.',
        correct: true
      },
      {
        text: 'Пробу воды только в середине реки без привязки к выпуску.',
        correct: false
      }
    ],
    methodQuestion: 'Что фиксируете в акте при отборе проб в точке сброса?',
    methodOptions: [
      {
        text: 'Номер выпуска и его координаты по ГСК‑2011, тип сброса.',
        correct: true
      },
      {
        text: 'Состояние реки: уровень, скорость течения, ледовые условия.',
        correct: true
      },
      {
        text: 'Цвет и запах воды на глаз, без количественных параметров.',
        correct: false
      },
      {
        text: 'Интервал усреднения пробы и режим работы очистных в этот период.',
        correct: true
      },
      {
        text: 'Только ссылку на договор с лабораторией и номер акта.',
        correct: false
      }
    ]
  },
  well: {
    title: 'Контрольный колодец',
    sampleQuestion: 'Как вы будете отбирать пробу в контрольном колодце?',
    sampleOptions: [
      {
        text: 'Формировать усредненную пробу из нескольких подотборов в течение расчетного времени.',
        correct: true
      },
      {
        text: 'Снимать пробу сразу после проливки колодца насосом без выдержки.',
        correct: false
      },
      {
        text: 'Учитывать объем и скорость притока, чтобы не отбирать застоявшуюся воду.',
        correct: true
      },
      {
        text: 'Отбирать только поверхностный слой без погружения пробоотборника.',
        correct: false
      }
    ],
    methodQuestion: 'Какие сведения обязательно должны попасть в акт?',
    methodOptions: [
      {
        text: 'Номер колодца по схеме сети и его привязка к сооружениям.',
        correct: true
      },
      {
        text: 'Глубину воды и отметку места забора относительно дна.',
        correct: true
      },
      {
        text: 'Только указание «колодец перед очистными» без уточнений.',
        correct: false
      },
      {
        text: 'Интервал усреднения, время начала и окончания отбора.',
        correct: true
      },
      {
        text: 'Только перечень показателей, которые потом исследуют в лаборатории.',
        correct: false
      }
    ]
  },
  szz: {
    title: 'Граница СЗЗ',
    sampleQuestion: 'Какие пробы уместно отбирать на этой точке?',
    sampleOptions: [
      {
        text: 'Пробу атмосферного воздуха на контролируемые загрязняющие вещества.',
        correct: true
      },
      {
        text: 'Пробу воздуха в помещении лаборатории предприятия.',
        correct: false
      },
      {
        text: 'Суточную или сменную пробу воздуха с заданным объемом прокачки.',
        correct: true
      },
      {
        text: 'Пробу осадков с почвы после дождя без учета ветра.',
        correct: false
      }
    ],
    methodQuestion: 'Какие параметры вы внесете в акт по отбору воздуха на границе СЗЗ?',
    methodOptions: [
      {
        text: 'Координаты точки по ГСК‑2011 и высоту отбора над уровнем земли.',
        correct: true
      },
      {
        text: 'Скорость и направление ветра, температуру, давление, влажность.',
        correct: true
      },
      {
        text: 'Только словесное описание «со стороны жилой застройки, ветер слабый».',
        correct: false
      },
      {
        text: 'Перечень работающих в момент отбора источников и их нагрузки.',
        correct: true
      },
      {
        text: 'Только срок действия разрешения на выбросы без фактического режима.',
        correct: false
      }
    ]
  },
  soil: {
    title: 'Площадка отходов НП',
    sampleQuestion: 'Какие пробы вы будете отбирать у площадки с отходами нефтепродуктов?',
    sampleOptions: [
      {
        text: 'Точечные пробы почвы по периметру площадки с последующим объединением.',
        correct: true
      },
      {
        text: 'Пробу почвы только в одной визуально загрязненной точке.',
        correct: false
      },
      {
        text: 'Контрольную пробу почвы вне зоны влияния площадки для сравнения.',
        correct: true
      },
      {
        text: 'Пробу сточной воды из ближайшего ливневого колодца вместо почвы.',
        correct: false
      }
    ],
    methodQuestion: 'Что вы отразите в акте отбора проб почвы?',
    methodOptions: [
      {
        text: 'Схему площадки с координатами и расположением точек отбора.',
        correct: true
      },
      {
        text: 'Глубины отбора и тип пробы (точечная, объединенная).',
        correct: true
      },
      {
        text: 'Только описание «вблизи площадки отходов» без схемы.',
        correct: false
      },
      {
        text: 'Массу объединенных проб и коды контейнеров.',
        correct: true
      },
      {
        text: 'Только предполагаемую причину загрязнения без фактических параметров.',
        correct: false
      }
    ]
  }
};

var modal = document.getElementById('modal');
var modalTitle = document.getElementById('modal-title');
var stepIndicator = document.getElementById('step-indicator');
var modalBody = document.getElementById('modal-body');
var modalFooter = document.getElementById('modal-footer');
var btnCheck = document.getElementById('btn-check');

function openModal(pointKey) {
  state.currentPoint = pointKey;
  state.currentStep = 1;
  state.selectedIndexes = [];
  renderStep();
  modal.style.display = 'flex';
}

function renderStep() {
  var cfg = tasks[state.currentPoint];
  modalFooter.textContent = '';
  modalFooter.className = 'modal-footer';

  modalTitle.textContent = cfg.title;
  modalBody.innerHTML = '';

  var q = document.createElement('div');
  q.className = 'modal-question';

  var optionsData;

  if (state.currentStep === 1) {
    stepIndicator.textContent = 'Шаг 1 из 2 – выберите типы проб';
    q.textContent = cfg.sampleQuestion;
    optionsData = cfg.sampleOptions;
  } else {
    stepIndicator.textContent = 'Шаг 2 из 2 – выберите, что отразить в акте';
    q.textContent = cfg.methodQuestion;
    optionsData = cfg.methodOptions;
  }

  modalBody.appendChild(q);

  var list = document.createElement('ul');
  list.className = 'options';

  optionsData.forEach(function(opt, index) {
    var li = document.createElement('li');
    li.className = 'option';
    li.dataset.index = index;

    var box = document.createElement('div');
    box.className = 'option-checkbox';

    var text = document.createElement('div');
    text.className = 'option-text';
    text.textContent = opt.text;

    li.appendChild(box);
    li.appendChild(text);

    li.addEventListener('click', function() {
      toggleSelect(li);
    });

    list.appendChild(li);
  });

  modalBody.appendChild(list);
}

function toggleSelect(li) {
  var idx = parseInt(li.dataset.index, 10);
  var pos = state.selectedIndexes.indexOf(idx);
  if (pos === -1) {
    state.selectedIndexes.push(idx);
    li.classList.add('selected');
  } else {
    state.selectedIndexes.splice(pos, 1);
    li.classList.remove('selected');
  }
}

btnCheck.addEventListener('click', function() {
  if (!state.currentPoint) return;
  if (state.selectedIndexes.length === 0) {
    modalFooter.textContent = 'Выберите хотя бы один вариант.';
    modalFooter.className = 'modal-footer';
    return;
  }

  var cfg = tasks[state.currentPoint];
  var optionsData = state.currentStep === 1 ? cfg.sampleOptions : cfg.methodOptions;

  var listEls = modalBody.querySelectorAll('.option');

  var anyWrong = false;
  var missedCorrect = false;

  optionsData.forEach(function(opt, index) {
    var li = Array.from(listEls).find(function(el){ return parseInt(el.dataset.index,10) === index; });
    var selected = state.selectedIndexes.indexOf(index) !== -1;

    li.classList.remove('correct','wrong');

    if (selected && opt.correct) {
      li.classList.add('correct');
    }
    if (selected && !opt.correct) {
      li.classList.add('wrong');
      anyWrong = true;
    }
    if (!selected && opt.correct) {
      missedCorrect = true;
    }
  });

  if (!anyWrong && !missedCorrect) {
    // все правильные выбраны
    if (state.currentStep === 1) {
      modalFooter.textContent = 'Типы проб выбраны корректно. Теперь оформим акт для этой точки.';
      modalFooter.className = 'modal-footer modal-footer_ok';
      // переход ко второму шагу
      setTimeout(function() {
        state.currentStep = 2;
        state.selectedIndexes = [];
        renderStep();
      }, 800);
    } else {
      modalFooter.textContent = 'Вы отметили все важные элементы акта. Точка зачтена.';
      modalFooter.className = 'modal-footer modal-footer_ok';
      state.completed[state.currentPoint] = true;
      updatePointStatus(state.currentPoint);
    }
  } else {
    if (state.currentStep === 1) {
      modalFooter.textContent = 'Пересмотрите выбор. Для этой точки нужны именно те пробы, которые обеспечивают репрезентативность.';
    } else {
      modalFooter.textContent = 'Какие то важные строки акта вы пропустили или добавили лишние. Попробуйте еще раз.';
    }
    modalFooter.className = 'modal-footer';
  }
});

document.getElementById('modal-close').addEventListener('click', function(){
  modal.style.display = 'none';
});

document.querySelectorAll('.point').forEach(function(p) {
  p.addEventListener('click', function() {
    openModal(p.dataset.key);
  });
});

function updatePointStatus(key) {
  var dot = document.querySelector('.progress-dot[data-dot="'+key+'"]');
  if (dot) dot.classList.add('done');
  var point = document.querySelector('.point[data-key="'+key+'"]');
  if (point) point.classList.add('done');
}
</script>
</body>
</html>
