<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Интерактив: кто за что отвечает</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;500;600;700&display=swap');

:root {
  --bg-silk: #f3fbf7;
  --green-accent: #007760;
  --green-border: #19a86e;
  --text-dark: #2c2c2c;
  --success: #2e7d32;
  --error: #d32f2f;
}

body {
  font-family: 'Montserrat', sans-serif;
  background-color: var(--bg-silk);
  margin: 0;
  padding: 5px;
  display: flex;
  justify-content: center;
  overflow-x: hidden;
}

#roles-panel {
  background: #ffffff;
  border: 1px solid var(--green-border);
  border-radius: 4px;
  padding: 14px 18px;
  width: 100%;
  max-width: 560px;
  max-height: 800px;
  box-shadow: 0 24px 60px rgba(0,119,96,0.18);
  display: flex;
  flex-direction: column;
  box-sizing: border-box;
  position: relative;
}

header {
  text-align: left;
  margin-bottom: 10px;
  border-bottom: 1px solid rgba(0,119,96,0.12);
  padding-bottom: 8px;
}

h2 {
  font-family: 'Montserrat', sans-serif;
  color: var(--green-accent);
  font-size: 22px;
  margin: 0;
  text-transform: uppercase;
}

.intro {
  font-size: 13px;
  color: var(--text-dark);
  margin-top: 6px;
}

/* сетка */

.console-grid {
  display: grid;
  grid-template-columns: minmax(120px, 1fr) 1.2fr minmax(120px, 1fr);
  gap: 10px;
  align-items: stretch;
  margin-top: 8px;
}

/* стопки */

.storage-panel {
  background: #f6faf7;
  border: 1px solid #d4e3da;
  border-radius: 8px;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  overflow-y: auto;
  max-height: 260px;
}

.storage-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--green-accent);
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 4px;
  padding-bottom: 4px;
  border-bottom: 1px solid #d4e3da;
}

/* монитор */

.monitor {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: radial-gradient(circle, #ffffff 0%, #f3fbf7 100%);
  border: 2px solid var(--green-border);
  border-radius: 12px;
  padding: 14px;
  position: relative;
  box-shadow: inset 0 0 30px rgba(0,119,96,0.06);
  min-height: 200px;
}

.data-card {
  font-size: 14px;
  font-weight: 600;
  text-align: center;
  color: var(--text-dark);
  line-height: 1.3;
  margin-bottom: 16px;
  min-height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: slideIn 0.4s ease;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.controls {
  display: flex;
  gap: 8px;
  width: 100%;
  justify-content: center;
  flex-wrap: wrap;
}

.btn-action {
  padding: 8px 14px;
  border-radius: 16px;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  cursor: pointer;
  transition: 0.25s;
  border: 1px solid var(--green-accent);
  background: #ffffff;
  color: var(--green-accent);
  min-width: 140px;
  box-shadow: 0 8px 18px rgba(0,119,96,0.12);
}

.btn-action:hover {
  transform: translateY(-2px);
  box-shadow: 0 14px 26px rgba(0,119,96,0.18);
}

.btn-ecolog {
  background: linear-gradient(135deg, #19a86e, #007760);
  color: #ffffff;
}

.btn-lab {
  background: #ffffff;
  color: var(--green-accent);
}

.final-btn {
  margin: 10px auto 0;
  background: linear-gradient(135deg, #19a86e, #007760);
  color: white;
  padding: 9px 26px;
  border: none;
  border-radius: 16px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  display: none;
  box-shadow: 0 10px 22px rgba(0,119,96,0.22);
}

/* элементы в стопках */

.logged-item {
  font-size: 12px;
  padding: 6px 7px;
  background: #ffffff;
  border: 1px solid #d4e3da;
  border-radius: 4px;
  cursor: pointer;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.is-correct {
  border-left: 4px solid var(--success);
}

.is-wrong {
  border-left: 4px solid var(--error);
}

/* нижняя строка */

#status-bar {
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  margin-top: 8px;
}

/* модальное окно */

.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 50;
}

.modal {
  background: #ffffff;
  border-radius: 6px;
  border: 1px solid #e0e0e0;
  max-width: 420px;
  width: 90%;
  padding: 10px 12px 12px 12px;
  box-shadow: 0 16px 40px rgba(0,0,0,0.25);
  font-size: 13px;
}

.modal-title {
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--green-accent);
}

.modal-text {
  font-size: 13px;
  color: var(--text-dark);
  margin-bottom: 6px;
}

.modal-extra {
  font-size: 12px;
  color: #555555;
}

.modal-close {
  margin-top: 6px;
  text-align: right;
  font-size: 11px;
  color: #666666;
  cursor: pointer;
  text-decoration: underline;
}

/* мобильная адаптация */

@media (max-width: 480px) {
  #roles-panel {
    padding: 10px 12px;
  }
  .console-grid {
    grid-template-columns: 1fr;
  }
  .storage-panel {
    max-height: 160px;
  }
}
</style>
</head>
<body>
<div id="roles-panel">
  <header>
    <h2>Кто за что отвечает</h2>
    <div class="intro">
      Перед вами утверждения про отбор проб. Переложите их в стопки «Эколог» и «Лаборатория». После проверки нажимайте на карточки, чтобы читать комментарии.
    </div>
  </header>

  <div class="console-grid">
    <div class="storage-panel">
      <div class="storage-title">Эколог</div>
      <div id="stack-ecolog"></div>
    </div>

    <div class="monitor">
      <div id="current-data" class="data-card">Загрузка утверждений...</div>
      <div class="controls" id="control-buttons">
        <button class="btn-action btn-ecolog" onclick="processChoice('ecolog')">Эколог</button>
        <button class="btn-action btn-lab" onclick="processChoice('lab')">Лаборатория</button>
      </div>
      <button id="finish-btn" class="final-btn" onclick="audit()">Проверить распределение</button>
    </div>

    <div class="storage-panel">
      <div class="storage-title">Лаборатория</div>
      <div id="stack-lab"></div>
    </div>
  </div>

  <div id="status-bar"></div>
</div>

<!-- модальное окно -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" id="modal-box">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-text" id="modal-text"></div>
    <div class="modal-extra" id="modal-extra"></div>
    <div class="modal-close" id="modal-close">Скрыть комментарий</div>
  </div>
</div>

<script>
const statementsSource = [
  // эколог (3)
  {
    id: 1,
    text: "Выбрать точки отбора и зафиксировать их в программе ПЭК.",
    correctRole: "ecolog",
    explanationTitle: "Кто решает, где брать пробы",
    explanationText:
      "Лаборатория при отборе может предложть точки для измерений, но ответственность за соответситвие с программой ПЭК несет предприятие. Если точки выбраны неудачно или не совпадают с документами, инспектор придет к экологу.",
    explanationExtra:
      "Вывод. Держите схему источников и программу ПЭК под рукой и проверяйте каждое предложение по выбору точки."
  },
  {
    id: 2,
    text: "Проверить, что у лаборатории есть аккредитация на нужные показатели и среды.",
    correctRole: "ecolog",
    explanationTitle: "Кто отвечает за выбор подрядчика",
    explanationText:
      "Лаборатория отвечает за свой аттестат, но именно предприятие решает, с кем заключать договор. Если аккредитации нет, это сочтут недоработкой предприятия, а не только подрядчика.",
    explanationExtra:
      "Вывод. Перед договором запросите область аккредитации и сравните ее с перечнем веществ и сред в ПЭК и НВОС."
  },
  {
    id: 3,
    text: "Следить, чтобы отбор проб шел по графику ПЭК и попадал в отчеты и служебные записки.",
    correctRole: "ecolog",
    explanationTitle: "Кто собирает картину целиком",
    explanationText:
      "Лаборатория видит отдельные заявки. Только эколог видит весь график ПЭК, сроки отчетности и связи между точками. Если замеры не попали в отчеты, спрашивать будут с предприятия.",
    explanationExtra:
      "Вывод. Ведите свой календарь замеров и регулярно сверяйте его с протоколами и готовыми отчетами."
  },
  // лаборатория (3)
  {
    id: 4,
    text: "Настроить оборудование, отобрать пробу и доставить ее в лабораторию в нужные сроки.",
    correctRole: "lab",
    explanationTitle: "Кто ведет технику отбора",
    explanationText:
      "Техническая часть отбора – зона ответственности лаборатории или службы мониторинга. Они выбирают методики, настраивают оборудование и несут ответственность за условия и сроки доставки проб.",
    explanationExtra:
      "Вывод. Эколог не обязан знать каждуую методику, но должен понимать, как выглядит корректный отбор, чтобы замечать нарушения."
  },
  {
    id: 5,
    text: "Выбрать методики анализа и отвечать за точность лабораторных измерений.",
    correctRole: "lab",
    explanationTitle: "Кто выбирает методики",
    explanationText:
      "Лаборатория работает по утвержденным методикам в рамках аккредитации. Она отвечает за выбор методики, калибровку и расчеты.",
    explanationExtra:
      "Вывод. Смотрите, по каким методикам выполнены анализы, и подходят ли они для ваших задач, но не пытайтесь делать работу лаборанта."
  },
  {
    id: 6,
    text: "Оформить протокол анализа с указанием методик, погрешности и области применения результата.",
    correctRole: "lab",
    explanationTitle: "Кто оформляет протокол анализа",
    explanationText:
      "Протокол анализа – документ лаборатории. В нем отражают методики, условия измерений и погрешности. По нему инспектор оценивает, можно ли доверять значениям.",
    explanationExtra:
      "Вывод. Эколог проверяет, что протокол оформлен полно и читаемо, но ответственность за содержание несет лаборатория."
  }
];

let statements = [];
let index = 0;
const userAnswers = [];

const currentDataEl = document.getElementById('current-data');
const controlButtons = document.getElementById('control-buttons');
const finishBtn = document.getElementById('finish-btn');
const stackEcolog = document.getElementById('stack-ecolog');
const stackLab = document.getElementById('stack-lab');
const statusBar = document.getElementById('status-bar');

const modalBackdrop = document.getElementById('modal-backdrop');
const modalTitle = document.getElementById('modal-title');
const modalText = document.getElementById('modal-text');
const modalExtra = document.getElementById('modal-extra');
const modalClose = document.getElementById('modal-close');

let checked = false;
let lastOpenedId = null;

function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

function init() {
  // гарантированно по 3 на каждую роль уже есть; просто рандомизируем порядок
  statements = shuffle([...statementsSource]);
  updateMonitor();
}

function updateMonitor() {
  if (index < statements.length) {
    currentDataEl.textContent = statements[index].text;
    currentDataEl.style.animation = 'none';
    currentDataEl.offsetHeight;
    currentDataEl.style.animation = null;
  } else {
    currentDataEl.textContent = "Все утверждения разложены.";
    controlButtons.style.display = 'none';
    finishBtn.style.display = 'inline-block';
  }
}

function processChoice(role) {
  if (index >= statements.length) return;
  const item = statements[index];

  const node = document.createElement('div');
  node.className = 'logged-item';
  node.textContent = item.text;
  node.dataset.id = item.id;
  node.addEventListener('click', () => {
    if (checked) showExplanation(item.id);
  });

  if (role === 'ecolog') {
    stackEcolog.appendChild(node);
  } else {
    stackLab.appendChild(node);
  }

  userAnswers.push({ item, userRole: role, node });

  index++;
  updateMonitor();
}

function audit() {
  let errors = 0;
  userAnswers.forEach(ans => {
    const ok = ans.userRole === ans.item.correctRole;
    ans.node.classList.add(ok ? 'is-correct' : 'is-wrong');
    if (!ok) errors++;
  });

  if (errors === 0) {
    statusBar.textContent = "Роли распределены верно. Нажимайте на карточки, чтобы углубиться в пояснения.";
    statusBar.style.color = "var(--success)";
  } else {
    statusBar.textContent = "Часть ролей перепутана. Кликните по карточкам и посмотрите, кто за что отвечает в реальности.";
    statusBar.style.color = "var(--error)";
  }

  finishBtn.textContent = "Пройти еще раз";
  finishBtn.onclick = () => location.reload();
  checked = true;
}

function showExplanation(id) {
  if (!checked) return;
  const item = statementsSource.find(s => s.id === id);
  if (!item) return;

  if (lastOpenedId === id && modalBackdrop.style.display === 'flex') {
    hideModal();
    return;
  }

  modalTitle.textContent = item.explanationTitle;
  modalText.textContent = item.explanationText;
  modalExtra.textContent = item.explanationExtra;

  modalBackdrop.style.display = 'flex';
  lastOpenedId = id;
}

function hideModal() {
  modalBackdrop.style.display = 'none';
  lastOpenedId = null;
}

modalClose.addEventListener('click', hideModal);
modalBackdrop.addEventListener('click', (e) => {
  if (e.target === modalBackdrop) hideModal();
});

window.onload = init;
window.processChoice = processChoice;
window.audit = audit;
</script>
</body>
</html>
