<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Интерактивный глоссарий</title>
  <style>
    :root {
      --accent: #2f6b3d;
      --accent-dark: #214d2b;
      --surface: rgba(255,255,255,0.95);
      --text: #1f2a22;
      --muted: #5d6c63;
      --line: rgba(47,107,61,0.18);
      --shadow: 0 18px 50px rgba(24,48,31,0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f3ef;
      color: var(--text);
    }

    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
    }

    .stage {
      position: relative;
      width: 100%;
      max-width: 1600px;
      margin: 0 auto;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 10px 35px rgba(0,0,0,0.08);
      background: #fff;
    }

    .stage img {
      display: block;
      width: 100%;
      height: auto;
    }

    .hotspot {
      position: absolute;
      width: 3.2%;
      aspect-ratio: 1;
      min-width: 22px;
      min-height: 22px;
      border: none;
      border-radius: 999px;
      background: rgba(255,255,255,0.78);
      box-shadow: 0 0 0 2px rgba(47,107,61,0.55), 0 6px 18px rgba(0,0,0,0.16);
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .hotspot::before,
    .hotspot::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      background: var(--accent);
      transform: translate(-50%, -50%);
      border-radius: 2px;
    }

    .hotspot::before {
      width: 38%;
      height: 3px;
    }

    .hotspot::after {
      width: 3px;
      height: 38%;
    }

    .hotspot:hover,
    .hotspot:focus-visible {
      transform: scale(1.08);
      background: rgba(255,255,255,0.96);
      box-shadow: 0 0 0 3px rgba(47,107,61,0.65), 0 8px 24px rgba(0,0,0,0.2);
      outline: none;
    }

    .hint {
      margin: 14px auto 0;
      max-width: 900px;
      text-align: center;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(17,28,20,0.46);
      backdrop-filter: blur(6px);
      z-index: 1000;
    }

    .overlay.open {
      display: flex;
    }

    .modal {
      position: relative;
      width: min(720px, 100%);
      max-height: min(82vh, 900px);
      overflow: auto;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 26px 24px 22px;
      box-shadow: var(--shadow);
    }

    .close {
      position: absolute;
      right: 14px;
      top: 14px;
      width: 38px;
      height: 38px;
      border: none;
      border-radius: 999px;
      background: rgba(47,107,61,0.08);
      color: var(--accent-dark);
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
    }

    .eyebrow {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(47,107,61,0.09);
      color: var(--accent-dark);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .title {
      margin: 14px 0 10px;
      font-size: 30px;
      line-height: 1.1;
      color: var(--accent-dark);
    }

    .text {
      font-size: 18px;
      line-height: 1.58;
      color: var(--text);
    }

    @media (max-width: 900px) {
      .wrap { padding: 12px; }
      .title { font-size: 24px; }
      .text { font-size: 16px; }
      .hotspot { width: 4.2%; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="stage">
      <img src="./001_Untitledgenially.jpg" alt="Иллюстрация с терминами экологического контроля" />

      <!-- ПЭК: иконка слева вверху -->
      <button class="hotspot" style="left: 18%; top: 19%;" data-key="pek" aria-label="Открыть определение ПЭК"></button>

      <!-- ПДК: колба вверху по центру -->
      <button class="hotspot" style="left: 51%; top: 23%;" data-key="pdk" aria-label="Открыть определение ПДК"></button>

      <!-- НДВ: значок графика справа вверху -->
      <button class="hotspot" style="left: 71%; top: 21%;" data-key="ndv" aria-label="Открыть определение НДВ"></button>

      <!-- НВОС: гистограмма слева посередине -->
      <button class="hotspot" style="left: 14%; top: 40%;" data-key="nvos" aria-label="Открыть определение НВОС"></button>

      <!-- ГОСТ: папка с лупой ближе к центру -->
      <button class="hotspot" style="left: 58%; top: 43%;" data-key="gost" aria-label="Открыть определение ГОСТ"></button>

      <!-- Лаборатория: колба справа, ближе к центру -->
      <button class="hotspot" style="left: 82%; top: 38%;" data-key="laboratory" aria-label="Открыть определение лаборатории"></button>

      <!-- ПНД Ф: папка с лупой слева снизу -->
      <button class="hotspot" style="left: 15%; top: 70%;" data-key="pndf" aria-label="Открыть определение ПНД Ф"></button>

      <!-- Протокол исследований: планшет со значком слева от подписи -->
      <button class="hotspot" style="left: 63%; top: 76%;" data-key="protocol" aria-label="Открыть определение протокола лабораторных исследований"></button>

      <!-- Акт отбора проб: колба возле подписи -->
      <button class="hotspot" style="left: 86%; top: 74%;" data-key="act" aria-label="Открыть определение акта отбора проб"></button>
    </div>

    <p class="hint">Нажмите на значки на иллюстрации, чтобы открыть короткие и понятные определения терминов из урока.</p>
  </div>

  <div class="overlay" id="overlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="close" id="closeBtn" aria-label="Закрыть">×</button>
      <div class="eyebrow">Глоссарий</div>
      <h2 class="title" id="modal-title"></h2>
      <div class="text" id="modal-text"></div>
    </div>
  </div>

  <script>
    const glossary = {
      pek: {
        title: 'ПЭК',
        text: 'Производственный экологический контроль – это система, по которой предприятие регулярно проверяет свои выбросы и сбросы и сравнивает их с нормативами. Она помогает вовремя увидеть проблему, корректно подготовить отчеты, спокойнее проходить проверки и в итоге снижать экологические риски для людей и территории вокруг предприятия.'
      },
      pdk: {
        title: 'ПДК',
        text: 'Предельно допустимая концентрация – это максимально возможное содержание вещества в воздухе, воде или почве, при котором воздействие на человека и природу считается безопасным. Результаты измерений сравнивают с ПДК, чтобы увидеть, где риск уже превышает норму и нужно снижать выбросы или менять технологию.'
      },
      ndv: {
        title: 'НДВ',
        text: 'Нормативы допустимых выбросов – это установленные для предприятия или конкретного источника предельные количества загрязняющих веществ, которые можно выбрасывать в воздух. Пробы берут не для галочки, а чтобы по результатам измерений понять, укладываются ли реальные выбросы в эти нормативы или их уже нужно снижать.'
      },
      nvos: {
        title: 'НВОС',
        text: 'Негативное воздействие на окружающую среду – это все, чем предприятие ухудшает состояние природы: выбросы в воздух, сбросы в воду, отходы и другие факторы. Если эколог правильно описывает НВОС, он точнее считает плату за воздействие, выделяет приоритетные источники для контроля и выбирает те точки отбора проб, где риски для природы и людей максимальные.'
      },
      gost: {
        title: 'ГОСТ',
        text: 'Государственный стандарт – это документ, где подробно описано, как проводить измерения: какое оборудование использовать, как готовить и отбирать пробы, в каких условиях работать. ГОСТы по отбору проб нужны, чтобы вы действовали по единым правилам и чтобы результаты измерений принимали надзорные органы.'
      },
      laboratory: {
        title: 'Лаборатория',
        text: 'В уроках мы будем использовать слово «лаборатория» как общее название организации, которая проводит исследования проб по ПЭК. Для удобства считаем, что лаборатория и мониторинговая организация здесь равны по роли: обе принимают пробы, выполняют измерения и выдают протоколы, на которые опирается эколог. На практике лаборатория чаще отвечает за анализы, методики, приборы и точность результатов, а мониторинговая организация может дополнительно организовывать выезд, отбор проб, логистику и работу с подрядчиками.'
      },
      pndf: {
        title: 'ПНД Ф',
        text: 'ПНД Ф – это федеративные природоохранные нормативные документы с методиками отбора проб и измерения загрязняющих веществ. По ним лаборатория выбирает, как именно проводить анализы, а эколог по ссылке на ПНД Ф в протоколе понимает, по каким правилам получили результат и можно ли на него опираться.'
      },
      protocol: {
        title: 'Протокол лабораторных исследований',
        text: 'Протокол лабораторных исследований – документ, где лаборатория фиксирует результаты измерений: концентрации веществ, использованные методики и приборы, погрешности и подписи ответственных. На протоколы опираются при подготовке отчетности по ПЭК, расчете платы за НВОС и доказательстве того, что предприятие выполняет установленные нормативы.'
      },
      act: {
        title: 'Акт отбора проб',
        text: 'Акт отбора проб – документ, в котором фиксируют, где, когда, как и при каких условиях взяли пробы или провели измерения. Он связывает реальную ситуацию на источнике с цифрами в протоколах и отчетах, поэтому без акта результаты легко оспорить или не принять.'
      }
    };

    const buttons = document.querySelectorAll('.hotspot');
    const overlay = document.getElementById('overlay');
    const modalTitle = document.getElementById('modal-title');
    const modalText = document.getElementById('modal-text');
    const closeBtn = document.getElementById('closeBtn');

    function openModal(key) {
      const item = glossary[key];
      if (!item) return;
      modalTitle.textContent = item.title;
      modalText.textContent = item.text;
      overlay.classList.add('open');
      overlay.setAttribute('aria-hidden', 'false');
    }

    function closeModal() {
      overlay.classList.remove('open');
      overlay.setAttribute('aria-hidden', 'true');
    }

    buttons.forEach(button => {
      button.addEventListener('click', () => openModal(button.dataset.key));
    });

    closeBtn.addEventListener('click', closeModal);

    overlay.addEventListener('click', (event) => {
      if (event.target === overlay) closeModal();
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') closeModal();
    });
  </script>
</body>
</html>
