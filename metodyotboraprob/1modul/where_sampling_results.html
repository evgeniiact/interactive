<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>lab-results-interactive</title>
  <style>
    :root {
      --bg: #ffffff;
      --card: #f4faf6;
      --card-active: #e6f4ea;
      --border: #cfe3d6;
      --text: #183126;
      --muted: #4b6758;
      --accent: #2f7d57;
      --accent-dark: #256447;
      --overlay: rgba(17, 39, 28, 0.34);
      --shadow: 0 10px 28px rgba(39, 84, 58, 0.12);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
    }

    body {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 12px;
    }

    .app {
      width: 560px;
      height: 800px;
      min-width: 560px;
      max-width: 560px;
      min-height: 800px;
      max-height: 800px;
      background: #fff;
      overflow: hidden;
      position: relative;
    }

    .panel {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 12px;
    }

    .card-btn {
      width: 100%;
      min-height: 108px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      color: var(--text);
      text-align: left;
      padding: 18px 20px;
      font-size: 21px;
      line-height: 1.2;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      transition: background-color .18s ease, border-color .18s ease, transform .18s ease, box-shadow .18s ease;
      box-shadow: 0 3px 10px rgba(39, 84, 58, 0.04);
    }

    .card-btn:hover {
      background: #eef8f1;
      border-color: #b8d3c1;
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }

    .card-btn:active {
      transform: translateY(0);
    }

    .card-btn.is-active {
      background: var(--card-active);
      border-color: #9fc8ad;
      box-shadow: var(--shadow);
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: var(--overlay);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
    }

    .overlay.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -48%);
      width: calc(100% - 36px);
      max-width: 524px;
      max-height: 690px;
      background: #ffffff;
      border: 1px solid #d6e7dc;
      border-radius: 22px;
      box-shadow: 0 18px 48px rgba(18, 45, 31, 0.22);
      padding: 20px 20px 18px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .modal.is-open {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, -50%);
    }

    .modal-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .modal-title {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      font-weight: 800;
      color: var(--accent-dark);
      max-width: 420px;
    }

    .close-btn {
      flex: 0 0 auto;
      width: 38px;
      height: 38px;
      border-radius: 999px;
      border: 1px solid #d4e2d8;
      background: #f8fbf9;
      font-size: 24px;
      line-height: 1;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .close-btn:hover {
      background: #eef6f1;
      color: var(--accent-dark);
    }

    .modal-body {
      overflow: auto;
      padding-right: 6px;
    }

    .modal-body p {
      margin: 0 0 12px;
      font-size: 17px;
      line-height: 1.5;
      color: var(--text);
    }

    .modal-body p:last-child {
      margin-bottom: 0;
    }

    .modal-body::-webkit-scrollbar {
      width: 8px;
    }

    .modal-body::-webkit-scrollbar-thumb {
      background: #c8dbcf;
      border-radius: 999px;
    }
  </style>
</head>
<body>
  <div class="app" aria-label="Интерактив о значении результатов лабораторных исследований">
    <div class="panel">
      <button class="card-btn" data-key="pek">При разработке и корректировке программы ПЭК</button>
      <button class="card-btn" data-key="fees">При расчете платы за негативное воздействие и отчетности</button>
      <button class="card-btn" data-key="planned">При плановой проверке</button>
      <button class="card-btn" data-key="complaint">При внеплановой проверке по жалобе</button>
      <button class="card-btn" data-key="incident">При производственных инцидентах</button>
    </div>

    <div class="overlay" id="overlay"></div>

    <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <h2 class="modal-title" id="modalTitle"></h2>
        <button class="close-btn" id="closeBtn" aria-label="Закрыть окно">×</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script>
    const content = {
      pek: {
        title: 'При разработке и корректировке программы ПЭК',
        text: [
          'Программу ПЭК составляют под конкретный объект. Для этого используют данные инвентаризации, сведения о технологии, информацию о сырье и оборудовании, а также результаты предыдущего контроля.',
          'Измерения помогают понять, какие вещества и факторы надо контролировать, где отбирать пробы и как часто проводить контроль.',
          'Если пробы отобраны грамотно, а результаты оформлены без ошибок, программу легче обосновать. Тогда ниже риск замечаний, предписаний и требований включить лишние точки или показатели.'
        ]
      },
      fees: {
        title: 'При расчете платы за негативное воздействие и отчетности',
        text: [
          'Результаты анализов используют не только для внутреннего контроля. Они нужны и для расчетов, и для отчетных документов.',
          'Важно не просто получить цифры, а подтвердить, как именно их получили. Для этого должны быть правильно выбраны точки отбора, соблюден порядок отбора проб, оформлены акты и протоколы, а лаборатория должна иметь аккредитацию по нужным показателям.',
          'Если эти условия не выполнены, результаты могут признать ненадежными. Тогда предприятие теряет сильную доказательную базу при защите расчетов и отчетности.'
        ]
      },
      planned: {
        title: 'При плановой проверке',
        text: [
          'На плановой проверке инспектор смотрит не только итоговые значения. Он проверяет всю цепочку получения результата.',
          'Ему важно, где отбирали пробу, совпадает ли точка с программой ПЭК, кто выполнял отбор, как оформлены акт и протокол, какая лаборатория проводила анализ и входит ли нужный показатель в ее область аккредитации.',
          'Если в этой цепочке есть ошибки, результаты могут не принять как надлежащее подтверждение. Поэтому для эколога важны не только анализы, но и вся сопроводительная документация.'
        ]
      },
      complaint: {
        title: 'При внеплановой проверке по жалобе',
        text: [
          'Внеплановая проверка часто начинается без запаса времени. Жалоба жителей, организаций или органов власти может потребовать быстро показать, что контроль ведется регулярно.',
          'Если у эколога на руках есть свежие измерения, акты отбора проб, протоколы и сведения о лаборатории, он может сразу подтвердить, что предприятие не действует вслепую.',
          'Это не отменяет проверку, но делает позицию предприятия устойчивее. Если таких данных нет, объяснения выглядят слабо.'
        ]
      },
      incident: {
        title: 'При производственных инцидентах',
        text: [
          'После разлива, аварийного выброса или другой нештатной ситуации особенно важны фоновые данные. Они показывают, в каком состоянии были воздух, вода или почва до инцидента.',
          'Без таких данных трудно отделить последствия аварии от того воздействия, которое уже существовало раньше.',
          'Если регулярный мониторинг выстроен правильно, у предприятия есть точка отсчета. На ее основе проще оценить последствия, рассчитать ущерб и снизить риск завышенных выводов со стороны проверяющих.'
        ]
      }
    };

    const buttons = Array.from(document.querySelectorAll('.card-btn'));
    const overlay = document.getElementById('overlay');
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modalTitle');
    const modalBody = document.getElementById('modalBody');
    const closeBtn = document.getElementById('closeBtn');

    let activeKey = null;

    function renderContent(key) {
      const item = content[key];
      modalTitle.textContent = item.title;
      modalBody.innerHTML = item.text.map(par => `<p>${par}</p>`).join('');
    }

    function setActiveButton(key) {
      buttons.forEach(btn => {
        btn.classList.toggle('is-active', btn.dataset.key === key);
      });
    }

    function openModal(key) {
      activeKey = key;
      renderContent(key);
      setActiveButton(key);
      overlay.classList.add('is-open');
      modal.classList.add('is-open');
    }

    function closeModal() {
      activeKey = null;
      setActiveButton(null);
      overlay.classList.remove('is-open');
      modal.classList.remove('is-open');
    }

    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        const key = btn.dataset.key;
        if (activeKey === key) {
          closeModal();
          return;
        }
        openModal(key);
      });
    });

    closeBtn.addEventListener('click', closeModal);
    overlay.addEventListener('click', closeModal);

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && activeKey) {
        closeModal();
      }
    });
  </script>
</body>
</html>
