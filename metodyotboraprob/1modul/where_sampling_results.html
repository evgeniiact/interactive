<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Интерактив ПЭК</title>
  <style>
    :root {
      --bg: #ffffff;
      --card: #f4faf6;
      --card-hover: #ecf7f0;
      --card-active: #dff0e5;
      --text: #173326;
      --muted: #4b6a59;
      --border: #cfe2d5;
      --accent: #2f7d57;
      --accent-dark: #226546;
      --shadow: 0 14px 40px rgba(20, 54, 36, 0.10);
      --overlay: rgba(20, 36, 28, 0.16);
      --radius: 22px;
      --radius-sm: 16px;
      --transition: 180ms ease;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
    }

    body {
      display: grid;
      place-items: start center;
      min-height: 100vh;
      padding: 16px;
    }

    .interactive {
      position: relative;
      width: 560px;
      height: 800px;
      background: var(--bg);
      overflow: hidden;
      border-radius: 24px;
    }

    .stack {
      position: absolute;
      inset: 0;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card-btn {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      border-radius: var(--radius);
      padding: 18px 20px;
      text-align: left;
      cursor: pointer;
      min-height: 92px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      transition:
        background var(--transition),
        border-color var(--transition),
        transform var(--transition),
        box-shadow var(--transition);
      box-shadow: 0 4px 14px rgba(35, 85, 59, 0.04);
    }

    .card-btn:hover {
      background: var(--card-hover);
      border-color: #bdd6c6;
      transform: translateY(-1px);
    }

    .card-btn:active {
      transform: translateY(0);
    }

    .card-btn.is-active {
      background: var(--card-active);
      border-color: #9dc8ad;
      box-shadow: 0 10px 20px rgba(35, 85, 59, 0.08);
    }

    .card-btn__text {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .card-btn__title {
      font-size: 20px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .card-btn__hint {
      font-size: 14px;
      line-height: 1.35;
      color: var(--muted);
    }

    .card-btn__icon {
      flex: 0 0 auto;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #ffffff;
      border: 1px solid #d7e7dc;
      color: var(--accent);
    }

    .modal-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .modal-layer.is-open {
      pointer-events: auto;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: var(--overlay);
      opacity: 0;
      transition: opacity var(--transition);
    }

    .modal-layer.is-open .overlay {
      opacity: 1;
    }

    .modal {
      position: absolute;
      left: 16px;
      top: 16px;
      width: 528px;
      height: 744px;
      background: #ffffff;
      border: 1px solid #d7e7dc;
      border-radius: 24px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      opacity: 0;
      transform: translateY(8px) scale(0.985);
      transition:
        opacity var(--transition),
        transform var(--transition);
    }

    .modal-layer.is-open .modal {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .modal__head {
      flex: 0 0 auto;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 18px 14px;
      border-bottom: 1px solid #e3efe7;
      background: #ffffff;
    }

    .modal__title-wrap {
      min-width: 0;
    }

    .modal__eyebrow {
      font-size: 12px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .modal__title {
      margin: 0;
      font-size: 25px;
      line-height: 1.14;
      letter-spacing: -0.02em;
      font-weight: 800;
      color: var(--text);
    }

    .modal__close {
      appearance: none;
      border: 1px solid #d7e7dc;
      background: #f7fbf8;
      color: var(--accent-dark);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      transition:
        background var(--transition),
        border-color var(--transition),
        transform var(--transition);
    }

    .modal__close:hover {
      background: #eef7f1;
      border-color: #bdd6c6;
    }

    .modal__body {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 18px 20px 24px;
      scrollbar-width: thin;
      scrollbar-color: #b9d2c3 transparent;
    }

    .modal__body::-webkit-scrollbar {
      width: 8px;
    }

    .modal__body::-webkit-scrollbar-thumb {
      background: #bfd6c8;
      border-radius: 999px;
    }

    .modal__body p {
      margin: 0 0 14px;
      font-size: 16px;
      line-height: 1.55;
      color: #204031;
    }

    .modal__body p:last-child {
      margin-bottom: 0;
    }

    .modal__body strong {
      color: #143325;
    }

    @media (max-width: 620px) {
      body {
        padding: 0;
      }

      .interactive {
        width: 100vw;
        height: 100vh;
        border-radius: 0;
      }

      .modal {
        left: 12px;
        top: 12px;
        width: calc(100% - 24px);
        height: calc(100% - 24px);
      }

      .stack {
        padding: 14px;
      }

      .card-btn {
        min-height: 88px;
      }

      .card-btn__title {
        font-size: 18px;
      }

      .modal__title {
        font-size: 22px;
      }

      .modal__body p {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="interactive" id="interactive">
    <div class="stack">
      <button class="card-btn" type="button" data-key="pek">
        <span class="card-btn__text">
          <span class="card-btn__title">Разработка и корректировка программы ПЭК</span>
          <span class="card-btn__hint">Что дают корректные данные для программы контроля</span>
        </span>
        <span class="card-btn__icon" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M5 19h14M7 16V8m5 8V5m5 11v-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </span>
      </button>

      <button class="card-btn" type="button" data-key="nvos">
        <span class="card-btn__text">
          <span class="card-btn__title">Расчет платы за НВОС и отчетность</span>
          <span class="card-btn__hint">Почему важны доказательные результаты измерений</span>
        </span>
        <span class="card-btn__icon" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M12 3v18M7 8h7a3 3 0 0 1 0 6H9a3 3 0 0 0 0 6h8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
      </button>

      <button class="card-btn" type="button" data-key="plan">
        <span class="card-btn__text">
          <span class="card-btn__title">Плановая проверка</span>
          <span class="card-btn__hint">Что инспектор оценивает кроме итоговых цифр</span>
        </span>
        <span class="card-btn__icon" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M9 11l3 3L22 4M21 12v7a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1h11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
      </button>

      <button class="card-btn" type="button" data-key="complaint">
        <span class="card-btn__text">
          <span class="card-btn__title">Внеплановая проверка по жалобе</span>
          <span class="card-btn__hint">Как быстро подтвердить, что контроль велся системно</span>
        </span>
        <span class="card-btn__icon" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
      </button>

      <button class="card-btn" type="button" data-key="incident">
        <span class="card-btn__text">
          <span class="card-btn__title">Производственные инциденты</span>
          <span class="card-btn__hint">Зачем нужны фоновые данные до аварийной ситуации</span>
        </span>
        <span class="card-btn__icon" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4m0 4h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
      </button>
    </div>

    <div class="modal-layer" id="modalLayer" aria-hidden="true">
      <div class="overlay" id="overlay"></div>

      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal__head">
          <div class="modal__title-wrap">
            <div class="modal__eyebrow">Когда это важно</div>
            <h2 class="modal__title" id="modalTitle"></h2>
          </div>

          <button class="modal__close" type="button" id="closeModal" aria-label="Закрыть окно">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>

        <div class="modal__body" id="modalBody"></div>
      </section>
    </div>
  </div>

  <script>
    const content = {
      pek: {
        title: 'При разработке и корректировке программы ПЭК',
        paragraphs: [
          'Программу ПЭК составляют под конкретный объект, а не по шаблону. Для этого используют данные инвентаризации источников воздействия, сведения о технологии, сырье, оборудовании и результаты предыдущего производственного контроля.',
          'Результаты измерений нужны здесь как основание для решений. По ним определяют, какие показатели реально контролировать, где ставить точки отбора проб и как часто проводить контроль.',
          'Если отбор проб организован корректно, а результаты оформлены без ошибок, программу легче обосновать при проверке. Это снижает риск замечаний, предписаний и требований включить лишние точки или показатели.'
        ]
      },
      nvos: {
        title: 'При расчете платы за НВОС и отчетности',
        paragraphs: [
          'Результаты анализов важны не только для внутреннего контроля. Их используют при расчете платы за негативное воздействие и при подготовке отчетности, поэтому к ним предъявляют формальные требования.',
          'Важно не просто получить цифры, а подтвердить, как их получили. Для этого нужны корректный отбор проб, акты, протоколы и лаборатория, у которой есть аккредитация по нужным показателям.',
          'Если данные получены с нарушениями или оформлены слабо, их могут не принять как доказательные. Тогда предприятие теряет сильную позицию при защите расчетов и отчетности.'
        ]
      },
      plan: {
        title: 'При плановой проверке',
        paragraphs: [
          'На плановой проверке инспектор смотрит не только итоговые значения. Он проверяет всю цепочку получения результата.',
          'Ему важно, где отбирали пробу, совпадает ли точка с программой ПЭК, кто выполнял отбор, как оформлены документы и какая лаборатория проводила анализ.',
          'Если точки не совпадают с программой, а акты и протоколы оформлены с нарушениями, результаты могут не зачесть. Поэтому для эколога важны не только анализы, но и вся сопроводительная документация.'
        ]
      },
      complaint: {
        title: 'При внеплановой проверке по жалобе',
        paragraphs: [
          'Во внеплановой проверке времени на подготовку почти нет. Если поступила жалоба, экологу нужно быстро показать, что предприятие контролирует воздействие регулярно, а не только в момент конфликта.',
          'В такой ситуации особенно важны свежие результаты измерений, акты отбора проб, протоколы и сведения о лаборатории. Эти документы показывают, что контроль велся системно и по установленному порядку.',
          'Если документов нет или они оформлены слабо, устные объяснения работают плохо. В спорной ситуации решают не общие слова, а результаты измерений и документы.'
        ]
      },
      incident: {
        title: 'При производственных инцидентах',
        paragraphs: [
          'После разлива, аварийного выброса или другой нештатной ситуации особенно важны фоновые данные. Они показывают, в каком состоянии были воздух, вода или почва до инцидента.',
          'Без таких данных трудно отделить последствия аварии от прежнего воздействия объекта. Из-за этого сложнее оценить масштаб изменений, рассчитать ущерб и защитить позицию предприятия.',
          'Если регулярный мониторинг выстроен правильно, у предприятия есть точка отсчета. Она помогает точнее оценить последствия инцидента и снизить риск завышенных выводов со стороны проверяющих.'
        ]
      }
    };

    const buttons = Array.from(document.querySelectorAll('.card-btn'));
    const modalLayer = document.getElementById('modalLayer');
    const modalTitle = document.getElementById('modalTitle');
    const modalBody = document.getElementById('modalBody');
    const closeModalBtn = document.getElementById('closeModal');
    const overlay = document.getElementById('overlay');

    let activeKey = null;

    function renderModal(key) {
      const item = content[key];
      modalTitle.textContent = item.title;
      modalBody.innerHTML = item.paragraphs.map(p => `<p>${p}</p>`).join('');
      modalBody.scrollTop = 0;
    }

    function setActiveButton(key) {
      buttons.forEach(btn => {
        btn.classList.toggle('is-active', btn.dataset.key === key);
      });
    }

    function openModal(key) {
      activeKey = key;
      renderModal(key);
      setActiveButton(key);
      modalLayer.classList.add('is-open');
      modalLayer.setAttribute('aria-hidden', 'false');
    }

    function closeModal() {
      activeKey = null;
      setActiveButton(null);
      modalLayer.classList.remove('is-open');
      modalLayer.setAttribute('aria-hidden', 'true');
    }

    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        const key = btn.dataset.key;

        if (activeKey === key) {
          closeModal();
          return;
        }

        openModal(key);
      });
    });

    closeModalBtn.addEventListener('click', closeModal);
    overlay.addEventListener('click', closeModal);

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && activeKey) {
        closeModal();
      }
    });
  </script>
</body>
</html>
