<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>lab-results-interactive</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f5fbf7;
      --surface-2: #eef8f2;
      --line: rgba(0,119,96,0.18);
      --line-strong: rgba(0,119,96,0.32);
      --text: #20312b;
      --muted: #5c756c;
      --accent: #007760;
      --accent-2: #19a86e;
      --accent-soft: rgba(25,168,110,0.10);
      --shadow: 0 14px 32px rgba(0,119,96,0.12);
      --shadow-strong: 0 24px 56px rgba(0,119,96,0.18);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
    }

    body {
      font-family: 'Satoshi', Arial, sans-serif;
      color: var(--text);
      display: flex;
      justify-content: center;
      /* убираем растяжение по высоте страницы */
      align-items: flex-start;
    }

    #app {
      position: relative;
      width: 560px;
      /* убрана фиксированная высота */
      background: var(--bg);
      overflow: visible;
    }

    .panel {
      position: relative;           /* была absolute + inset:0 */
      padding: 20px 22px 22px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 12px;
    }

    .info-btn {
      position: relative;
      width: 100%;
      min-height: 112px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.96), rgba(245,251,247,0.98)),
        linear-gradient(135deg, rgba(25,168,110,0.05), rgba(0,119,96,0.08));
      box-shadow: var(--shadow);
      padding: 18px 18px 18px 20px;
      text-align: left;
      cursor: pointer;
      transition:
        transform 180ms ease,
        box-shadow 180ms ease,
        border-color 180ms ease,
        background 180ms ease;
    }

    .info-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 38px rgba(0,119,96,0.16);
      border-color: var(--line-strong);
    }

    .info-btn:active {
      transform: translateY(0);
    }

    .info-btn.active {
      border-color: rgba(0,119,96,0.42);
      background:
        linear-gradient(180deg, rgba(242,252,247,0.98), rgba(232,248,239,0.98)),
        linear-gradient(135deg, rgba(25,168,110,0.08), rgba(0,119,96,0.10));
    }

    .info-btn::before {
      content: '';
      position: absolute;
      left: 0;
      top: 16px;
      bottom: 16px;
      width: 4px;
      border-radius: 4px;
      background: linear-gradient(180deg, var(--accent-2), var(--accent));
      opacity: 0.85;
    }

    .btn-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .btn-title {
      font-size: 18px;
      line-height: 1.1;
      font-weight: 700;
      color: var(--accent);
    }

    .btn-icon {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid rgba(0,119,96,0.10);
      transition: transform 180ms ease, background 180ms ease;
    }

    .info-btn.active .btn-icon {
      transform: rotate(45deg);
      background: rgba(25,168,110,0.16);
    }

    .btn-note {
      margin-top: 10px;
      font-size: 14px;
      line-height: 1.35;
      color: var(--muted);
      max-width: 420px;
    }

    .overlay {
      position: fixed;              /* чтобы попап не зависел от высоты app */
      inset: 0;
      background: rgba(12, 34, 28, 0.30);
      backdrop-filter: blur(5px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 12px;
      z-index: 999;
    }

    .overlay.open {
      display: flex;
      animation: fadeIn 180ms ease;
    }

    .popup {
      width: 100%;
      max-width: 528px;
      max-height: 776px;
      background: #ffffff;
      border: 1px solid rgba(0,119,96,0.18);
      border-radius: 26px;
      box-shadow: var(--shadow-strong);
      padding: 18px 20px 16px;
      position: relative;
      display: flex;
      flex-direction: column;
      animation: riseIn 220ms ease;
    }

    .popup-close {
      position: absolute;
      right: 16px;
      top: 16px;
      width: 34px;
      height: 34px;
      border: 1px solid rgba(0,119,96,0.14);
      border-radius: 999px;
      background: #ffffff;
      color: var(--accent);
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
    }

    .popup-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 5px 9px;
      border-radius: 999px;
      background: var(--surface);
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.01em;
      text-transform: uppercase;
    }

    .popup-kicker::before {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--accent-2), var(--accent));
    }

    .popup-header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      padding-right: 42px;
      margin-top: 10px;
    }

    .popup-title {
      margin: 0;
      font-size: 19px;
      line-height: 1.25;
      font-weight: 700;
      color: var(--accent);
    }

    .popup-body {
      margin-top: 12px;
      font-size: 15px;
      line-height: 1.55;
      color: var(--text);
      overflow-y: auto;
      padding-right: 4px;
    }

    .popup-body p {
      margin: 0 0 10px;
    }

    .popup-body p:last-child {
      margin-bottom: 0;
    }

    .popup-risk {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 18px;
      background: var(--surface-2);
      border: 1px solid rgba(0,119,96,0.10);
    }

    .popup-risk-title {
      font-size: 11px;
      line-height: 1.2;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
    }

    .popup-risk-text {
      margin-top: 7px;
      font-size: 14px;
      line-height: 1.45;
      color: var(--text);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(14px) scale(0.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>
<div id="app">
  <div class="panel">
    <!-- твои кнопки без изменений -->
    ...
  </div>

  <div class="overlay" id="overlay" aria-hidden="true">
    <!-- попап без изменений -->
    ...
  </div>
</div>

<script>
  // JS без изменений
</script>
</body>
</html>
