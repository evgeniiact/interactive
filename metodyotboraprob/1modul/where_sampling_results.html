<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>lab-results-interactive</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f5fbf7;
      --surface-2: #eef8f2;
      --line: rgba(0,119,96,0.18);
      --line-strong: rgba(0,119,96,0.32);
      --text: #20312b;
      --muted: #5c756c;
      --accent: #007760;
      --accent-2: #19a86e;
      --accent-soft: rgba(25,168,110,0.10);
      --shadow: 0 14px 32px rgba(0,119,96,0.12);
      --shadow-strong: 0 24px 56px rgba(0,119,96,0.18);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
    }

    body {
      font-family: 'Satoshi', Arial, sans-serif;
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    #app {
      position: relative;
      width: 560px;
      height: 800px;
      background: var(--bg);
      overflow: hidden;
    }

    .panel {
      position: absolute;
      inset: 0;
      padding: 28px 22px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 12px;
    }

    .info-btn {
      position: relative;
      width: 100%;
      min-height: 112px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.96), rgba(245,251,247,0.98)),
        linear-gradient(135deg, rgba(25,168,110,0.05), rgba(0,119,96,0.08));
      box-shadow: var(--shadow);
      padding: 18px 18px 18px 20px;
      text-align: left;
      cursor: pointer;
      transition:
        transform 180ms ease,
        box-shadow 180ms ease,
        border-color 180ms ease,
        background 180ms ease;
    }

    .info-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 38px rgba(0,119,96,0.16);
      border-color: var(--line-strong);
    }

    .info-btn:active {
      transform: translateY(0);
    }

    .info-btn.active {
      border-color: rgba(0,119,96,0.42);
      background:
        linear-gradient(180deg, rgba(242,252,247,0.98), rgba(232,248,239,0.98)),
        linear-gradient(135deg, rgba(25,168,110,0.08), rgba(0,119,96,0.10));
    }

    .info-btn::before {
      content: '';
      position: absolute;
      left: 0;
      top: 16px;
      bottom: 16px;
      width: 4px;
      border-radius: 4px;
      background: linear-gradient(180deg, var(--accent-2), var(--accent));
      opacity: 0.85;
    }

    .btn-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .btn-title {
      font-size: 18px;
      line-height: 1.1;
      font-weight: 700;
      color: var(--accent);
    }

    .btn-icon {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid rgba(0,119,96,0.10);
      transition: transform 180ms ease, background 180ms ease;
    }

    .info-btn.active .btn-icon {
      transform: rotate(45deg);
      background: rgba(25,168,110,0.16);
    }

    .btn-note {
      margin-top: 10px;
      font-size: 14px;
      line-height: 1.35;
      color: var(--muted);
      max-width: 420px;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(12, 34, 28, 0.30);
      backdrop-filter: blur(5px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .overlay.open {
      display: flex;
      animation: fadeIn 180ms ease;
    }

    .popup {
      width: 100%;
      max-width: 528px;
      height: 100%;
      max-height: 776px;
      background: #ffffff;
      border: 1px solid rgba(0,119,96,0.18);
      border-radius: 26px;
      box-shadow: var(--shadow-strong);
      padding: 18px 20px 16px;
      position: relative;
      display: flex;
      flex-direction: column;
      animation: riseIn 220ms ease;
    }

    .popup-close {
      position: absolute;
      right: 16px;
      top: 16px;
      width: 34px;
      height: 34px;
      border: 1px solid rgba(0,119,96,0.14);
      border-radius: 999px;
      background: #ffffff;
      color: var(--accent);
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
    }

    .popup-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 5px 9px;
      border-radius: 999px;
      background: var(--surface);
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.01em;
      text-transform: uppercase;
    }

    .popup-kicker::before {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--accent-2), var(--accent));
    }

    .popup-header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      padding-right: 42px;
      margin-top: 10px;
    }

    .popup-title {
      margin: 0;
      font-size: 19px;
      line-height: 1.25;
      font-weight: 700;
      color: var(--accent);
    }

    .popup-body {
      margin-top: 12px;
      font-size: 15px;
      line-height: 1.55;
      color: var(--text);
      overflow-y: auto;
      padding-right: 4px;
    }

    .popup-body p {
      margin: 0 0 10px;
    }

    .popup-body p:last-child {
      margin-bottom: 0;
    }

    .popup-risk {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 18px;
      background: var(--surface-2);
      border: 1px solid rgba(0,119,96,0.10);
    }

    .popup-risk-title {
      font-size: 11px;
      line-height: 1.2;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
    }

    .popup-risk-text {
      margin-top: 7px;
      font-size: 14px;
      line-height: 1.45;
      color: var(--text);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(14px) scale(0.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>
<div id="app">
  <div class="panel">
    <button class="info-btn" data-key="pec" aria-label="Программа ПЭК">
      <div class="btn-top">
        <div class="btn-title">Программа ПЭК</div>
        <div class="btn-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M9 3V15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M3 9H15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
      <div class="btn-note">Помогает обосновать точки, показатели и частоту контроля.</div>
    </button>

    <button class="info-btn" data-key="nvos" aria-label="Плата за НВОС и отчетность">
      <div class="btn-top">
        <div class="btn-title">Плата за НВОС</div>
        <div class="btn-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M9 3V15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M3 9H15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
      <div class="btn-note">Влияет на расчеты и на то, как примут отчетность на проверке.</div>
    </button>

    <button class="info-btn" data-key="plan" aria-label="Плановая проверка">
      <div class="btn-top">
        <div class="btn-title">Плановая проверка</div>
        <div class="btn-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M9 3V15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M3 9H15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
      <div class="btn-note">Инспектор оценивает не только цифры, но и путь их получения.</div>
    </button>

    <button class="info-btn" data-key="complaint" aria-label="Проверка по жалобе">
      <div class="btn-top">
        <div class="btn-title">Проверка по жалобе</div>
        <div class="btn-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M9 3V15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M3 9H15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
      <div class="btn-note">Свежие данные помогают быстро подтвердить позицию предприятия.</div>
    </button>

    <button class="info-btn" data-key="incident" aria-label="Инцидент и авария">
      <div class="btn-top">
        <div class="btn-title">Инцидент и авария</div>
        <div class="btn-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M9 3V15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M3 9H15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
      <div class="btn-note">Фоновые измерения помогают точнее считать ущерб после аварии.</div>
    </button>
  </div>

  <div class="overlay" id="overlay" aria-hidden="true">
    <div class="popup" role="dialog" aria-modal="true" aria-labelledby="popup-title">
      <button class="popup-close" id="popupClose" aria-label="Закрыть">×</button>

      <div class="popup-kicker">Где пригодятся результаты отбора проб</div>

      <div class="popup-header-row">
        <h2 class="popup-title" id="popup-title"></h2>
      </div>

      <div class="popup-body">
        <div class="popup-text" id="popup-text"></div>
        <div class="popup-risk">
          <div class="popup-risk-title">Если данные нельзя принять как доказательные</div>
          <div class="popup-risk-text" id="popup-risk"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const data = {
    pec: {
      title: 'При разработке и корректировке программы ПЭК',
      text: [
        'Программу ПЭК строят на фактических данных о воздействии объекта. Для этого используют результаты инвентаризации, сведения о технологии и результаты производственного контроля за прошлые периоды.',
        'Корректно организованный отбор проб и подтвержденные лабораторные результаты помогают обосновать выбор точек контроля, перечень показателей и периодичность измерений.',
        'Чем точнее исходные данные, тем меньше поводов у надзорного органа требовать переработать программу или включить в нее избыточные пункты.'
      ],
      risk: 'Если результаты измерений не подтверждены документами или не отражают реальное воздействие, программу ПЭК сложнее защитить при проверке.'
    },
    nvos: {
      title: 'При расчете платы за НВОС и подготовке отчетности',
      text: [
        'Результаты анализов используют для расчета платы за негативное воздействие и при подготовке отчетности по ПЭК. Чтобы эти данные приняли, важно подтвердить порядок отбора проб и область аккредитации лаборатории по нужным показателям.',
        'Корректно оформленные акты отбора и протоколы анализов позволяют рассчитывать плату исходя из фактических выбросов и сбросов, а не только по нормативам.',
        'То же основание используют при подготовке ежегодного отчета об организации и результатах ПЭК.'
      ],
      risk: 'Если отбор проб проведен с нарушениями или лаборатория не подтверждает компетентность по нужным показателям, контролирующий орган вправе не учитывать такие результаты.'
    },
    plan: {
      title: 'При плановой проверке',
      text: [
        'На плановой проверке инспектор оценивает не только значения показателей, но и то, как их получили. Он сверяет точки отбора с программой ПЭК и анализирует комплект документов по каждому измерению.',
        'Инспектора интересуют акт и протокол отбора, сведения о примененных методиках, информация о лаборатории и ее области аккредитации.',
        'Если цепочка «программа ПЭК – отбор проб – лабораторный анализ» прослеживается без разрывов, результаты проще принять как доказательные.'
      ],
      risk: 'Если точки отбора не совпадают с программой ПЭК или документы оформлены с нарушением установленного порядка, результаты анализов могут не использовать при оценке соблюдения требований.'
    },
    complaint: {
      title: 'При внеплановой проверке по жалобе',
      text: [
        'Внеплановая проверка по жалобе проводится в сжатые сроки. У эколога мало времени, чтобы собрать аргументы, поэтому особенно важны заранее подготовленные результаты измерений.',
        'Наличие актуальных данных, актов отбора проб и протоколов лабораторных исследований показывает, что предприятие ведет контроль регулярно, а не только в ответ на жалобы.',
        'Такие материалы позволяют сразу предъявить документальные подтверждения фактического уровня воздействия.'
      ],
      risk: 'Если у предприятия нет актуальных результатов или документы по отборам и анализам отсутствуют, позицию приходится строить на общих объяснениях без достаточной доказательности.'
    },
    incident: {
      title: 'При производственных инцидентах',
      text: [
        'После разлива, аварийного выброса или другой нештатной ситуации важны данные о состоянии среды до инцидента. Их дают результаты регулярного мониторинга.',
        'Сопоставление фоновых значений и показателей после аварии помогает определить масштаб изменений и вклад конкретного инцидента в общее загрязнение.',
        'На этой основе формируют расчеты ущерба и обосновывают выводы о фактическом воздействии объекта.'
      ],
      risk: 'Если фоновые измерения отсутствуют, сложнее отделить последствия аварии от ранее существовавшего загрязнения и корректно оценить размер ущерба.'
    }
  };

  const buttons = Array.from(document.querySelectorAll('.info-btn'));
  const overlay = document.getElementById('overlay');
  const popupTitle = document.getElementById('popup-title');
  const popupText = document.getElementById('popup-text');
  const popupRisk = document.getElementById('popup-risk');
  const popupClose = document.getElementById('popupClose');

  let activeKey = null;

  function closePopup() {
    activeKey = null;
    overlay.classList.remove('open');
    overlay.setAttribute('aria-hidden', 'true');
    buttons.forEach(btn => btn.classList.remove('active'));
  }

  function openPopup(key) {
    const item = data[key];
    if (!item) return;

    activeKey = key;

    popupTitle.textContent = item.title;
    popupText.innerHTML = item.text.map(p => `<p>${p}</p>`).join('');
    popupRisk.textContent = item.risk;

    overlay.classList.add('open');
    overlay.setAttribute('aria-hidden', 'false');

    buttons.forEach(btn => {
      btn.classList.toggle('active', btn.dataset.key === key);
    });
  }

  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.key;
      if (activeKey === key) {
        closePopup();
      } else {
        openPopup(key);
      }
    });
  });

  popupClose.addEventListener('click', closePopup);

  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) closePopup();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closePopup();
  });
</script>
</body>
</html>
