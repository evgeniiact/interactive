<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Тренажер: акт отбора проб</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap');

    :root {
      --green-dark: #007760;
      --green-light: #19a86e;
      --green-bg: #f3fbf7;
      --text-dark: #2c2c2c;
      --white: #ffffff;
      --gold: #bc932f;
    }

    html, body {
      margin:0;
      padding:0;
      width:100%;
      height:100%;
    }

    body {
      font-family:'Montserrat',sans-serif;
      background:var(--green-bg);
      color:var(--text-dark);
      display:flex;
      justify-content:center;
      align-items:center;
    }

    #app {
      width:560px;
      height:800px;
      background:var(--white);
      border-radius:12px;
      box-shadow:0 16px 40px rgba(0,119,96,0.15);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    .header {
      padding:10px 16px 8px;
      border-bottom:1px solid rgba(0,119,96,0.12);
      background:var(--white);
    }
    .title {
      font-size:16px;
      font-weight:600;
      color:var(--green-dark);
      margin:0 0 4px 0;
    }
    .subtitle {
      font-size:12px;
      color:#666;
    }

    .status-bar {
      margin-top:8px;
      height:6px;
      background:#e2f2ea;
      border-radius:3px;
      overflow:hidden;
    }
    .status-fill {
      height:100%;
      width:0%;
      background:var(--green-light);
      transition:width .3s ease;
    }

    .main {
      flex:1;
      display:flex;
      flex-direction:column;
      padding:8px 12px 12px;
      gap:8px;
    }

    .hint-strip {
      font-size:11px;
      padding:6px 8px;
      border-radius:6px;
      background:#f7faf9;
      border-left:3px solid var(--green-light);
      color:#555;
    }

    .act-wrapper {
      flex:1;
      position:relative;
      border-radius:8px;
      border:1px solid #d4e0d9;
      overflow:hidden;
      background:#f0f0f0;
    }
    .act-img {
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
    }

    .zone {
      position:absolute;
      cursor:pointer;
      border:2px solid rgba(25,168,110,0);
      border-radius:4px;
    }
    .zone:hover {
      border-color:rgba(25,168,110,0.8);
      box-shadow:0 0 0 2px rgba(25,168,110,0.25);
    }
    .zone.done {
      background:rgba(25,168,110,0.16);
      border-color:rgba(25,168,110,0.9);
    }

    .footer {
      padding:6px 12px 10px;
      font-size:11px;
      color:#777;
      border-top:1px solid #edf2ef;
    }

    /* overlay + popup */
    .overlay {
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.35);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:20;
    }
    .popup {
      width:480px;
      max-height:90vh;
      background:var(--white);
      border-radius:10px;
      box-shadow:0 12px 32px rgba(0,0,0,0.25);
      padding:14px 16px 14px;
      display:flex;
      flex-direction:column;
      font-size:13px;
    }
    .popup-header {
      font-weight:600;
      color:var(--green-dark);
      margin-bottom:6px;
      font-size:15px;
    }
    .popup-text {
      font-size:13px;
      margin-bottom:10px;
    }
    .options-list {
      display:flex;
      flex-direction:column;
      gap:6px;
      margin-bottom:8px;
    }
    .option {
      background:#f9fbfa;
      border:1px solid #d7e2dc;
      border-radius:6px;
      padding:6px 8px;
      cursor:pointer;
      transition:.2s;
    }
    .option:hover { border-color:var(--green-light); }
    .option.selected {
      background:var(--green-light);
      border-color:var(--green-light);
      color:var(--white);
    }
    .popup-feedback {
      display:none;
      margin-top:4px;
      padding:6px 8px;
      border-radius:6px;
      font-size:12px;
      line-height:1.4;
    }
    .popup-feedback.info {
      background:#e3f2fd;
      color:#0d47a1;
      border-left:3px solid #2196f3;
    }
    .popup-feedback.warn {
      background:#fffde7;
      color:#827717;
      border-left:3px solid var(--gold);
    }
    .popup-feedback.success {
      background:#e8f5e9;
      color:#1b5e20;
      border-left:3px solid var(--green-light);
    }

    .popup-actions {
      margin-top:10px;
      display:flex;
      justify-content:flex-end;
      gap:8px;
    }
    .btn {
      background:var(--green-light);
      color:#fff;
      border:none;
      padding:7px 16px;
      border-radius:20px;
      font-size:12px;
      font-weight:600;
      cursor:pointer;
      text-transform:uppercase;
      letter-spacing:0.04em;
    }
    .btn.secondary {
      background:#e0e7e3;
      color:#444;
    }

    /* карточки для упорядочивания */
    .order-text {
      font-size:12px;
      margin-bottom:4px;
    }
    .order-list {
      display:flex;
      flex-direction:column;
      gap:4px;
    }
    .card {
      background:#ffffff;
      border:1px solid #d0ddd6;
      border-radius:4px;
      padding:5px 7px;
      font-size:12px;
      cursor:move;
      user-select:none;
    }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="title">Тренажер по акту отбора проб</div>
    <div class="subtitle" id="status-label">Шаг 0 из 8 • прочитайте правила</div>
    <div class="status-bar">
      <div class="status-fill" id="status-fill"></div>
    </div>
  </div>

  <div class="main">
    <div class="hint-strip" id="hint-strip">
      Нажмите «Правила» чтобы понять, как заполнить акт без формальных ошибок.
    </div>

    <div class="act-wrapper">
      <img src="akt-otbora-prob.png" class="act-img" alt="Акт отбора проб">

      <!-- зоны по реальному макету -->
      <!-- шапка: заказчик и объект -->
      <div class="zone" data-step="1" style="top:10%;left:3%;width:94%;height:11%;"></div>
      <!-- тип среды и точка -->
      <div class="zone" data-step="2" style="top:23%;left:3%;width:46%;height:14%;"></div>
      <!-- дата/время/режим/погода -->
      <div class="zone" data-step="3" style="top:23%;left:51%;width:46%;height:14%;"></div>
      <!-- методика и пробоотборник -->
      <div class="zone" data-step="4" style="top:38%;left:3%;width:94%;height:6%;"></div>
      <!-- таблица проб -->
      <div class="zone" data-step="5" style="top:45%;left:3%;width:94%;height:21%;"></div>
      <!-- меры сохранности -->
      <div class="zone" data-step="6" style="top:68%;left:3%;width:94%;height:7%;"></div>
      <!-- цель отбора -->
      <div class="zone" data-step="7" style="top:76%;left:3%;width:94%;height:7%;"></div>
      <!-- отклонения и подписи -->
      <div class="zone" data-step="8" style="top:84%;left:3%;width:94%;height:14%;"></div>

      <!-- подсветка выбранной зоны -->
      <div id="highlight" class="highlight"></div>
    </div>
  </div>

  <div class="footer">
    Нажимайте на нужный блок акта и отвечайте на вопросы во всплывающем окне.
    <button class="btn" style="float:right;padding:6px 14px;margin-top:-4px;font-size:11px;"
            onclick="openIntroPopup()">Правила</button>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="popup" id="popup">
    <div class="popup-header" id="popup-title"></div>
    <div class="popup-text" id="popup-text"></div>

    <div id="popup-options"></div>

    <div id="popup-feedback" class="popup-feedback"></div>

    <div class="popup-actions">
      <button class="btn secondary" onclick="closePopup()">Закрыть</button>
      <button class="btn" id="popup-next-btn" onclick="nextStep()" style="display:none;">Далее</button>
    </div>
  </div>
</div>

<script>
  let currentStep = 0; // 0 – правила, 1–8 – блоки акта

  const steps = {
    1: {
      title:"Шапка: заказчик и объект",
      text:"Вы начинаете заполнять акт. Что проверяете в шапке перед тем, как перейти к остальным полям?",
      type:"choices",
      options:[
        {
          text:"Сверяю название заказчика и объекта с договором / приказом на ПЭК",
          feedback:"Так вы исключаете ситуацию, когда акт оформлен на другую площадку или юрлицо.",
          style:"success"
        },
        {
          text:"Если лаборатория вписала реквизиты, значит все верно – проверять не буду",
          feedback:"Лаборатория отвечает за форму, но именно вы подтверждаете объект подписью. Ошибка в шапке делает весь акт спорным.",
          style:"warn"
        }
      ]
    },
    2: {
      title:"Тип среды и точка отбора",
      text:"Нужно описать, что и где отбираете. Выберите корректные действия.",
      type:"choices",
      options:[
        {
          text:"Выбираю тип среды по фактическому объекту (воздух, вода, почва)",
          feedback:"Тип среды должен совпадать с программой ПЭК и реальным объектом отбора.",
          style:"success"
        },
        {
          text:"Переписываю название точки из программы ПЭК / паспорта точки без сокращений «Точка №1»",
          feedback:"Так акт напрямую связывается с вашей схемой и документацией.",
          style:"success"
        },
        {
          text:"Пишу «место отбора: рядом с трубой» – так быстрее",
          feedback:"Размытые формулировки плохо защищают вас при споре с инспектором.",
          style:"warn"
        }
      ]
    },
    3: {
      title:"Дата, время и режим работы",
      text:"Этот блок показывает, в каких условиях фактически делали отбор.",
      type:"choices",
      options:[
        {
          text:"Фиксирую дату и интервал времени отбора и сверяю их с журналом работы оборудования",
          feedback:"Так вы можете доказать, что отбор шел в нужный период работы источника.",
          style:"success"
        },
        {
          text:"Кратко описываю режим: «котел в номинальном режиме», «очистные в штатной схеме»",
          feedback:"Режим работы источника – один из первых пунктов, которые смотрит инспектор.",
          style:"info"
        },
        {
          text:"Оставляю режим и погоду пустыми – это и так понятно",
          feedback:"Пустой блок условий отбора делает акт слабее и дает повод оспорить результаты.",
          style:"warn"
        }
      ]
    },
    4: {
      title:"Методика и пробоотборник",
      text:"Расположите шаги проверки блока «Методика – пробоотборник – поверка» в правильном порядке.",
      type:"order",
      items:[
        "Сверить номер методики с программой ПЭК или договором",
        "Проверить тип и заводской номер пробоотборника",
        "Сравнить дату поверки с датой отбора проб"
      ],
      correct:[0,1,2],
      feedback:"Сначала убеждаются, что методика соответствует документам, потом проверяют оборудование и только после этого дату поверки."
    },
    5: {
      title:"Таблица «Сведения о пробах»",
      text:"Вы заносите данные по каждой пробе. Что обязательно должно быть заполнено и проверено?",
      type:"choices",
      options:[
        {
          text:"Уникальный код тары и объем пробы",
          feedback:"Без кода тары вы не свяжете конкретную пробу с протоколом анализа.",
          style:"success"
        },
        {
          text:"Консервант / обработка и время начала и окончания отбора",
          feedback:"Эти поля показывают, могли ли показатели сохраниться до лаборатории.",
          style:"info"
        },
        {
          text:"Только количество проб в таблице – остальное не критично",
          feedback:"Количество важно, но без идентификации каждой пробы акт легко оспорить.",
          style:"warn"
        }
      ]
    },
    6: {
      title:"Меры сохранности пробы",
      text:"Как корректно заполнить строку о сохранности пробы при транспортировке?",
      type:"choices",
      options:[
        {
          text:"«Проба доставлена в лабораторию в течение 2 часов при t +4…+6 °C»",
          feedback:"Такая запись фиксирует и срок, и температурный режим, что важно для большинства методик.",
          style:"success"
        },
        {
          text:"«Проба доставлена вовремя»",
          feedback:"Размытая формулировка не доказывает соблюдение условий методики.",
          style:"warn"
        },
        {
          text:"«Без контроля температуры, как получится»",
          feedback:"Такой текст прямо показывает нарушение условий хранения пробы.",
          style:"warn"
        }
      ]
    },
    7: {
      title:"Цель отбора и отклонения",
      text:"Блок «Цель отбора» и «Отклонения от методики» часто заполняют формально.",
      type:"choices",
      options:[
        {
          text:"Выбираю цель, которая совпадает с программой (ПЭК, инвентаризация, контроль нормативов)",
          feedback:"Цель должна совпадать с тем, ради чего вообще брали пробу и делали анализы.",
          style:"success"
        },
        {
          text:"Если были отклонения от методики или плана, кратко прописываю их",
          feedback:"Лучше честно зафиксировать отклонения, чем делать вид, что все прошло идеально.",
          style:"info"
        },
        {
          text:"Оставляю цель и отклонения пустыми – так делают все",
          feedback:"При проверке пустой блок целей и отклонений сразу вызывает вопросы у инспектора.",
          style:"warn"
        }
      ]
    },
    8: {
      title:"Подписи сторон",
      text:"Перед тем как расписаться, вы смотрите на блок подписи.",
      type:"choices",
      options:[
        {
          text:"Проверяю, что есть подпись представителя заказчика с расшифровкой Ф.И.О. и должности",
          feedback:"Подпись заказчика подтверждает условия отбора и факт передачи проб.",
          style:"success"
        },
        {
          text:"Сравниваю, совпадает ли указанная должность с фактическим представителем на объекте",
          feedback:"Если подпись у неуполномоченного лица, акт легко оспорить.",
          style:"info"
        },
        {
          text:"Если таблица проб заполнена, подписываю не глядя",
          feedback:"Подписывая акт, вы принимаете на себя все ошибки во всех блоках документа.",
          style:"warn"
        }
      ]
    }
  };

  function openIntroPopup() {
    currentStep = 0;
    showPopup(
      "Как проходить тренажер",
      "Слева вы видите реальный бланк акта отбора проб. Нажимайте на нужный блок акта – шапку, точку отбора, таблицу проб, подписи. Для каждого блока всплывает задание с вариантами ответов. После каждого выбора вы получите короткий разбор и риски, если в реальной работе заполнить этот блок невнимательно.",
      null,
      null,
      false
    );
    updateStatus();
  }

  function showPopup(title, text, stepObj, stepKey, withNext=true) {
    document.getElementById("popup-title").innerText = title;
    document.getElementById("popup-text").innerText = text;

    const optionsWrap = document.getElementById("popup-options");
    const fb = document.getElementById("popup-feedback");
    const nextBtn = document.getElementById("popup-next-btn");

    optionsWrap.innerHTML = "";
    fb.style.display = "none";
    fb.className = "popup-feedback";
    nextBtn.style.display = withNext ? "inline-block" : "none";

    if (stepObj && stepObj.type === "choices") {
      const list = document.createElement("div");
      list.className = "options-list";
      stepObj.options.forEach((opt,i) => {
        const div = document.createElement("div");
        div.className = "option";
        div.innerText = opt.text;
        div.onclick = () => {
          document.querySelectorAll(".option").forEach(o=>o.classList.remove("selected"));
          div.classList.add("selected");
          fb.innerText = opt.feedback;
          fb.classList.add("visible", "popup-feedback", opt.style || "info");
          fb.style.display = "block";
          document.querySelectorAll(`.zone[data-step="${stepKey}"]`).forEach(z=>z.classList.add("done"));
        };
        list.appendChild(div);
      });
      optionsWrap.appendChild(list);
    }

    if (stepObj && stepObj.type === "order") {
      const textEl = document.createElement("div");
      textEl.className = "order-text";
      textEl.innerText = "Перетащите шаги так, как вы бы их выполняли в реальной проверке.";
      optionsWrap.appendChild(textEl);

      const list = document.createElement("div");
      list.className = "order-list";
      stepObj.items.forEach((t,idx) => {
        const card = document.createElement("div");
        card.className = "card";
        card.draggable = true;
        card.dataset.idx = idx;
        card.innerText = t;
        card.addEventListener("dragstart", dragStart);
        card.addEventListener("dragover", dragOver);
        card.addEventListener("drop", dropCard);
        list.appendChild(card);
      });
      optionsWrap.appendChild(list);

      nextBtn.onclick = () => {
        const order = Array.from(list.children).map(c=>Number(c.dataset.idx));
        const isCorrect = JSON.stringify(order) === JSON.stringify(stepObj.correct);
        fb.innerText = stepObj.feedback + (isCorrect ? " Порядок выбран верно." : " Порядок можно улучшить, но вы уже понимаете, что именно нужно проверить.");
        fb.classList.add("visible","popup-feedback","info");
        fb.style.display = "block";
        document.querySelectorAll(`.zone[data-step="${stepKey}"]`).forEach(z=>z.classList.add("done"));
        nextStep();
      };
    }

    document.getElementById("overlay").style.display = "flex";
  }

  function closePopup() {
    document.getElementById("overlay").style.display = "none";
  }

  function dragStart(e){ e.dataTransfer.setData("text/plain", e.target.dataset.idx); }
  function dragOver(e){ e.preventDefault(); }
  function dropCard(e){
    e.preventDefault();
    const fromIdx = e.dataTransfer.getData("text/plain");
    const dragged = [...this.parentNode.children].find(c=>c.dataset.idx===fromIdx);
    if(dragged && dragged!==this){
      const list = this.parentNode;
      list.insertBefore(dragged, this.nextSibling);
    }
  }

  function onZoneClick(stepKey){
    const stepObj = steps[stepKey];
    if(!stepObj) return;
    currentStep = stepKey;
    updateStatus();
    const hl = document.getElementById("highlight");
    const zoneEl = document.querySelector(`.zone[data-step="${stepKey}"]`);
    if(zoneEl){
      const r = zoneEl.getBoundingClientRect();
      const parentR = zoneEl.parentElement.getBoundingClientRect();
      hl.style.display="block";
      hl.style.top = (zoneEl.offsetTop) + "px";
      hl.style.left = (zoneEl.offsetLeft) + "px";
      hl.style.width = zoneEl.offsetWidth + "px";
      hl.style.height = zoneEl.offsetHeight + "px";
    }
    showPopup(stepObj.title, stepObj.text, stepObj, stepKey, stepObj.type==="order");
  }

  function nextStep(){
    closePopup();
    if(currentStep<8){
      currentStep++;
      updateStatus();
    } else {
      document.getElementById("hint-strip").innerText = "Все блоки акта разобраны. Можно еще раз пройти тренажер или использовать чек-лист в работе.";
    }
  }

  function updateStatus(){
    const label = document.getElementById("status-label");
    const fill = document.getElementById("status-fill");
    const doneCount = Math.min(currentStep,8);
    const percent = (doneCount/8)*100;
    fill.style.width = percent + "%";
    if(currentStep===0){
      label.innerText = "Шаг 0 из 8 • прочитайте правила";
    } else {
      label.innerText = "Шаг " + doneCount + " из 8 • работаем с блоком акта";
    }
  }

  document.querySelectorAll(".zone").forEach(z=>{
    z.addEventListener("click", ()=>onZoneClick(Number(z.dataset.step)));
  });

  // автопоказ правил при первом запуске
  window.onload = openIntroPopup;
</script>
</body>
</html>
