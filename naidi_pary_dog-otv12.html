<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Договорная грамотность: Сопоставь термин и его роль</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap');

    :root {
      --bg-silk: #f3fbf7;
      --green-accent: #007760;
      --green-border: #19a86e;
      --text-dark: #2c2c2c;
      --success: #2e7d32;
      --error: #d32f2f;
      --line-soft: rgba(0,119,96,0.45);
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Montserrat', sans-serif;
      background-color: var(--bg-silk);
      margin: 0;
      padding: 10px;
      display: flex;
      justify-content: center;
    }

    #match-app {
      background: #ffffff;
      border: 1px solid var(--green-border);
      border-radius: 4px;
      padding: 16px 20px 20px 20px;
      width: 560px;
      max-width: 560px;
      max-height: 800px;
      box-shadow: 0 24px 60px rgba(0,119,96,0.15);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      text-align: center;
      margin-bottom: 10px;
      border-bottom: 1px solid rgba(0,119,96,0.12);
      padding-bottom: 6px;
      flex-shrink: 0;
    }

    h2 {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--green-accent);
      font-size: 16px;
      margin: 0;
      text-transform: uppercase;
    }

    .intro {
      font-size: 13px;
      color: var(--text-dark);
      margin-top: 6px;
      text-align: center;
    }

    .match-wrapper {
      margin-top: 10px;
      display: flex;
      gap: 18px;
      position: relative;
      flex: 1;
      min-height: 0;
    }

    #svg-lines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .column {
      position: relative;
      z-index: 2;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .column-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #527a6b;
      margin-bottom: 4px;
      flex-shrink: 0;
    }

    .items {
      display: grid;
      grid-template-rows: repeat(5, 1fr);
      gap: 6px;
      flex: 1;
      min-height: 0;
    }

    .item {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      position: relative;
      transition: background-color 0.18s ease, border-color 0.18s ease;
      width: 100%;
      overflow: hidden;
      height: 100%;
    }

    .item-text {
      color: var(--text-dark);
    }

    .item[data-side="right"]:hover {
      border-color: var(--green-accent);
      box-shadow: 0 3px 10px rgba(0,119,96,0.12);
      background: #f3fbf7;
      transform: translateY(-1px);
    }

    .item[data-side="left"]:hover {
      border-color: var(--green-accent);
      background: #f3fbf7;
    }

    .item.active {
      border-color: var(--green-accent);
      background: #e0f5ec;
      box-shadow: 0 0 0 2px rgba(0,119,96,0.25);
    }

    .item.correct {
      border-color: var(--success);
      background: #e8f5e9;
      color: var(--success);
    }

    .item.wrong {
      border-color: var(--error);
      background: #ffebee;
      color: var(--error);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #d0d0d0;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
    }

    .dot-left  { left: -4px; }
    .dot-right { right: -4px; }

    .line-path {
      fill: none;
      stroke: var(--line-soft);
      stroke-width: 2;
      stroke-linecap: round;
      filter: drop-shadow(0 0 3px rgba(0,119,96,0.35));
      stroke-dasharray: 400;
      stroke-dashoffset: 400;
      animation: draw 0.6s ease-out forwards;
    }

    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }

    .line-correct {
      stroke: var(--success);
      stroke-width: 2.4;
    }

    .line-wrong {
      stroke: var(--error);
      stroke-width: 2.4;
    }

    .actions {
      margin-top: 10px;
      text-align: center;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      align-items: center;
      flex-shrink: 0;
    }

    .btn-primary {
      background: linear-gradient(135deg, #19a86e, #007760);
      color: white;
      padding: 8px 22px;
      border: none;
      border-radius: 18px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0,119,96,0.25);
      transition: 0.25s;
    }

    .btn-secondary {
      background: #ffffff;
      color: var(--green-accent);
      padding: 7px 20px;
      border-radius: 18px;
      border: 1px solid var(--green-accent);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      cursor: pointer;
      transition: 0.25s;
    }

    .btn-primary:hover,
    .btn-secondary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(0,119,96,0.25);
    }

    #status {
      margin-top: 2px;
      font-size: 12px;
      text-align: center;
      min-height: 20px;
      color: var(--text-dark);
      width: 100%;
    }

    .item[data-side="left"] .item-text {
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .item[data-side="right"] .item-text {
      white-space: normal;
    }

    .floating-left {
      position: absolute;
      z-index: 5;
      background: #ffffff;
      border-radius: 12px;
      border: 1px solid var(--green-accent);
      padding: 6px 10px;
      font-size: 12px;
      box-shadow: 0 10px 26px rgba(0,0,0,0.3);
      max-width: 260px;
    }

    .floating-left .item-text {
      display: block;
      -webkit-line-clamp: unset;
      overflow: visible;
      white-space: normal;
    }

    @media (max-width: 600px) {
      body { padding: 4px; }
      #match-app {
        width: 100%;
        max-width: 560px;
      }
      .match-wrapper {
        flex-direction: column;
        gap: 12px;
      }
    }
  </style>
</head>
<body onresize="redrawLines()">
  <div id="match-app">
    <header>
      <h2>Договорная грамотность: Сопоставь термин и его роль</h2>
      <div class="intro">
        Соедините фрагменты формулировки слева с их смысловым назначением справа.
      </div>
    </header>

    <div class="match-wrapper" id="match-wrapper">
      <svg id="svg-lines"></svg>

      <div class="column">
        <div class="column-title">Колонка А. Фрагменты формулировки</div>
        <div class="items" id="left-items"></div>
      </div>

      <div class="column">
        <div class="column-title">Колонка Б. Смысловое назначение</div>
        <div class="items" id="right-items"></div>
      </div>
    </div>

    <div class="actions">
      <button class="btn-primary" id="btn-check" onclick="checkPairs()">Проверить</button>
      <button class="btn-secondary" onclick="restartGame()">Пройти заново</button>
      <div id="status"></div>
    </div>
  </div>

  <script>
    const data = [
      {
        id: 1,
        left: 'Сторона 1, заказчик, обязуется своевременно предоставить Стороне 2, подрядчику, исходные данные для подготовки отчетности с приложением подтверждающих документов.',
        right: 'Определяет зоны ответственности каждой стороны. За передачу исходных данных отвечает эколог предприятия, а за расчеты и заполнение форм – подрядчик.'
      },
      {
        id: 2,
        left: 'Факт передачи исходных данных фиксируется актом приема-передачи данных, стороны подписывают его в течение 3 рабочих дней.',
        right: 'Устанавливает порядок подтверждения передачи исходных данных: способ передачи, фиксация факта получения, сроки.'
      },
      {
        id: 3,
        left: 'При выявлении ошибок в сданной отчетности стороны в течение 5 рабочих дней проводят совместную проверку: Сторона 1 подтверждает корректность переданных исходных данных либо предоставляет исправленные данные; Сторона 2 проверяет корректность расчетов и заполнения форм, при необходимости вносит исправления.',
        right: 'Описывает алгоритм действий при обнаружении ошибки: сроки проверки, порядок запроса уточнений, обязанность предоставить подтверждающие документы.'
      },
      {
        id: 4,
        left: 'Возмещение штрафов, наложенных контролирующими органами, осуществляется стороной, допустившей ошибку. Если ошибка возникла по вине обеих сторон, штраф распределяется пропорционально степени вины, определяемой на основании акта совместной проверки.',
        right: 'Фиксирует условия возмещения убытков/штрафов: когда ответственность несет подрядчик, когда эколог, возможен ли вариант разделения ответственности.'
      },
      {
        id: 5,
        left: 'Претензии по качеству выполненных работ направляются в письменной форме с приложением подтверждающих документов. Спорные вопросы подлежат урегулированию в досудебном порядке в течение 10 рабочих дней с момента получения претензии.',
        right: 'Регламентирует сроки и порядок подачи претензий и урегулирования разногласий.'
      }
    ];

    let selected = null;
    let links = [];
    let locked = false;
    let floating = null;

    function shuffle(arr) {
      return [...arr].sort(() => Math.random() - 0.5);
    }

    function initMatch() {
      const leftWrap = document.getElementById('left-items');
      const rightWrap = document.getElementById('right-items');
      const status = document.getElementById('status');
      const btnCheck = document.getElementById('btn-check');

      status.textContent = '';
      status.style.color = 'var(--text-dark)';
      locked = false;
      btnCheck.disabled = false;

      leftWrap.innerHTML = '';
      rightWrap.innerHTML = '';
      links = [];
      selected = null;
      removeFloating();
      document.getElementById('svg-lines').innerHTML = '';

      const leftShuffled = shuffle(data);
      const rightShuffled = shuffle(data);

      leftShuffled.forEach(item => {
        const div = document.createElement('div');
        div.className = 'item';
        div.dataset.id = item.id;
        div.dataset.side = 'left';
        div.innerHTML = `<span class="item-text">${item.left}</span><span class="dot dot-right"></span>`;
        div.addEventListener('click', (e) => {
          showFloating(div, item.left);
          onSelect(div);
          e.stopPropagation();
        });
        leftWrap.appendChild(div);
      });

      rightShuffled.forEach(item => {
        const div = document.createElement('div');
        div.className = 'item';
        div.dataset.id = item.id;
        div.dataset.side = 'right';
        div.innerHTML = `<span class="dot dot-left"></span><span class="item-text">${item.right}</span>`;
        div.onclick = () => onSelect(div);
        rightWrap.appendChild(div);
      });

      setTimeout(redrawLines, 0);

      // закрытие плавающей карточки по клику вне
      document.addEventListener('click', handleDocumentClick);
    }

    function handleDocumentClick(e) {
      // если клик не по плавающей карточке и не по левой карточке – убрать плавающую
      if (floating && !floating.contains(e.target) && !e.target.closest('.item[data-side="left"]')) {
        removeFloating();
      }
    }

    function showFloating(baseEl, text) {
      removeFloating();

      const appRect = document.getElementById('match-app').getBoundingClientRect();
      const rect = baseEl.getBoundingClientRect();

      const float = document.createElement('div');
      float.className = 'floating-left';
      float.innerHTML = `<span class="item-text">${text}</span>`;

      float.style.left = (rect.left - appRect.left) + 'px';
      float.style.top = (rect.top - appRect.top) + 'px';
      float.style.width = rect.width + 'px';

      document.getElementById('match-app').appendChild(float);
      floating = float;
    }

    function removeFloating() {
      if (floating) {
        floating.remove();
        floating = null;
      }
    }

    function onSelect(el) {
      if (locked) return;

      document.getElementById('status').textContent = '';
      if (el.classList.contains('correct')) return;

      const existingLinkIndex = links.findIndex(l => l.left === el || l.right === el);
      if (existingLinkIndex !== -1) {
        links.splice(existingLinkIndex, 1);
        el.classList.remove('active');
        redrawLines();
        return;
      }

      if (!selected) {
        selected = el;
        el.classList.add('active');
        return;
      }

      if (selected.dataset.side === el.dataset.side) {
        selected.classList.remove('active');
        selected = el;
        el.classList.add('active');
        return;
      }

      const pair = {
        left: selected.dataset.side === 'left' ? selected : el,
        right: selected.dataset.side === 'right' ? selected : el,
        idLeft: selected.dataset.side === 'left' ? selected.dataset.id : el.dataset.id,
        idRight: selected.dataset.side === 'right' ? selected.dataset.id : el.dataset.id,
        checked: false
      };

      links.push(pair);
      selected.classList.remove('active');
      el.classList.remove('active');
      selected = null;
      redrawLines();
    }

    function redrawLines() {
      const svg = document.getElementById('svg-lines');
      const wrapper = document.getElementById('match-wrapper');
      const rect = wrapper.getBoundingClientRect();
      svg.setAttribute('width', rect.width);
      svg.setAttribute('height', rect.height);
      svg.innerHTML = '';

      links.forEach(link => {
        const leftRect = link.left.getBoundingClientRect();
        const rightRect = link.right.getBoundingClientRect();

        const x1 = leftRect.right - rect.left;
        const y1 = leftRect.top - rect.top + leftRect.height / 2;
        const x2 = rightRect.left - rect.left;
        const y2 = rightRect.top - rect.top + rightRect.height / 2;

        const midX = (x1 + x2) / 2;

        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        const d = `M ${x1} ${y1} C ${midX} ${y1}, ${midX} ${y2}, ${x2} ${y2}`;
        path.setAttribute('d', d);
        path.classList.add('line-path');

        if (link.checked) {
          path.classList.add(link.idLeft === link.idRight ? 'line-correct' : 'line-wrong');
        }

        svg.appendChild(path);
      });
    }

    function checkPairs() {
      if (locked) return;

      const status = document.getElementById('status');
      const btnCheck = document.getElementById('btn-check');

      if (links.length === 0) {
        status.textContent = 'Нет ни одной пары. Соедините элементы слева и справа.';
        status.style.color = 'var(--error)';
        return;
      }

      let errors = 0;

      links.forEach(link => {
        link.checked = true;
        const ok = link.idLeft === link.idRight;
        link.left.classList.remove('wrong', 'correct', 'active');
        link.right.classList.remove('wrong', 'correct', 'active');
        link.left.classList.add(ok ? 'correct' : 'wrong');
        link.right.classList.add(ok ? 'correct' : 'wrong');
        if (!ok) errors++;
      });

      redrawLines();

      if (errors === 0 && links.length === data.length) {
        status.textContent = 'Все пары верны. Формулировки и их роли в договоре согласованы без ошибок.';
        status.style.color = 'var(--success)';
      } else if (errors === 0) {
        status.textContent = 'Все соединенные пары верны. Осталось сопоставить остальные элементы.';
        status.style.color = 'var(--green-accent)';
      } else {
        status.textContent = 'Есть ошибки. Неверные пары подсвечены красным.';
        status.style.color = 'var(--error)';
      }

      locked = true;
      btnCheck.disabled = true;
    }

    function restartGame() {
      document.removeEventListener('click', handleDocumentClick);
      initMatch();
    }

    window.addEventListener('resize', () => {
      redrawLines();
      removeFloating();
    });

    initMatch();
  </script>
</body>
</html>
