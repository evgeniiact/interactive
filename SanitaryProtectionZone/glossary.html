<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Интерактивный глоссарий по СЗЗ</title>
  <style>
    :root {
      --bg: #f6f8f7;
      --card: #ffffff;
      --text: #1f2a24;
      --muted: #66756d;
      --line: #dde5df;
      --green: #2d6a4f;
      --green-soft: #e8f3ee;
      --shadow: 0 14px 40px rgba(24, 35, 30, 0.16);
      --radius: 18px;
      --transition: 180ms ease;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      display: flex;
      justify-content: center;
      padding: 24px 12px;
    }
    .app {
      width: 100%;
      max-width: 700px;
      background: var(--card);
      border-radius: 24px;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 20px 22px 22px;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 22px;
    }
    .lead {
      margin: 0 0 16px;
      font-size: 14px;
      color: var(--muted);
    }
    .progress {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .term-box {
      border-radius: var(--radius);
      border: 1px solid var(--line);
      padding: 14px 14px 16px;
      background: #fbfdfc;
      margin-bottom: 14px;
    }
    .term-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--green);
      font-weight: 700;
      margin-bottom: 6px;
    }
    .definition {
      font-size: 14px;
    }
    .options {
      display: grid;
      gap: 10px;
      margin-bottom: 12px;
    }
    button { font-family: inherit; }
    .option {
      border-radius: 999px;
      border: 1px solid var(--line);
      padding: 9px 13px;
      background: #fff;
      text-align: left;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      transition: background var(--transition), border-color var(--transition), transform var(--transition);
    }
    .option span.label {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .option span.tag {
      font-size: 11px;
      color: var(--muted);
    }
    .option:hover {
      background: #f7faf8;
      border-color: #c8d8cf;
      transform: translateY(-1px);
    }
    .option.correct {
      border-color: var(--green);
      background: var(--green-soft);
      color: var(--green);
    }
    .option.wrong {
      border-color: #e29578;
      background: #fff2ea;
      color: #9b341a;
    }
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
    }
    .footer button {
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      padding: 7px 11px;
      font-size: 12px;
      cursor: pointer;
    }
    .footer button:hover { background: #f4f7f5; }
    .footer button:disabled {
      opacity: 0.5;
      cursor: default;
    }
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(17, 24, 21, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 20;
    }
    .overlay.active { display: flex; }
    .modal {
      width: 100%;
      max-width: 480px;
      background: #fff;
      border-radius: 18px;
      padding: 18px 18px 14px;
      border: 1px solid var(--line);
      box-shadow: 0 18px 60px rgba(10, 16, 13, 0.28);
      animation: rise 150ms ease-out;
      font-size: 14px;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .modal-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .modal-label.good { color: var(--green); }
    .modal-label.bad { color: #b35019; }
    .modal-title {
      margin: 0 0 6px;
      font-weight: 700;
      font-size: 15px;
    }
    .modal-body {
      margin: 0 0 8px;
      color: var(--muted);
    }
    .modal-key {
      background: #f5f8f6;
      border-radius: 12px;
      padding: 8px 10px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
    }
    .modal-actions button {
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
    }
    .modal-actions button:hover { background: #f4f7f5; }
  </style>
</head>

    </div>

    <div class="options" id="options"></div>

    <div class="footer">
      <span id="status">Выберите термин.</span>
      <div>
        <button id="resetBtn" type="button" disabled>Отменить выбор</button>
        <button id="nextBtn" type="button" disabled>Следующее определение</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="overlay" aria-hidden="true">

      <div class="modal-actions">

      </div>
    </div>
  </div>

    const definitionEl = document.getElementById('definition');
    const optionsEl = document.getElementById('options');
    const progressEl = document.getElementById('progress');
    const statusEl = document.getElementById('status');
    const resetBtn = document.getElementById('resetBtn');
    const nextBtn = document.getElementById('nextBtn');
    const overlay = document.getElementById('overlay');
    const modalLabel = document.getElementById('modalLabel');
    const modalTitle = document.getElementById('modalTitle');
    const modalBody = document.getElementById('modalBody');
    const modalKey = document.getElementById('modalKey');
    const closeModal = document.getElementById('closeModal');

    let index = 0;

    function renderCard() {
      const item = data[index];
      definitionEl.textContent = item.definition;
      progressEl.textContent = `Термин ${index + 1} из ${data.length}`;
      statusEl.textContent = 'Выберите термин.';
      resetBtn.disabled = true;
      nextBtn.disabled = true;
      optionsEl.innerHTML = '';
      item.options.forEach(name => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'option';
        const spanLabel = document.createElement('span');
        spanLabel.className = 'label';
        spanLabel.textContent = name;
        const spanTag = document.createElement('span');
        spanTag.className = 'tag';
        spanTag.textContent = 'термин';
        btn.append(spanLabel, spanTag);
        btn.addEventListener('click', () => onOptionClick(btn, name));
        optionsEl.appendChild(btn);
      });
    }

    function onOptionClick(btn, name) {
      const item = data[index];
      const fb = item.feedback[name];
      document.querySelectorAll('.option').forEach(b => {
        b.classList.remove('correct', 'wrong');
      });
      btn.classList.add(fb.type === 'good' ? 'correct' : 'wrong');
      resetBtn.disabled = false;
      nextBtn.disabled = false;
      statusEl.textContent = fb.type === 'good'
        ? 'Вы подобрали верный термин. Можно перейти к следующему определению.'
        : 'В этом ответе есть неточность. Посмотрите пояснение и при желании попробуйте другой вариант.';
      openModal(fb.type, fb.title, fb.body, fb.key);
    }

    function openModal(type, title, body, key) {
      modalLabel.textContent = type === 'good' ? 'Верный выбор' : 'Не совсем точно';
      modalLabel.className = 'modal-label ' + (type === 'good' ? 'good' : 'bad');
      modalTitle.textContent = title;
      modalBody.textContent = body;
      modalKey.textContent = key;
      overlay.classList.add('active');
      overlay.setAttribute('aria-hidden', 'false');
    }

    function closeModalFn() {
      overlay.classList.remove('active');
      overlay.setAttribute('aria-hidden', 'true');
    }

    resetBtn.addEventListener('click', () => {
      document.querySelectorAll('.option').forEach(b => {
        b.classList.remove('correct', 'wrong');
      });
      resetBtn.disabled = true;
      nextBtn.disabled = true;
      statusEl.textContent = 'Выберите термин.';
    });

    nextBtn.addEventListener('click', () => {
      if (index < data.length - 1) {
        index++;
        renderCard();
      } else {
        statusEl.textContent = 'Глоссарий собран. Можно вернуться к уроку.';
        nextBtn.disabled = true;
        resetBtn.disabled = true;
      }
    });

    closeModal.addEventListener('click', closeModalFn);
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) closeModalFn();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModalFn();
    });

    renderCard();
  </script>
