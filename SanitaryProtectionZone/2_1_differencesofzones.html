<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Интерактив по СЗЗ - Как отличить СЗЗ от других зон</title>
  <style>
    :root {
      --bg: #f5f7f6;
      --card: #ffffff;
      --text: #1f2a24;
      --muted: #68756e;
      --line: #dce5df;
      --green: #2d6a4f;
      --green-soft: #e7f3ed;
      --green-soft-2: #f4faf7;
      --good: #2d6a4f;
      --bad: #b4532a;
      --bad-soft: #fff1ea;
      --shadow: 0 16px 44px rgba(26, 36, 31, 0.12);
      --radius: 18px;
      --transition: 180ms ease;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #fbfcfb 0%, var(--bg) 100%);
      color: var(--text);
      line-height: 1.5;
      padding: 18px 10px 24px;
    }

    .app {
      width: 100%;
      max-width: 650px;
      height: 620px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff 0%, #fbfdfc 100%);
      flex: 0 0 auto;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--green-soft);
      color: var(--green);
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 26px;
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 10px 20px 8px;
      border-bottom: 1px solid var(--line);
      background: #fcfdfc;
      flex: 0 0 auto;
    }

    .tool-btn {
      appearance: none;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: transform var(--transition), border-color var(--transition), background var(--transition), box-shadow var(--transition);
    }

    .tool-btn:hover { transform: translateY(-1px); }

    .tool-btn.primary {
      background: linear-gradient(180deg, #f2fbf6 0%, #e7f3ed 100%);
      border-color: #bcd8c8;
      color: var(--green);
      box-shadow: 0 10px 24px rgba(45, 106, 79, 0.12);
    }

    .progress-wrap {
      padding: 8px 20px 0;
      flex: 0 0 auto;
    }

    .progress-line {
      width: 100%;
      height: 8px;
      background: #edf2ef;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #4f8d72 0%, var(--green) 100%);
      transition: width 220ms ease;
    }

    .progress-text {
      margin-top: 4px;
      font-size: 11px;
      color: var(--muted);
    }

    .stage {
      padding: 10px 20px 12px;
      display: flex;
      flex-direction: column;
      min-height: 0;
      flex: 1 1 auto;
    }

    .step-card {
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 14px 14px 12px;
      background: #fff;
      min-height: 300px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 10px;
    }

    .step-meta {
      font-size: 11px;
      font-weight: 700;
      color: var(--green);
      background: var(--green-soft);
      padding: 6px 9px;
      border-radius: 999px;
      display: inline-flex;
      width: fit-content;
    }

    .step-title {
      margin: 6px 0 4px;
      font-size: 21px;
      line-height: 1.2;
    }

    .step-text {
      margin: 0 0 6px;
      font-size: 13px;
      color: var(--muted);
    }

    .options {
      display: grid;
      gap: 8px;
    }

    .option-btn {
      appearance: none;
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: transform var(--transition), border-color var(--transition), background var(--transition);
    }

    .option-btn:hover {
      transform: translateY(-1px);
      border-color: #bfd5c8;
      background: #fcfefd;
    }

    .option-btn.correct-lock {
      border-color: var(--green);
      background: var(--green-soft);
      color: var(--green);
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
      flex: 0 0 auto;
    }

    .status {
      font-size: 11px;
      color: var(--muted);
    }

    .btn {
      appearance: none;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 999px;
      padding: 8px 11px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: transform var(--transition), background var(--transition), border-color var(--transition);
    }

    .btn:hover { transform: translateY(-1px); }

    .btn-primary {
      background: var(--green-soft);
      border-color: #cde0d5;
      color: var(--green);
    }

    .btn-primary:disabled {
      opacity: 0.4;
      cursor: default;
      transform: none;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(17, 24, 21, 0.42);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 50;
      backdrop-filter: blur(4px);
    }

    .overlay.active { display: flex; }

    .modal {
      width: min(520px, 100%);
      max-height: min(80vh, 560px);
      overflow: auto;
      background: #fff;
      border-radius: 20px;
      border: 1px solid var(--line);
      box-shadow: 0 22px 70px rgba(12, 18, 15, 0.25);
      padding: 18px;
      animation: rise 160ms ease;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .modal-tag {
      display: inline-block;
      border-radius: 999px;
      padding: 6px 9px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .modal-tag.good {
      background: var(--green-soft);
      color: var(--green);
    }

    .modal-tag.bad {
      background: var(--bad-soft);
      color: var(--bad);
    }

    .modal-tag.info {
      background: #eef4f1;
      color: #486257;
    }

    .modal h3 {
      margin: 0 0 6px;
      font-size: 20px;
      line-height: 1.15;
    }

    .modal p {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .modal .key {
      background: #f7faf8;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      font-weight: 600;
      color: var(--text);
      margin-top: 8px;
      font-size: 13px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    @media (max-width: 700px) {
      .app { height: 620px; }
      .stage { overflow: auto; }
      .step-card { min-height: auto; }
      .step-title { font-size: 19px; }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="Интерактив по СЗЗ">
    <section class="header">
      <div class="eyebrow">Интерактив по теме СЗЗ</div>
      <h1>Как отличить СЗЗ от других зон</h1>
      <p class="lead">Пройдите несколько шагов и разберитесь, чем санитарно-защитная зона отличается от других ограничений вокруг площадки.</p>
    </section>

    <section class="toolbar">
      <button class="tool-btn primary" type="button" id="rulesBtn">Сначала откройте правила</button>
      <button class="tool-btn" type="button" id="hintBtn">Что важно понять</button>
      <button class="tool-btn" type="button" id="restartBtn">Начать заново</button>
    </section>

    <section class="progress-wrap">
      <div class="progress-line"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">Шаг 1 из 6</div>
    </section>

    <section class="stage">
      <div class="step-card">
        <div>
          <div class="step-meta" id="stepMeta">Шаг 1</div>
          <h2 class="step-title" id="stepTitle">Загрузка</h2>
          <p class="step-text" id="stepText"></p>
        </div>
        <div class="options" id="optionsBox"></div>
      </div>

      <div class="footer">
        <div class="status" id="statusText">Выберите ответ.</div>
      </div>
    </section>
  </main>

  <div class="overlay" id="feedbackOverlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="feedbackTitle">
      <div class="modal-tag good" id="feedbackTag">Верно</div>
      <h3 id="feedbackTitle">Комментарий</h3>
      <p id="feedbackBody"></p>
      <div class="key" id="feedbackKey"></div>
      <div class="modal-actions">
        <button class="btn" type="button" id="closeFeedbackBtn">Закрыть</button>
        <button class="btn btn-primary" type="button" id="nextQuestionBtn" disabled>Следующий вопрос</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="infoOverlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="infoTitle">
      <div class="modal-tag info">Подсказка</div>
      <h3 id="infoTitle">Информация</h3>
      <p id="infoBody"></p>
      <div class="key" id="infoKey"></div>
      <div class="modal-actions">
        <button class="btn" type="button" id="closeInfoBtn">Закрыть</button>
      </div>
    </div>
  </div>

  <script>
    const steps = [
      {
        meta: 'Шаг 1',
        title: 'Какая цель относится именно к СЗЗ',
        text: 'Выберите формулировку, которая точнее всего описывает главную цель санитарно-защитной зоны. Смотрите не только на слова про ограничения, но и на то, кого именно эта зона должна защитить.',
        options: [
          {
            label: 'Защита здоровья населения от техногенных факторов, связанных с работой объекта',
            correct: true,
            feedback: {
              type: 'good',
              title: 'Верно',
              body: 'Главный смысл санитарно-защитной зоны именно в защите людей. Зона нужна для того, чтобы снизить воздействие выбросов, шума, запахов и других техногенных факторов до уровней, которые считаются безопасными для здоровья населения.',
              key: 'СЗЗ всегда привязана к источнику воздействия и защищает от него людей, а не имущество или природу само по себе.'
            }
          },
          {
            label: 'Сохранение инженерных сетей и обеспечение доступа к ним',
            correct: false,
            feedback: {
              type: 'bad',
              title: 'Это не СЗЗ',
              body: 'Такая формулировка описывает охранные зоны инженерных коммуникаций. Там защищают трубопроводы, кабели и оборудование, чтобы его можно было безопасно эксплуатировать и обслуживать.',
              key: 'Если цель зоны - защитить саму инфраструктуру, а не здоровье людей, это уже другая зона, не санитарно-защитная.'
            }
          },
          {
            label: 'Сохранение историко-культурной ценности территории',
            correct: false,
            feedback: {
              type: 'bad',
              title: 'Это не СЗЗ',
              body: 'Зоны, созданные ради сохранения историко-культурной ценности, относятся к зонам охраны объектов культурного наследия. Там ограничения вводят ради сохранения облика и состояния памятников.',
              key: 'СЗЗ не про культурную ценность территории, ее задача - санитарная защита населения от влияния конкретного объекта.'
            }
          }
        ]
      },
      {
        meta: 'Шаг 2',
        title: 'Как распознать СЗЗ в документах',
        text: 'Теперь важно понять, по какому признаку вы быстрее всего узнаете именно санитарно-защитную зону, если перед вами текст документа.',
        options: [
          {
            label: 'Она всегда привязана к конкретному объекту, который создает воздействие',
            correct: true,
            feedback: {
              type: 'good',
              title: 'Верно',
              body: 'СЗЗ не существует сама по себе и не размазывается по территории произвольно. Ее смысл в том, что она «оборачивает» конкретный источник воздействия и отделяет его от территорий, где живут или регулярно находятся люди.',
              key: 'Если в документе зона напрямую связана с определенным объектом и его выбросами или воздействием, это сильный признак того, что речь идет о СЗЗ.'
            }
          },
          {
            label: 'Она вводится вокруг любой территории, где действуют ограничения',
            correct: false,
            feedback: {
              type: 'bad',
              title: 'Неточно',
              body: 'Ограничений в градостроительных документах много, и далеко не каждое связано с санитарно-защитной зоной. Бывают ограничения из‑за линий электропередачи, трубопроводов, водных объектов или культурного наследия.',
              key: 'Сам факт наличия ограничений еще не делает зону санитарно-защитной. Сначала смотрите, что именно и от чего защищают.'
            }
          },
          {
            label: 'Она нужна только для обозначения границ земельного участка',
            correct: false,
            feedback: {
              type: 'bad',
              title: 'Неверно',
              body: 'Границы земельного участка фиксируют в кадастровых документах. Санитарно-защитная зона может затрагивать сразу несколько участков и не совпадать с их границами, потому что она рассчитывается исходя из воздействия объекта.',
              key: 'СЗЗ - это не про формальное ограждение участка, а про санитарный пояс безопасности вокруг источника воздействия.'
            }
          }
        ]
      },
      {
        meta: 'Шаг 3',
        title: 'Кто устанавливает СЗЗ',
        text: 'Посмотрите на формулировки и выберите ту, которая отражает реальный порядок появления санитарно-защитной зоны.',
        options: [
          {
            label: 'СЗЗ устанавливается через проект и решение Роспотребнадзора',
            correct: true,
            feedback: {
              type: 'good',
              title: 'Верно',
              body: 'Чтобы зона считалась установленной, недостаточно просто нарисовать ее на схеме. Нужен проект СЗЗ, в котором обосновывают размеры и режим территории, а потом решение уполномоченного органа, обычно Роспотребнадзора.',
              key: 'СЗЗ всегда опирается на расчет, проект и официальное решение. Это отличает ее от условных внутренних схем предприятия.'
            }
          },
          {
            label: 'СЗЗ появляется автоматически, если рядом есть жилые дома',
            correct: false,
            feedback: {
              type: 'bad',
              title: 'Неверно',
              body: 'Факт наличия жилья рядом с предприятием сам по себе не создает санитарно-защитную зону. Он лишь показывает, что такая зона нужна и ее параметры важно правильно рассчитать.',
              key: 'Автоматически СЗЗ не возникает. Ее нужно обосновать и установить в установленном порядке.'
            }
          },
          {
            label: 'СЗЗ определяет только собственник площадки без проекта',
            correct: false,
            feedback: {
              type: 'bad',
              title: 'Неверно',
              body: 'Собственник может инициировать работу по подготовке проекта и обращению в Роспотребнадзор, но не может своим односторонним решением «назначить» санитарно-защитную зону.',
              key: 'СЗЗ - это не внутренний регламент предприятия, а официальный режим территории, который подтверждает уполномоченный орган.'
            }
          }
        ]
      },
      {
        meta: 'Шаг 4',
        title: 'Какая зона перед вами',
        text: 'Представьте, что вы читаете выдержку из документа и пытаетесь понять, о какой зоне идет речь. Важно опираться на цель зоны и объект защиты.',
        options: [
          {
            label: 'Санитарно-защитная зона',
            correct: false,
            feedback: {
              type: 'bad',
              title: 'Это не СЗЗ',
              body: 'Если в описании основной акцент на защите сети, трубопровода или другого инженерного объекта, то речь идет не о санитарно-защитной зоне. СЗЗ создают в первую очередь ради здоровья людей, а не для сохранности коммуникаций.',
              key: 'Всегда спрашивайте себя, что хотят защитить. Если это инженерная инфраструктура, это уже другая зона.'
            }
          },
          {
            label: 'Охранная зона коммуникаций',
            correct: true,
            feedback: {
              type: 'good',
              title: 'Верно',
              body: 'Формулировка про защиту инженерной инфраструктуры и безопасную эксплуатацию сети характерна как раз для охранной зоны коммуникаций. Там ограничения вводят, чтобы не повредить сети и обеспечить доступ для ремонта.',
              key: 'Смысл охранной зоны коммуникаций - защитить сами коммуникации. Смысл СЗЗ - защитить людей от воздействия источника.'
            }
          },
          {
            label: 'Водоохранная зона',
            correct: false,
            feedback: {
              type: 'bad',
              title: 'Неточно',
              body: 'Водоохранные зоны привязаны к водным объектам и нужны, чтобы защитить воду от загрязнения и истощения. Они вводят ограничения на хозяйственную деятельность возле рек, озер или водохранилищ.',
              key: 'Если в описании говорится о защите воды, а не сетей и не населения, это уже логика водоохранной зоны, а не СЗЗ.'
            }
          }
        ]
      },
      {
        meta: 'Шаг 5',
        title: 'Могут ли зоны сочетаться',
        text: 'Здесь важно понять не только, чем зоны отличаются, но и как они могут сосуществовать вокруг одной и той же площадки.',
        options: [
          {
            label: 'Если вокруг площадки установлена СЗЗ, других зон рядом быть не может',
            correct: false,
            feedback: {
              type: 'bad',
              title: 'Неверно',
              body: 'На практике вокруг одного и того же объекта могут действовать несколько разных зон с особыми условиями использования территории. Например, санитарно-защитная зона предприятия может пересекаться с охранной зоной линий электропередачи или с водоохранной зоной.',
              key: 'Важно не ждать, что будет какая‑то одна «главная» зона. Важно понимать, какие режимы действуют одновременно и чем они отличаются.'
            }
          },
          {
            label: 'Вокруг одной площадки могут действовать разные зоны, поэтому в документах важно уточнять, какая из них СЗЗ',
            correct: true,
            feedback: {
              type: 'good',
              title: 'Верно',
              body: 'Когда вокруг площадки одновременно действуют несколько зон, одинаковое слово «зона» в документах легко вводит в заблуждение. Поэтому в переписке, договорах и проектах нужно всегда уточнять конкретный вид зоны и ссылаться на правильный документ.',
              key: 'Чтобы не запутаться и не ошибиться в правовых последствиях, зону нужно называть по функции: СЗЗ, водоохранная зона, охранная зона коммуникаций и так далее.'
            }
          },
          {
            label: 'Если в документах указано несколько зон, можно считать их одной общей зоной',
            correct: false,
            feedback: {
              type: 'bad',
              title: 'Неверно',
              body: 'Объединять разные зоны в одну условную «общую» зону опасно. У каждой зоны свой режим, свои запреты и свои основания установления. При таком упрощении легко ошибиться в требованиях и нарушить ограничения.',
              key: 'Разные зоны - это разные правовые режимы. Их нужно различать, а не сводить в одну абстрактную зону с ограничениями.'
            }
          }
        ]
      },
      {
        meta: 'Шаг 6',
        title: 'Когда параметры СЗЗ могут измениться',
        text: 'В завершение посмотрите, в каких случаях санитарно-защитная зона может потребовать пересмотра. Это важно для понимания, что СЗЗ связана с реальным воздействием, а не раз и навсегда заданной линией на карте.',
        options: [
          {
            label: 'Границы и параметры СЗЗ могут пересматриваться при реконструкции объекта или изменении технологии',
            correct: true,
            feedback: {
              type: 'good',
              title: 'Верно',
              body: 'Когда предприятие меняет технологию, состав выбросов, мощность оборудования или характер работы, меняется и его воздействие на среду. В таких случаях санитарно-защитную зону могут пересчитать и уточнить, чтобы она продолжала выполнять свою защитную функцию.',
              key: 'СЗЗ жива в том смысле, что ее параметры зависят от реального воздействия. Меняется объект - может измениться и зона вокруг него.'
            }
          },
          {
            label: 'СЗЗ устанавливается один раз и больше никогда не меняется',
            correct: false,
            feedback: {
              type: 'bad',
              title: 'Неверно',
              body: 'Фиксировать санитарно-защитную зону навсегда, независимо от того, как меняется предприятие, было бы неправильно. Тогда зона могла бы либо избыточно ограничивать территорию, либо, наоборот, перестать защищать людей при усилении воздействия.',
              key: 'Логика СЗЗ в том, чтобы соответствовать актуальному уровню воздействия, а не устаревшим данным о предприятии.'
            }
          },
          {
            label: 'СЗЗ меняется только по желанию правообладателя участка',
            correct: false,
            feedback: {
              type: 'bad',
              title: 'Неверно',
              body: 'Желание правообладателя участка само по себе не является основанием для изменения санитарно-защитной зоны. Нужны обоснования, расчеты, проект и установленная процедура согласования и утверждения.',
              key: 'СЗЗ привязана к санитарным требованиям и нормам, а не к удобству или планам собственника территории.'
            }
          }
        ]
      }
    ];

    const infoTexts = {
      rules: {
        title: 'Как работать с интерактивом',
        body: 'На каждом шаге читайте вопрос и выбирайте один вариант ответа. После выбора откроется окно с комментарием. Если ответ неверный, закройте окно и попробуйте другой вариант. Перейти к следующему вопросу можно только после того, как вы найдете верный ответ и нажмете кнопку «Следующий вопрос».',
        key: 'Старайтесь определять не только правильную формулировку, но и логику зон: кого они защищают, от чего именно и как устанавливаются.'
      },
      hint: {
        title: 'Что важно понять до начала',
        body: 'Санитарно-защитная зона нужна, чтобы отделить источник воздействия от людей. Вокруг той же площадки могут действовать и другие зоны: для защиты водных объектов, инженерной инфраструктуры или культурного наследия. Важно научиться различать эти зоны и не путать их между собой.',
        key: 'СЗЗ всегда связана с конкретным объектом и здоровьем населения. Остальные зоны обычно защищают другие объекты: воду, сети, здания или природу.'
      }
    };

    const stepMeta = document.getElementById('stepMeta');
    const stepTitle = document.getElementById('stepTitle');
    const stepText = document.getElementById('stepText');
    const optionsBox = document.getElementById('optionsBox');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const statusText = document.getElementById('statusText');
    const restartBtn = document.getElementById('restartBtn');

    const feedbackOverlay = document.getElementById('feedbackOverlay');
    const feedbackTag = document.getElementById('feedbackTag');
    const feedbackTitle = document.getElementById('feedbackTitle');
    const feedbackBody = document.getElementById('feedbackBody');
    const feedbackKey = document.getElementById('feedbackKey');
    const closeFeedbackBtn = document.getElementById('closeFeedbackBtn');
    const nextQuestionBtn = document.getElementById('nextQuestionBtn');

    const infoOverlay = document.getElementById('infoOverlay');
    const infoTitle = document.getElementById('infoTitle');
    const infoBody = document.getElementById('infoBody');
    const infoKey = document.getElementById('infoKey');
    const closeInfoBtn = document.getElementById('closeInfoBtn');

    let currentStep = 0;
    let pendingFeedback = false;
    let lastChosenCorrect = false;

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function updateProgress() {
      const percent = ((currentStep + 1) / steps.length) * 100;
      progressFill.style.width = percent + '%';
      progressText.textContent = `Шаг ${currentStep + 1} из ${steps.length}`;
    }

    function openFeedback(type, title, body, key, isCorrect) {
      feedbackTag.textContent = type === 'good' ? 'Верно' : 'Есть неточность';
      feedbackTag.className = 'modal-tag ' + (type === 'good' ? 'good' : 'bad');
      feedbackTitle.textContent = title;
      feedbackBody.textContent = body;
      feedbackKey.textContent = key;
      feedbackOverlay.classList.add('active');
      feedbackOverlay.setAttribute('aria-hidden', 'false');
      pendingFeedback = true;
      if (isCorrect) {
        nextQuestionBtn.disabled = false;
      }
    }

    function closeFeedback() {
      feedbackOverlay.classList.remove('active');
      feedbackOverlay.setAttribute('aria-hidden', 'true');
    }

    function openInfo(type) {
      const item = infoTexts[type];
      infoTitle.textContent = item.title;
      infoBody.textContent = item.body;
      infoKey.textContent = item.key;
      infoOverlay.classList.add('active');
      infoOverlay.setAttribute('aria-hidden', 'false');
    }

    function closeInfo() {
      infoOverlay.classList.remove('active');
      infoOverlay.setAttribute('aria-hidden', 'true');
    }

    function goNextStep() {
      if (!lastChosenCorrect) return;
      closeFeedback();
      pendingFeedback = false;
      if (currentStep === steps.length - 1) {
        statusText.textContent = 'Вы ответили на все вопросы этого интерактива.';
        return;
      }
      currentStep += 1;
      renderStep();
    }

    function renderStep() {
      const step = steps[currentStep];
      stepMeta.textContent = step.meta;
      stepTitle.textContent = step.title;
      stepText.textContent = step.text;
      optionsBox.innerHTML = '';
      pendingFeedback = false;
      lastChosenCorrect = false;
      nextQuestionBtn.disabled = true;
      statusText.textContent = 'Выберите ответ.';

      const shuffled = shuffle(step.options);

      shuffled.forEach(option => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.type = 'button';
        btn.textContent = option.label;

        btn.addEventListener('click', () => {
          const isCorrect = !!option.correct;

          if (isCorrect) {
            lastChosenCorrect = true;
            btn.classList.add('correct-lock');
            optionsBox.querySelectorAll('button').forEach(item => {
              if (item !== btn) item.disabled = true;
            });
            statusText.textContent = 'Верный вариант. Нажмите «Следующий вопрос», чтобы двигаться дальше.';
          } else {
            statusText.textContent = 'Ответ с неточностью. Посмотрите комментарий и попробуйте другой вариант.';
          }

          openFeedback(option.feedback.type, option.feedback.title, option.feedback.body, option.feedback.key, isCorrect);
        });

        optionsBox.appendChild(btn);
      });

      updateProgress();
    }

    document.getElementById('rulesBtn').addEventListener('click', () => openInfo('rules'));
    document.getElementById('hintBtn').addEventListener('click', () => openInfo('hint'));
    closeInfoBtn.addEventListener('click', closeInfo);

    closeFeedbackBtn.addEventListener('click', () => {
      if (!pendingFeedback) return;
      closeFeedback();
      pendingFeedback = false;
      // после закрытия окна при любом ответе можно снова нажимать на варианты
      if (!lastChosenCorrect) {
        optionsBox.querySelectorAll('button').forEach(btn => {
          btn.disabled = false;
        });
      }
    });

    nextQuestionBtn.addEventListener('click', () => {
      if (!pendingFeedback || !lastChosenCorrect) return;
      goNextStep();
    });

    function resetInteractive() {
      currentStep = 0;
      pendingFeedback = false;
      lastChosenCorrect = false;
      closeFeedback();
      closeInfo();
      renderStep();
    }

    restartBtn.addEventListener('click', resetInteractive);

    [feedbackOverlay, infoOverlay].forEach(overlay => {
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) overlay.classList.remove('active');
      });
    });

    renderStep();
  </script>
</body>
</html>
