<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Стратегия сокращения СЗЗ – линейный кейс</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg: #f6f4f0;
      --surface: #ffffff;
      --surface-soft: #fbfaf7;
      --header: #e9f3ee;
      --border: #d5d0c7;
      --text: #26231c;
      --muted: #6a665f;
      --primary: #0d6b62;
      --primary-soft: #d6e7e3;
      --primary-dark: #0b5750;
      --warn: #b27a1e;
      --warn-soft: #f6ecd6;
      --danger: #a13544;
      --danger-soft: #f7dde1;
      --tag-blue: #e0e4ff;
      --tag-blue-text: #28347a;
      --tag-grey: #ece7f3;
      --tag-grey-text: #51486f;
      --radius-xl: 22px;
      --radius-lg: 16px;
      --radius-md: 12px;
      --shadow: 0 14px 36px rgba(0,0,0,.08);
      --font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      background: #f2f2f0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 1rem 0;
      color: var(--text);
    }

    button {
      font: inherit;
      cursor: pointer;
      border: none;
    }

    .app-wrapper {
      width: 680px;
      height: 700px;
      background: var(--surface);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      border: 1px solid rgba(207,200,189,.9);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .app {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Шапка */
    .header {
      background: linear-gradient(180deg,#ecf6ef,#e6f0eb);
      padding: .9rem 1.1rem .8rem;
      border-bottom: 1px solid #d7e1db;
    }
    .header-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin: 0 0 .15rem;
      color: #214939;
    }
    .header-sub {
      font-size: .85rem;
      margin: 0;
      color: var(--muted);
    }

    .oleg-block {
      display: grid;
      grid-template-columns: auto minmax(0,1fr);
      gap: .6rem;
      align-items: center;
      margin-top: .7rem;
      padding: .55rem .65rem;
      background: rgba(255,255,255,.85);
      border-radius: 999px;
    }
    .oleg-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      overflow: hidden;
      border: 1px solid #c5d2c9;
      background: #dde4dd;
      flex-shrink: 0;
    }
    .oleg-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .oleg-text {
      font-size: .82rem;
      color: #38463f;
    }
    .oleg-name {
      font-weight: 600;
      margin-right: .25rem;
    }

    /* Статус-бар и вкладки этапов */
    .status-bar {
      padding: .4rem 1.1rem .6rem;
      border-bottom: 1px solid var(--border);
      background: #f6f4f0;
    }
    .progress-line {
      height: 6px;
      border-radius: 999px;
      background: #e3ddd2;
      overflow: hidden;
      margin-bottom: .45rem;
    }
    .progress-line-inner {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg,#0d6b62,#4b9a93);
      transition: width .25s ease;
    }
    .steps-tabs {
      display: flex;
      gap: .4rem;
      flex-wrap: wrap;
      font-size: .78rem;
    }
    .step-tab {
      border-radius: 999px;
      padding: .18rem .55rem;
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      cursor: default;
      display: inline-flex;
      align-items: center;
      gap: .25rem;
    }
    .step-tab-badge {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #d0cbc2;
      color: #fff;
      font-size: .7rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .step-tab.current {
      border-color: #0d6b62;
      background: #e7f3ef;
      color: #1f4239;
    }
    .step-tab.current .step-tab-badge {
      background: #0d6b62;
    }
    .step-tab.done .step-tab-badge {
      background: #4b9a93;
    }

    /* Основная область */
    .content {
      flex: 1;
      padding: .9rem 1.1rem 1rem;
      overflow-y: auto;
      background: radial-gradient(circle at 0 0,#ffffff 0,#f7f4ef 40%,#efe7db 100%);
    }

    h2 {
      margin: 0 0 .4rem;
      font-size: 1.05rem;
    }
    p {
      margin: 0 0 .45rem;
      line-height: 1.5;
      font-size: .88rem;
    }
    .muted {
      color: var(--muted);
    }

    .question-lead {
      margin-bottom: .3rem;
    }

    .cases-grid {
      display: grid;
      grid-template-columns: repeat(2,minmax(0,1fr));
      gap: .5rem;
      margin-top: .4rem;
    }
    .case-card {
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      background: var(--surface-soft);
      padding: .55rem .6rem .6rem;
      font-size: .82rem;
      display: flex;
      flex-direction: column;
      gap: .15rem;
      cursor: pointer;
      position: relative;
    }
    .case-card.selected {
      border-color: #0d6b62;
      box-shadow: 0 0 0 2px rgba(13,107,98,.12);
    }
    .case-header {
      font-weight: 600;
      margin-bottom: .05rem;
    }
    .case-desc {
      color: var(--muted);
      font-size: .8rem;
    }
    .case-tags {
      display: flex;
      flex-wrap: wrap;
      gap: .25rem;
      margin-top: .2rem;
    }
    .tag {
      border-radius: 999px;
      padding: .08rem .4rem;
      font-size: .72rem;
      white-space: nowrap;
    }
    .tag-blue {
      background: var(--tag-blue);
      color: var(--tag-blue-text);
    }
    .tag-grey {
      background: var(--tag-grey);
      color: var(--tag-grey-text);
    }
    .tag-yellow {
      background: #fff3d1;
      color: #8b6b1b;
    }
    .tag-red {
      background: #fbe0e5;
      color: #8f3848;
    }

    .goal-box {
      margin-top: .7rem;
      padding: .45rem .55rem;
      border-radius: var(--radius-md);
      background: rgba(255,255,255,.9);
      border: 1px solid var(--border);
      font-size: .8rem;
      color: var(--muted);
    }

    .bottom-actions {
      margin-top: .8rem;
      display: flex;
      justify-content: space-between;
      gap: .5rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .btn-primary-main {
      flex: 1;
      text-align: center;
      background: var(--primary);
      color: #fff;
      border-radius: 999px;
      padding: .5rem 1rem;
      font-weight: 600;
      border: none;
    }
    .btn-primary-main:disabled {
      opacity: .5;
      cursor: default;
    }
    .btn-ghost-small {
      background: transparent;
      border-radius: 999px;
      border: 1px dashed var(--border);
      padding: .35rem .7rem;
      font-size: .78rem;
      color: var(--muted);
    }

    /* Модальное окно */
    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal.active {
      display: flex;
    }
    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.35);
    }
    .modal-dialog {
      position: relative;
      z-index: 1;
      max-width: 480px;
      width: calc(100% - 2rem);
      background: #ffffff;
      border-radius: 18px;
      border: 1px solid var(--border);
      box-shadow: 0 18px 40px rgba(0,0,0,.25);
      padding: 1rem 1.1rem .9rem;
      font-size: .88rem;
    }
    .modal-title {
      margin: 0 0 .4rem;
      font-size: .98rem;
    }
    .modal-text {
      margin: 0 0 .7rem;
      color: var(--text);
    }
    .modal-note {
      font-size: .8rem;
      color: var(--muted);
      margin: 0 0 .5rem;
    }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
    }
    .modal-close-btn {
      border-radius: 999px;
      padding: .35rem .9rem;
      border: 1px solid var(--border);
      background: #fbfaf7;
      font-size: .84rem;
      cursor: pointer;
    }
    .modal-x {
      position: absolute;
      top: .4rem;
      right: .5rem;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      background: #fbfaf7;
      font-size: .85rem;
      cursor: pointer;
    }

    @media (max-width: 720px) {
      .cases-grid {
        grid-template-columns: minmax(0,1fr);
      }
    }
  </style>
</head>
<body>
  <div class="app-wrapper">
    <div class="app">
      <header class="header">
        <h1 class="header-title">Стратегия сокращения СЗЗ</h1>
        <p class="header-sub">Баланс между снижением воздействия и ограниченным бюджетом</p>

        <div class="oleg-block">

          </div>
        </div>
      </header>

      <section class="status-bar">
        <div class="progress-line">
          <div class="progress-line-inner" id="progressBar"></div>
        </div>
        <div class="steps-tabs" id="stepsTabs"></div>
      </section>

      <main class="content" id="contentArea">
        <!-- сюда подставляются шаги -->
      </main>
    </div>
  </div>

  <!-- Модальное окно с разбором -->
  <div class="modal" id="feedbackModal" aria-hidden="true">
    <div class="modal-backdrop" data-role="close"></div>
    <div class="modal-dialog" role="dialog" aria-modal="true">
      <button class="modal-x" type="button" data-role="close">×</button>
      <h2 class="modal-title" id="modalTitle"></h2>
      <p class="modal-text" id="modalText"></p>
      <p class="modal-note" id="modalNote"></p>
      <div class="modal-footer">
        <button class="modal-close-btn" type="button" data-role="close">Продолжить</button>
      </div>
    </div>
  </div>

            note: 'На практике диагностика должна описывать и градостроительный, и санитарный контекст, а также последствия бездействия для предприятия.'

            note: 'Важно документировать, почему выбраны именно такие режимы и точки.'

          {

            tags: ['Проверка расчетных максимумов','Повышенная нагрузка'],

            score: 2,
            feedbackTitle: 'Устойчивый подход к подтверждению расчетов',

            note: 'Не обязательно выполнять очень большой объем измерений, важнее качественно обосновать выбор точек и режимов.'

            note: 'Если выбран этот путь, полезно дополнительно пояснить, как эти точки связаны с результатами расчетов.'

        ]
      },
      {
        id: 6,
        short: 'Согласование',
        title: 'Подача материалов в Роспотребнадзор',
        goal: 'Цель этапа – сформировать комплект документов и позицию предприятия.',
        question: 'Проект СЗЗ и результаты замеров готовы. Как оформить подачу материалов в Роспотребнадзор?',
        options: [
          {
            id: '6a',
            title: 'Минимальный комплект',
            desc: 'Направить проект и протоколы замеров без развернутого пояснения, как мероприятия и расчеты связаны между собой.',
            tags: ['Экономия времени','Риск запросов'],
            risk: 'Высокий риск дополнительных запросов',
            score: 0,
            feedbackTitle: 'Формальная подача с повышенным риском уточнений',
            feedback: 'Минимальный комплект позволяет быстро подать материалы, но экспертизе сложнее восстановить логику проекта. Это увеличивает вероятность запросов и продления сроков рассмотрения.',
            note: 'Даже при минимальном комплекте полезно иметь внутреннюю записку, в которой логика проекта сформулирована.'
          },
          {
            id: '6b',
            title: 'Структурированное сопровождение',
            desc: 'Приложить проект, протоколы замеров и сопроводительное письмо, где перечислены мероприятия, ключевые выводы расчетов и логика выбора СЗЗ.',
            tags: ['Прозрачность','Управляемость процесса'],
            risk: 'Требует времени на подготовку',
            score: 2,
            feedbackTitle: 'Управляемый процесс согласования',
            feedback: 'Структурированное сопровождение помогает экспертизе быстрее увидеть логику проекта. Это снижает число уточняющих запросов и повышает прогнозируемость результата.',
            note: 'Сопроводительное письмо можно использовать как основу для внутренних презентаций и коммуникаций с другими заинтересованными сторонами.'
          },
          {
            id: '6c',
            title: 'Передача через посредника',
            desc: 'Использовать посредника для подачи материалов, ограничив участие эколога консультативной ролью.',
            tags: ['Перераспределение работы','Риск потери контекста'],
            risk: 'Сложность контроля позиции',
            score: 1,
            feedbackTitle: 'Частичная разгрузка с риском потери управляемости',
            feedback: 'Посредник может снять часть организационной нагрузки, но при этом эколог теряет прямой контроль над тем, как позиция предприятия представлена в Роспотребнадзоре.',
            note: 'Если используется посредник, важно четко зафиксировать ключевые тезисы, которые необходимо донести до экспертизы.'
          }
        ]
      }
    ];

    const totalSteps = steps.length;
    const answers = {}; // stepId -> optionId
    let currentStepIndex = 0;

    const contentArea = document.getElementById('contentArea');
    const progressBar = document.getElementById('progressBar');
    const stepsTabs = document.getElementById('stepsTabs');

    const modal = document.getElementById('feedbackModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalText = document.getElementById('modalText');
    const modalNote = document.getElementById('modalNote');

    let queuedNextStepIndex = null;

    function renderTabs() {
      stepsTabs.innerHTML = '';
      steps.forEach((step, index) => {
        const tab = document.createElement('div');
        tab.className = 'step-tab';
        if (index === currentStepIndex) tab.classList.add('current');
        if (answers[step.id]) tab.classList.add('done');
        tab.innerHTML = `
          <span class="step-tab-badge">${index + 1}</span>
          <span>${step.short}</span>
        `;
        stepsTabs.appendChild(tab);
      });
    }

    function updateProgress() {
      const completed = Object.keys(answers).length;
      const percent = (completed / totalSteps) * 100;
      progressBar.style.width = percent + '%';
    }

    function renderCurrentStep() {
      const step = steps[currentStepIndex];
      renderTabs();
      updateProgress();
      contentArea.innerHTML = '';

      const titleEl = document.createElement('h2');
      titleEl.textContent = step.title;
      contentArea.appendChild(titleEl);

      const goalEl = document.createElement('p');
      goalEl.className = 'muted';
      goalEl.textContent = step.goal;
      contentArea.appendChild(goalEl);

      const qEl = document.createElement('p');
      qEl.className = 'question-lead';
      qEl.textContent = step.question;
      contentArea.appendChild(qEl);

      if (step.id === 3) {
        renderMeasuresStep();
        return;
      }

      const grid = document.createElement('div');
      grid.className = 'cases-grid';

      step.options.forEach(opt => {
        const card = document.createElement('button');
        card.type = 'button';
        card.className = 'case-card';
        card.dataset.optionId = opt.id;
        if (answers[step.id] === opt.id) card.classList.add('selected');

        const header = document.createElement('div');
        header.className = 'case-header';
        header.textContent = opt.title;
        card.appendChild(header);

        const desc = document.createElement('div');
        desc.className = 'case-desc';
        desc.textContent = opt.desc;
        card.appendChild(desc);

        const tagsRow = document.createElement('div');
        tagsRow.className = 'case-tags';
        opt.tags.forEach((t, i) => {
          const tag = document.createElement('span');
          tag.className = 'tag ' + (i === 0 ? 'tag-blue' : 'tag-grey');
          tag.textContent = t;
          tagsRow.appendChild(tag);
        });
        if (opt.risk) {
          const riskTag = document.createElement('span');
          riskTag.className = 'tag tag-yellow';
          riskTag.textContent = opt.risk;
          tagsRow.appendChild(riskTag);
        }
        card.appendChild(tagsRow);

        card.addEventListener('click', () => handleChoice(step, opt));
        grid.appendChild(card);
      });

      contentArea.appendChild(grid);

      const goalBox = document.createElement('div');
      goalBox.className = 'goal-box';
      goalBox.textContent = 'Шаг ' + (currentStepIndex + 1) + ' из ' + totalSteps + '. Ответьте на вопрос, чтобы перейти дальше.';
      contentArea.appendChild(goalBox);

      const bottom = document.createElement('div');
      bottom.className = 'bottom-actions';
      const nextBtn = document.createElement('button');
      nextBtn.className = 'btn-primary-main';
      nextBtn.disabled = !answers[step.id];
      nextBtn.textContent = currentStepIndex === totalSteps - 1 ? 'Показать общий разбор' : 'Перейти к следующему этапу';
      nextBtn.addEventListener('click', () => {
        if (!answers[step.id]) return;
        moveToNextStep();
      });
      bottom.appendChild(nextBtn);

      const restartBtn = document.createElement('button');
      restartBtn.className = 'btn-ghost-small';
      restartBtn.textContent = 'Начать заново';
      restartBtn.addEventListener('click', resetAll);
      bottom.appendChild(restartBtn);

      contentArea.appendChild(bottom);
    }

    function handleChoice(step, opt) {
      answers[step.id] = opt.id;
      queuedNextStepIndex = currentStepIndex + 1;
      openModal(opt.feedbackTitle, opt.feedback, opt.note);
      renderCurrentStep(); // обновить выделение карточек и состояние кнопки
    }

    function moveToNextStep() {
      if (currentStepIndex < totalSteps - 1) {
        currentStepIndex += 1;
        renderCurrentStep();
      } else {
        showSummary();
      }
    }

    function resetAll() {
      Object.keys(answers).forEach(k => delete answers[k]);
      currentStepIndex = 0;
      queuedNextStepIndex = null;
      renderCurrentStep();
    }

    /* Модалка */
    function openModal(title, text, note) {
      modalTitle.textContent = title;
      modalText.textContent = text;
      modalNote.textContent = note || '';
      modal.classList.add('active');
      modal.setAttribute('aria-hidden','false');
    }

    function closeModal() {
      modal.classList.remove('active');
      modal.setAttribute('aria-hidden','true');
      if (queuedNextStepIndex !== null) {
        currentStepIndex = Math.min(queuedNextStepIndex, totalSteps - 1);
        queuedNextStepIndex = null;
        renderCurrentStep();
      }
    }

    modal.addEventListener('click', e => {
      if (e.target.dataset.role === 'close' || e.target.closest('[data-role="close"]')) {
        closeModal();
      }
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });

    /* Шаг 3 – меры */
    function renderMeasuresStep() {
      const step = steps[currentStepIndex];

      const panel = document.createElement('div');
      panel.className = 'goal-box';
      panel.textContent = 'На этом этапе вы выбираете технические меры. Важно сочетать влияние на химическую нагрузку и соблюдение бюджета.';
      contentArea.appendChild(panel);

      const info = document.createElement('p');
      info.textContent = 'Отметьте подходящие меры. После выбора пакета вы увидите комментарий.';
      contentArea.appendChild(info);

      const wrap = document.createElement('div');
      wrap.className = 'cases-grid';
      const localSelected = new Set(); // локальное состояние в рамках шага

      const measures = [
        {
          id: 'm1',
          title: 'Абсорбционная установка на основную трубу',
          desc: 'Локальная газоочистка с возвратом части вещества в процесс. Потребуется эксплуатационный контроль.',
          tags: ['Химический фактор','Существенное снижение выбросов'],
          risk: 'Требует капитальных вложений',
          weight: 2
        },
        {
          id: 'm2',
          title: 'Шумозащитный экран со стороны ЖК',
          desc: 'Акустический экран вдоль границы участка. Снижает шумовую нагрузку для жителей.',
          tags: ['Физический фактор','Имиджевый эффект'],
          risk: 'Слабое влияние на химию',
          weight: 0
        },
        {
          id: 'm3',
          title: 'Герметизация реакторов и коммуникаций',
          desc: 'Замена негерметичных узлов и систем, сокращение неорганизованных выбросов.',
          tags: ['Негерметичность','Снижение фоновых выбросов'],
          risk: 'Работы в несколько этапов',
          weight: 2
        },
        {
          id: 'm4',
          title: 'Плановая очистка фильтров в рамках ТО',
          desc: 'Регулярная очистка фильтров по регламенту эксплуатации без дополнительной модернизации.',
          tags: ['Эксплуатация','Требование нормативов'],
          risk: 'Не считается отдельной мерой',
          weight: 0
        },
        {
          id: 'm5',
          title: 'Локальные укрытия и аспирация',
          desc: 'Укрытия на участках загрузки сырья и локальная аспирация.',
          tags: ['Местные источники','Снижение залповых выбросов'],
          risk: 'Требует настройки режима',
          weight: 1
        },
        {
          id: 'm6',
          title: 'Озеленение вдоль границы СЗЗ',
          desc: 'Насаждения по периметру границы зоны. Влияют на визуальное восприятие и микроклимат.',
          tags: ['Внешняя среда','Имидж'],
          risk: 'Ограниченное влияние на концентрации',
          weight: 0
        }
      ];

      measures.forEach(m => {
        const card = document.createElement('button');
        card.type = 'button';
        card.className = 'case-card';
        card.dataset.id = m.id;

        const header = document.createElement('div');
        header.className = 'case-header';
        header.textContent = m.title;
        card.appendChild(header);

        const desc = document.createElement('div');
        desc.className = 'case-desc';
        desc.textContent = m.desc;
        card.appendChild(desc);

        const tagsRow = document.createElement('div');
        tagsRow.className = 'case-tags';
        m.tags.forEach((t, i) => {
          const tag = document.createElement('span');
          tag.className = 'tag ' + (i === 0 ? 'tag-blue' : 'tag-grey');
          tag.textContent = t;
          tagsRow.appendChild(tag);
        });
        if (m.risk) {
          const riskTag = document.createElement('span');
          riskTag.className = 'tag tag-yellow';
          riskTag.textContent = m.risk;
          tagsRow.appendChild(riskTag);
        }
        card.appendChild(tagsRow);

        card.addEventListener('click', () => {
          if (localSelected.has(m.id)) {
            localSelected.delete(m.id);
            card.classList.remove('selected');
          } else {
            localSelected.add(m.id);
            card.classList.add('selected');
          }
        });

        wrap.appendChild(card);
      });

      contentArea.appendChild(wrap);

      const bottom = document.createElement('div');
      bottom.className = 'bottom-actions';
      const nextBtn = document.createElement('button');
      nextBtn.className = 'btn-primary-main';
      nextBtn.textContent = 'Зафиксировать пакет мер';
      nextBtn.addEventListener('click', () => {
        if (localSelected.size === 0) {
          openModal('Пакет мер не выбран', 'Без выбранных мероприятий обсуждать сокращение СЗЗ невозможно. Даже при ограниченном бюджете нужно сформировать хотя бы базовый набор технических решений.', 'Попробуйте выбрать комбинацию мер, которые влияют на химический фактор и не сводятся только к эксплуатационным требованиям.');
          return;
        }
        let score = 0;
        measures.forEach(m => {
          if (localSelected.has(m.id)) score += m.weight;
        });
        if (score >= 4) {
          openModal(
            'Пакет мер ориентирован на санитарный эффект',
            'Вы включили в пакет мероприятия, которые снижают выбросы по ключевым веществам и работают с неорганизованными источниками. Такой набор можно использовать как основу для обоснования сокращения СЗЗ.',
            'На следующем этапе важно, чтобы расчеты и натурные измерения опирались именно на эти реализуемые меры.'
          );
        } else if (score >= 2) {
          openModal(
            'Пакет мер частично решает задачу по СЗЗ',
            'В пакете есть меры, влияющие на химическую нагрузку, но значительная часть решений относится к имиджевым или эксплуатационным. Для устойчивого обоснования СЗЗ их может быть недостаточно.',
            'Подумайте, какие мероприятия с прямым влиянием на выбросы можно добавить или усилить.'
          );
        } else {
          openModal(
            'Пакет мер не фокусируется на санитарном факторе',
            'Вы выбрали в основном меры, связанные с шумом, озеленением или эксплуатацией оборудования. Они полезны, но почти не влияют на концентрации загрязняющих веществ.',
            'Для обсуждения СЗЗ такой пакет воспринимается как вспомогательный и нуждается в пересмотре.'
          );
        }
        answers[step.id] = 'measures'; // фиксируем, что шаг пройден
        queuedNextStepIndex = currentStepIndex + 1;
      });
      bottom.appendChild(nextBtn);

      const restartBtn = document.createElement('button');
      restartBtn.className = 'btn-ghost-small';
      restartBtn.textContent = 'Начать заново';
      restartBtn.addEventListener('click', resetAll);
      bottom.appendChild(restartBtn);

      contentArea.appendChild(bottom);
    }

    function showSummary() {
      // суммарная "оценка" по шагам 1,2,4,5,6 + шаг 3 через его тип
      let score = 0;
      steps.forEach(step => {
        if (step.id === 3) {
          if (answers[3]) {
            // грубо считаем, что если меры зафиксированы, добавляем 1
            score += 1;
          }
          return;
        }
        const optId = answers[step.id];
        if (!optId) return;
        const opt = step.options.find(o => o.id === optId);
        if (opt) score += opt.score;
      });

      let header;
      let text;
      if (score >= 7) {
        header = 'Решения выстроены в устойчивую последовательность';
        text = 'По большинству этапов вы выбрали подходы, которые учитывают и санитарный риск, и ограничения по ресурсам. Такой профиль решений создает основу для защищаемого проекта СЗЗ.';
      } else if (score >= 3) {
        header = 'Основные элементы процесса выстроены, но есть слабые места';
        text = 'Часть решений поддерживает устойчивую логику работы с СЗЗ, однако есть этапы, где выбранные подходы создают дополнительные риски по срокам или качеству обоснования.';
      } else {
        header = 'Процесс по СЗЗ остается фрагментарным';
        text = 'На нескольких этапах выбраны подходы, которые могут привести к дополнительным вопросам со стороны экспертизы и внутренних служб. Требуется переработка стратегии.';
      }

      contentArea.innerHTML = '';
      const h2 = document.createElement('h2');
      h2.textContent = 'Общий разбор по всем этапам';
      contentArea.appendChild(h2);

      const p1 = document.createElement('p');
      p1.textContent = header;
      contentArea.appendChild(p1);

      const p2 = document.createElement('p');
      p2.className = 'muted';
      p2.textContent = text;
      contentArea.appendChild(p2);

      const ul = document.createElement('div');
      ul.className = 'goal-box';
      ul.innerHTML = '<strong>Следующий шаг.</strong> Вы можете вернуться к этапам с наибольшими рисками и попробовать альтернативные решения, чтобы посмотреть, как изменится общий профиль.';
      contentArea.appendChild(ul);

      const bottom = document.createElement('div');
      bottom.className = 'bottom-actions';
      const restartBtn = document.createElement('button');
      restartBtn.className = 'btn-primary-main';
      restartBtn.textContent = 'Пройти кейс заново';
      restartBtn.addEventListener('click', resetAll);
      bottom.appendChild(restartBtn);

      const noopBtn = document.createElement('button');
      noopBtn.className = 'btn-ghost-small';
      noopBtn.textContent = 'Оставить как есть';
      bottom.appendChild(noopBtn);
      contentArea.appendChild(bottom);
    }

    // Инициализация
    renderCurrentStep();
  </script>
</body>
</html>
