<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сортировка ситуаций</title>
<script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/iframe-resizer/4.3.2/iframeResizer.contentWindow.min.js"></script>
<style>
  :root {
    --bg: #fff;
    --card-bg: #f8f9fb;
    --card-hover: #eef1f6;
    --zone-bg: #fafbfc;
    --zone-border: #e5e9f0;
    --yes-color: #2e7d32;
    --no-color: #c42017;
    --accent: #4a5cf0;
    --text: #1a2b49;
    --text-light: #5a6b7c;
    --radius: 10px;
    --shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    background: #fff;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 16px;
    color: var(--text);
    overflow: hidden; /* Prevent body scroll, let iframe resize handle it */
  }
  .container {
    width: 100%;
    max-width: 680px;
    background: var(--bg);
    border-radius: 16px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .header { text-align: center; }
  .header h2 { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
  .header p { font-size: 13px; color: var(--text-light); }
  
  /* Drum */
  .drum-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 8px 0;
    background: #fff;
  }
  .drum {
    width: 340px;
    min-height: 100px;
    background: var(--card-bg);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    box-shadow: var(--shadow);
    border: 2px solid transparent;
    transition: border-color 0.2s;
  }
  .drum.empty { border-color: var(--zone-border); opacity: 0.6; }
  
  .card {
    width: 100%;
    height: 100%;
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    font-size: 13.5px;
    font-weight: 500;
    text-align: center;
    line-height: 1.4;
    cursor: grab;
    user-select: none;
    background: transparent;
  }
  .card:active { cursor: grabbing; }
  .card.placed { cursor: pointer; background: transparent; font-weight: 600; }
  .card.correct { color: var(--yes-color); border: 1px solid var(--yes-color); border-radius: 6px; background: rgba(46, 125, 50, 0.05); }
  .card.wrong { color: var(--no-color); text-decoration: line-through; border: 1px dashed var(--no-color); border-radius: 6px; }
  
  .nav-btn {
    width: 36px; height: 36px;
    border-radius: 50%; border: none;
    background: #eef1f6; color: var(--text);
    font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .nav-btn:hover { background: #e0e4eb; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  
  .progress {
    text-align: center;
    font-size: 12px;
    color: var(--text-light);
    font-weight: 600;
    margin-top: -8px;
  }
  
  /* Zones */
  .drop-zones {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    flex: 1;
    min-height: 240px; /* Fixed space for zones */
  }
  .zone {
    background: var(--zone-bg);
    border-radius: var(--radius);
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    border: 2px dashed var(--zone-border);
    transition: border-color 0.2s, background 0.2s;
    min-height: 100%;
  }
  .zone.drag-over { border-color: var(--accent); background: #f0f4ff; }
  .zone-title {
    font-size: 12px;
    font-weight: 700;
    text-align: center;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--zone-border);
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .zone-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
    overflow-y: auto; /* Only if content overflows, but min-height handles most */
  }
  
  /* Controls */
  .controls {
    display: flex;
    justify-content: center;
    gap: 12px;
    padding-top: 4px;
    margin-bottom: 10px; /* Extra space below to prevent cut-off */
  }
  .btn {
    padding: 10px 24px;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    z-index: 10;
    position: relative;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #3b4bd6; }
  .btn-secondary { background: #eef1f6; color: var(--text); display: none; }
  .btn-secondary.active { display: block; }
  .btn-secondary:hover { background: #e0e4eb; }
  
  .feedback {
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    min-height: 20px;
    color: var(--text);
  }
  .feedback.success { color: var(--yes-color); }
  .feedback.error { color: var(--no-color); }
  
  /* Popup */
  .overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.25);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
    z-index: 100; padding: 20px;
  }
  .overlay.active { opacity: 1; pointer-events: auto; }
  .popup {
    background: #fff; border-radius: 14px; padding: 24px;
    max-width: 440px; width: 100%;
    box-shadow: 0 12px 32px rgba(0,0,0,0.15);
    transform: translateY(10px); transition: transform 0.25s;
  }
  .overlay.active .popup { transform: translateY(0); }
  .popup-header {
    display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px;
  }
  .popup-title { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.3; }
  .close-btn {
    background: #f0f2f5; border: none; width: 30px; height: 30px; border-radius: 50%;
    cursor: pointer; font-size: 18px; color: #666; display: flex; align-items: center; justify-content: center;
  }
  .close-btn:hover { background: #e4e6eb; }
  .popup-text { font-size: 13.5px; color: #444; line-height: 1.5; margin-bottom: 14px; }
  .popup-benefit {
    background: #e8f5e9; padding: 12px; border-radius: 8px;
    font-size: 12.5px; color: #2e7d32; border-left: 3px solid #34c759;
  }

  @media (max-width: 600px) {
    .drum { width: 100%; }
    .drop-zones { grid-template-columns: 1fr; min-height: auto; }
    .container { padding: 16px; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h2>Распределите ситуации</h2>
    <p>Перетащите карточку из барабана в нужное поле</p>
  </div>
  
  <div class="drum-wrapper">
    <button class="nav-btn" id="prevBtn" disabled>‹</button>
    <div class="drum" id="drum">
      <div class="card" draggable="true" id="currentCard">Загрузка...</div>
    </div>
    <button class="nav-btn" id="nextBtn">›</button>
  </div>
  
  <div class="progress">Разложено <span id="placedCount">0</span> из <span id="totalCount">12</span> карточек</div>
  
  <div class="drop-zones">
    <div class="zone" id="zoneYes" data-type="yes">
      <div class="zone-title">Требует действий</div>
      <div class="zone-content" id="contentYes"></div>
    </div>
    <div class="zone" id="zoneNo" data-type="no">
      <div class="zone-title">Не требует действий</div>
      <div class="zone-content" id="contentNo"></div>
    </div>
  </div>
  
  <div class="controls">
    <button class="btn btn-primary" id="checkBtn">Проверить</button>
    <button class="btn btn-secondary" id="retryBtn">Пройти заново</button>
  </div>
  
  <div class="feedback" id="feedback"></div>
</div>

<div class="overlay" id="overlay">
  <div class="popup">
    <div class="popup-header">
      <div class="popup-title" id="popupTitle"></div>
      <button class="close-btn" onclick="closePopup()">×</button>
    </div>
    <div class="popup-text" id="popupText"></div>
    <div class="popup-benefit" id="popupBenefit"></div>
  </div>
</div>

<script>
  // Fisher-Yates shuffle
  function shuffle(array) {
    let currentIndex = array.length, randomIndex;
    while (currentIndex != 0) {
      randomIndex = Math.floor(Math.random() * currentIndex);
      currentIndex--;
      [array[currentIndex], array[randomIndex]] = [
        array[randomIndex], array[currentIndex]];
    }
    return array;
  }

  const initialSituations = [
    { id: 1, text: "Сменился юридический адрес предприятия", correct: "yes" },
    { id: 2, text: "Открылся новый цех по переработке", correct: "yes" },
    { id: 3, text: "Вышло новое постановление о нормативах утилизации", correct: "yes" },
    { id: 4, text: "Реорганизация: ООО присоединило другое общество", correct: "yes" },
    { id: 5, text: "Закупили новое сырьё с другими характеристиками", correct: "yes" },
    { id: 6, text: "Изменился фактический адрес площадки НВОС", correct: "yes" },
    { id: 7, text: "Сменился генеральный директор", correct: "no" },
    { id: 8, text: "Изменился телефон бухгалтерии", correct: "no" },
    { id: 9, text: "Поменялась вывеска на здании", correct: "no" },
    { id: 10, text: "Сменился цвет упаковки товара", correct: "no" },
    { id: 11, text: "Перевели сотрудников на удалёнку", correct: "no" },
    { id: 12, text: "Обновили компьютеры в офисе", correct: "no" }
  ];

  const explanations = {
    1: { title: "Сменился юридический адрес", text: "Адрес указан в реестре НВОС, ДВОС, КЭР, инвентаризациях. При смене нужно актуализировать сведения.", benefit: "Польза: вы избежите штрафа 50–100 тыс. ₽ за недостоверные сведения в реестре [ч. 1 ст. 8.46 КоАП РФ]." },
    2: { title: "Открылся новый цех", text: "Новый цех – это новые источники выбросов, отходы, сбросы. Требуется инвентаризация, обновление НДВ, ПЭК.", benefit: "Польза: вы вовремя включите новые источники в отчётность и не получите предписание за неучтённые выбросы." },
    3: { title: "Новое постановление об утилизации", text: "Изменения в нормативке влияют на ставки экосбора, перечень товаров под РОП, сроки сдачи отчётности.", benefit: "Польза: вы не пропустите новые требования и не переплатите экосбор или штраф." },
    4: { title: "Реорганизация", text: "При реорганизации меняется юрлицо. Нужно переоформить КЭР, ДВОС, актуализировать реестр НВОС.", benefit: "Польза: вы сохраните легитимность разрешений и избежите приостановки деятельности." },
    5: { title: "Новое сырьё", text: "Новое сырьё может изменить состав выбросов, отходов, технологические нормативы. Требуется пересчёт НДВ, обновление ПЭК.", benefit: "Польза: вы предотвратите превышение нормативов и штраф за нарушение условий разрешения." },
    6: { title: "Сменился фактический адрес площадки НВОС", text: "Фактический адрес привязан к координатам объекта в реестре НВОС. Изменение требует актуализации.", benefit: "Польза: вы избежите штрафа за недостоверные координаты объекта [п. 6, п. 7 ст. 69.2 Закона № 7-ФЗ]." },
    7: { title: "Сменился гендиректор", text: "Смена руководителя не влияет на объекты НВОС и разрешительную документацию. Данные в ЕГРЮЛ обновляются автоматически.", benefit: "Польза: вы не тратите время на лишние действия и фокусируетесь на реальных изменениях." },
    8: { title: "Изменился телефон бухгалтерии", text: "Контактные данные не влияют на экологическую документацию. Обновляются внутри компании по мере необходимости.", benefit: "Польза: вы экономите время и не отвлекаетесь на несущественные изменения." },
    9: { title: "Поменялась вывеска", text: "Вывеска – элемент брендинга, не влияет на разрешительную документацию и отчётность.", benefit: "Польза: вы не тратите ресурсы на переоформление документов, которые не требуют изменений." },
    10: { title: "Сменился цвет упаковки", text: "Цвет упаковки не меняет её класс опасности, состав или нормативы утилизации по РОП.", benefit: "Польза: вы не включаете в отчётность лишние позиции и не переплачиваете экосбор." },
    11: { title: "Перевод на удалёнку", text: "Формат работы сотрудников не влияет на объекты НВОС, выбросы, отходы или разрешительную документацию.", benefit: "Польза: вы фокусируетесь на производственных изменениях, которые действительно влияют на экологию." },
    12: { title: "Обновили компьютеры", text: "Замена офисной техники не создаёт новых источников выбросов или отходов, требующих учёта в экологической документации.", benefit: "Польза: вы не включаете в инвентаризацию лишние объекты и не усложняете отчётность." }
  };

  let unplaced = shuffle([...initialSituations]);
  let placed = [];
  let currentIndex = 0;
  let isCompleted = false;

  const drum = document.getElementById('drum');
  const currentCard = document.getElementById('currentCard');
  const contentYes = document.getElementById('contentYes');
  const contentNo = document.getElementById('contentNo');
  const placedCount = document.getElementById('placedCount');
  const totalCount = document.getElementById('totalCount');
  const checkBtn = document.getElementById('checkBtn');
  const retryBtn = document.getElementById('retryBtn');
  const feedback = document.getElementById('feedback');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const popupOverlay = document.getElementById('overlay');

  totalCount.textContent = initialSituations.length;

  function renderDrum() {
    if (unplaced.length === 0) {
      drum.classList.add('empty');
      currentCard.textContent = 'Все карточки распределены';
      currentCard.draggable = false;
      currentCard.style.cursor = 'default';
      prevBtn.disabled = true;
      nextBtn.disabled = true;
      return;
    }
    drum.classList.remove('empty');
    currentCard.textContent = unplaced[currentIndex].text;
    currentCard.draggable = !isCompleted;
    currentCard.style.cursor = isCompleted ? 'default' : 'grab';
    prevBtn.disabled = currentIndex === 0;
    nextBtn.disabled = currentIndex === unplaced.length - 1;
  }

  function handleDragStart(e) {
    if (isCompleted) return;
    e.dataTransfer.setData('text/plain', currentIndex.toString());
    e.target.style.opacity = '0.5';
  }

  function handleDragEnd(e) {
    e.target.style.opacity = '1';
  }

  function handleDragOver(e) {
    e.preventDefault();
    e.currentTarget.classList.add('drag-over');
  }

  function handleDragLeave(e) {
    e.currentTarget.classList.remove('drag-over');
  }

  function handleDrop(e) {
    e.preventDefault();
    e.currentTarget.classList.remove('drag-over');
    if (isCompleted) return;

    const idx = parseInt(e.dataTransfer.getData('text/plain'));
    const item = unplaced[idx];
    if (!item) return;

    unplaced.splice(idx, 1);
    // Adjust index if we removed current or before
    if (idx < currentIndex) {
      currentIndex--;
    } else if (idx === currentIndex) {
      // If we dropped the current card, check if we need to move to next or prev
      if (currentIndex >= unplaced.length) {
        currentIndex = unplaced.length - 1;
      }
    }
    
    placed.push({ ...item, zone: e.currentTarget.dataset.type });
    placedCount.textContent = placed.length;

    renderDrum();
    renderPlaced();
    updateFeedback('');
  }

  function renderPlaced() {
    contentYes.innerHTML = '';
    contentNo.innerHTML = '';
    placed.forEach((item) => {
      const el = document.createElement('div');
      el.className = 'card placed';
      el.textContent = item.text;
      el.dataset.id = item.id;
      if (isCompleted) {
        el.classList.add(item.correct === item.zone ? 'correct' : 'wrong');
        el.onclick = () => showPopup(item.id);
      }
      if (item.zone === 'yes') contentYes.appendChild(el);
      else contentNo.appendChild(el);
    });
  }

  function checkAnswers() {
    if (unplaced.length > 0) {
      updateFeedback('Распределите все карточки перед проверкой', 'error');
      return;
    }
    isCompleted = true;
    let allCorrect = true;
    placed.forEach(p => {
      if (p.correct !== p.zone) allCorrect = false;
    });
    
    renderPlaced();
    checkBtn.style.display = 'none';
    retryBtn.classList.add('active');
    
    if (allCorrect) {
      updateFeedback('Верно. Нажмите на любую карточку, чтобы увидеть пояснение.', 'success');
    } else {
      updateFeedback('Есть ошибки. Нажмите «Пройти заново» для новой попытки.', 'error');
    }
  }

  function resetExercise() {
    isCompleted = false;
    placed = [];
    unplaced = shuffle([...initialSituations]);
    currentIndex = 0;
    placedCount.textContent = 0;
    checkBtn.style.display = 'block';
    retryBtn.classList.remove('active');
    updateFeedback('');
    renderDrum();
    renderPlaced();
  }

  function updateFeedback(msg, type) {
    feedback.textContent = msg;
    feedback.className = type || '';
  }

  function showPopup(id) {
    const info = explanations[id];
    if (!info) return;
    document.getElementById('popupTitle').textContent = info.title;
    document.getElementById('popupText').textContent = info.text;
    document.getElementById('popupBenefit').textContent = info.benefit;
    popupOverlay.classList.add('active');
  }

  function closePopup() {
    popupOverlay.classList.remove('active');
  }

  // Event Listeners
  currentCard.addEventListener('dragstart', handleDragStart);
  currentCard.addEventListener('dragend', handleDragEnd);
  
  document.querySelectorAll('.zone').forEach(zone => {
    zone.addEventListener('dragover', handleDragOver);
    zone.addEventListener('dragleave', handleDragLeave);
    zone.addEventListener('drop', handleDrop);
  });

  prevBtn.addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; renderDrum(); } });
  nextBtn.addEventListener('click', () => { if (currentIndex < unplaced.length - 1) { currentIndex++; renderDrum(); } });
  
  checkBtn.addEventListener('click', checkAnswers);
  retryBtn.addEventListener('click', resetExercise);
  
  popupOverlay.addEventListener('click', e => { if (e.target === popupOverlay) closePopup(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closePopup(); });

  // Init
  renderDrum();
</script>
</body>
</html>
