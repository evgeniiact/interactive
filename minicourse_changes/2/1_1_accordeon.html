<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Типы изменений в компании</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#ffffff;
  --surface:#f5fbf7;
  --surface-2:#eef8f2;
  --line:rgba(0,119,96,0.18);
  --line-strong:rgba(0,119,96,0.32);
  --text:#20312b;
  --muted:#5c756c;
  --accent:#007760;
  --accent-2:#19a86e;
  --accent-soft:rgba(25,168,110,0.10);
  --shadow:0 14px 32px rgba(0,119,96,0.12);
  --shadow-strong:0 24px 56px rgba(0,119,96,0.18);
}
*{box-sizing:border-box;}
html,body{
  margin:0;
  padding:0;
  background:#ffffff;
}
body{
  font-family:'Satoshi',Arial,sans-serif;
  color:var(--text);
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
}
#app{
  position:relative;
  width:560px;
  max-width:100%;
  background:var(--bg);
}
.panel{
  padding:24px 22px 26px;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.info-btn{
  position:relative;
  width:100%;
  min-height:96px;
  border:1px solid var(--line);
  border-radius:22px;
  background:
    linear-gradient(180deg,rgba(255,255,255,0.96),rgba(245,251,247,0.98)),
    linear-gradient(135deg,rgba(25,168,110,0.05),rgba(0,119,96,0.08));
  box-shadow:var(--shadow);
  padding:14px 18px 14px 20px;
  text-align:left;
  cursor:pointer;
  transition:transform 180ms ease,box-shadow 180ms ease,border-color 180ms ease,background 180ms ease;
}
.info-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 18px 38px rgba(0,119,96,0.16);
  border-color:var(--line-strong);
}
.info-btn:active{
  transform:translateY(0);
}
.info-btn.active{
  border-color:rgba(0,119,96,0.42);
  background:
    linear-gradient(180deg,rgba(242,252,247,0.98),rgba(232,248,239,0.98)),
    linear-gradient(135deg,rgba(25,168,110,0.08),rgba(0,119,96,0.10));
}
.info-btn::before{
  content:'';
  position:absolute;
  left:0;
  top:12px;
  bottom:12px;
  width:4px;
  border-radius:4px;
  background:linear-gradient(180deg,var(--accent-2),var(--accent));
  opacity:0.85;
}
.btn-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}
.btn-title{
  font-size:16px;
  line-height:1.2;
  font-weight:700;
  color:var(--accent);
}
.btn-icon{
  width:34px;
  height:34px;
  border-radius:999px;
  flex:0 0 auto;
  display:grid;
  place-items:center;
  color:var(--accent);
  background:var(--accent-soft);
  border:1px solid rgba(0,119,96,0.10);
  transition:transform 180ms ease,background 180ms ease;
}
.info-btn.active .btn-icon{
  transform:rotate(45deg);
  background:rgba(25,168,110,0.16);
}
.btn-note{
  margin-top:8px;
  font-size:13px;
  line-height:1.4;
  color:var(--muted);
  max-width:420px;
}
.overlay{
  position:fixed;
  inset:0;
  background:rgba(12,34,28,0.30);
  backdrop-filter:blur(5px);
  display:none;
  align-items:center;
  justify-content:center;
  padding:12px;
}
.overlay.open{
  display:flex;
  animation:fadeIn 180ms ease;
}
.popup{
  width:100%;
  max-width:528px;
  max-height:90vh;
  background:#ffffff;
  border:1px solid rgba(0,119,96,0.18);
  border-radius:26px;
  box-shadow:var(--shadow-strong);
  padding:18px 20px 16px;
  position:relative;
  display:flex;
  flex-direction:column;
  animation:riseIn 220ms.ease;
}
.popup-close{
  position:absolute;
  right:16px;
  top:16px;
  width:34px;
  height:34px;
  border:1px solid rgba(0,119,96,0.14);
  border-radius:999px;
  background:#ffffff;
  color:var(--accent);
  font-size:18px;
  line-height:1;
  cursor:pointer;
}
.popup-kicker{
  display:inline-flex;
  align-items:center;
  gap:8px;
  width:fit-content;
  padding:5px 9px;
  border-radius:999px;
  background:var(--surface);
  color:var(--muted);
  font-size:11px;
  font-weight:600;
  letter-spacing:0.01em;
  text-transform:uppercase;
}
.popup-kicker::before{
  content:'';
  width:7px;
  height:7px;
  border-radius:999px;
  background:linear-gradient(180deg,var(--accent-2),var(--accent));
}
.popup-header-row{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:10px;
  padding-right:42px;
  margin-top:10px;
}
.popup-title{
  margin:0;
  font-size:18px;
  line-height:1.25;
  font-weight:700;
  color:var(--accent);
}
.popup-body{
  margin-top:10px;
  font-size:14px;
  line-height:1.5;
  color:var(--text);
  overflow-y:auto;
  padding-right:4px;
}
.popup-body p{
  margin:0 0 8px;
}
.popup-body p:last-child{
  margin-bottom:0;
}
.popup-risk{
  margin-top:12px;
  padding:10px 12px;
  border-radius:18px;
  background:var(--surface-2);
  border:1px solid rgba(0,119,96,0.10);
}
.popup-risk-title{
  font-size:11px;
  line-height:1.2;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.04em;
  color:var(--muted);
}
.popup-risk-text{
  margin-top:6px;
  font-size:13px;
  line-height:1.45;
  color:var(--text);
}
@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}
@keyframes riseIn{
  from{opacity:0;transform:translateY(14px) scale(0.985);}
  to{opacity:1;transform:translateY(0) scale(1);}
}
</style>
</head>
<body>
<div id="app">
  <div class="panel">
    <button class="info-btn" data-key="name" aria-label="Изменение названия или правовой формы">
      <div class="btn-top">
        <div class="btn-title">Изменение названия или формы</div>
        <div class="btn-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M9 3V15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M3 9H15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
      <div class="btn-note">Меняется наименование или форма, но ОГРН и ИНН те же.</div>
    </button>

    <button class="info-btn" data-key="legal" aria-label="Смена юридического адреса">
      <div class="btn-top">
        <div class="btn-title">Смена юридического адреса</div>
        <div class="btn-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M9 3V15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M3 9H15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
      <div class="btn-note">Меняется адрес регистрации юрлица. Площадка может не меняться.</div>
    </button>

    <button class="info-btn" data-key="fact" aria-label="Смена фактического адреса объекта">
      <div class="btn-top">
        <div class="btn-title">Смена фактического адреса объекта</div>
        <div class="btn-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M9 3V15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M3 9H15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
      <div class="btn-note">Объект переезжает. Меняются координаты и адрес площадки.</div>
    </button>

    <button class="info-btn" data-key="owner" aria-label="Смена собственника или реорганизация">
      <div class="btn-top">
        <div class="btn-title">Смена собственника или реорганизация</div>
        <div class="btn-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M9 3V15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M3 9H15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
      <div class="btn-note">Меняется собственник или структура группы. Оператор может смениться.</div>
    </button>
  </div>

  <div class="overlay" id="overlay" aria-hidden="true">
    <div class="popup" role="dialog" aria-modal="true" aria-labelledby="popup-title">
      <button class="popup-close" id="popupClose" aria-label="Закрыть">×</button>
      <div class="popup-kicker">Разбираем тип изменения</div>
      <div class="popup-header-row">
        <h2 class="popup-title" id="popup-title"></h2>
      </div>
      <div class="popup-body">
        <div class="popup-text" id="popup-text"></div>
        <div class="popup-risk">
          <div class="popup-risk-title">Если неправильно определить тип</div>
          <div class="popup-risk-text" id="popup-risk"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const data={
  name:{
    title:'Изменение названия или правовой формы',
    text:[
      'Компания меняет наименование, бренд или правовую форму. ОГРН и ИНН не меняются.',
      'Для эколога это изменение реквизитов юрлица. Объект НВОС и площадка остаются теми же.'
    ],
    risk:'Если считать это мелочью и не обновить документы, в разрешениях останется старое название. На проверке покажут расхождение с выпиской.'
  },
  legal:{
    title:'Смена юридического адреса',
    text:[
      'Меняется адрес регистрации юрлица в ЕГРЮЛ. Производственная площадка может остаться по прежнему фактическому адресу.',
      'Для эколога это изменение реквизитов. Нужно проверить, где в документах прописан юридический адрес организации.'
    ],
    risk:'Если оставить в разрешениях старый юрадрес, инспектор увидит разные данные в реестрах и документах по объекту.'
  },
  fact:{
    title:'Смена фактического адреса объекта',
    text:[
      'Объект НВОС или площадка реально переезжает. Меняются координаты и фактический адрес.',
      'Это уже другой объект размещения воздействия, даже если юрлицо и реквизиты те же.'
    ],
    risk:'Если работать по разрешениям на старую площадку, при проверке это расценят как деятельность без нужных разрешений.'
  },
  owner:{
    title:'Смена собственника или реорганизация',
    text:[
      'Меняется собственник компании или проводится слияние, разделение, присоединение.',
      'Оператором считается то юрлицо, на которое оформлены разрешения. При реорганизации это юрлицо может смениться.'
    ],
    risk:'Если не проверить, кто теперь оператор и на кого должны быть оформлены документы, часть разрешений и договоров останется за старым контуром.'
  }
};

const buttons=Array.from(document.querySelectorAll('.info-btn'));
const overlay=document.getElementById('overlay');
const popupTitle=document.getElementById('popup-title');
const popupText=document.getElementById('popup-text');
const popupRisk=document.getElementById('popup-risk');
const popupClose=document.getElementById('popupClose');
let activeKey=null;

function closePopup(){
  activeKey=null;
  overlay.classList.remove('open');
  overlay.setAttribute('aria-hidden','true');
  buttons.forEach(btn=>btn.classList.remove('active'));
}
function openPopup(key){
  const item=data[key];
  if(!item)return;
  activeKey=key;
  popupTitle.textContent=item.title;
  popupText.innerHTML=item.text.map(p=>`<p>${p}</p>`).join('');
  popupRisk.textContent=item.risk;
  overlay.classList.add('open');
  overlay.setAttribute('aria-hidden','false');
  buttons.forEach(btn=>{
    btn.classList.toggle('active',btn.dataset.key===key);
  });
}
buttons.forEach(btn=>{
  btn.addEventListener('click',()=>{
    const key=btn.dataset.key;
    if(activeKey===key){
      closePopup();
    }else{
      openPopup(key);
    }
  });
});
popupClose.addEventListener('click',closePopup);
overlay.addEventListener('click',e=>{
  if(e.target===overlay)closePopup();
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closePopup();
});
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/iframe-resizer/4.3.6/iframeResizer.contentWindow.min.js"></script>
</body>
</html>
