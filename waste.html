
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Эко-слайдер: классы опасности — интерактивные карточки-флип</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #fffff 0%, #fffff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            padding: 20px;
        }

        .slider-container {
            width: 700px;
            height: 500px;
            position: relative;
            border-radius: 44px;
            background: rgba(255, 248, 240, 0.3);
            box-shadow: 0 25px 40px -16px rgba(0, 0, 0, 0.35), inset 0 1px 2px rgba(255,255,245,0.7);
            backdrop-filter: blur(2px);
            overflow: hidden;
        }

        .cards-slider {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            border-radius: 44px;
            background: #fef7ed;
            scrollbar-width: thin;
            scrollbar-color: #c9ada1 #f2e0ce;
        }
        .cards-slider::-webkit-scrollbar {
            height: 5px;
        }
        .cards-slider::-webkit-scrollbar-track {
            background: #f2e0ce;
            border-radius: 12px;
            margin: 0 30px;
        }
        .cards-slider::-webkit-scrollbar-thumb {
            background: #b68b7a;
            border-radius: 12px;
        }

        .card {
            flex: 0 0 100%;
            scroll-snap-align: start;
            width: 100%;
            height: 100%;
            padding: 22px 26px 26px 26px;
            display: flex;
            flex-direction: column;
            transition: background 0.25s;
            position: relative;
            overflow-y: auto;
        }
        .card::-webkit-scrollbar {
            width: 4px;
        }
        .card::-webkit-scrollbar-track {
            background: #eedbcb;
            border-radius: 10px;
        }
        .card::-webkit-scrollbar-thumb {
            background: #b48b72;
            border-radius: 10px;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 1.3rem;
            border-bottom: 2px solid rgba(100, 70, 55, 0.2);
            padding-bottom: 12px;
            flex-shrink: 0;
        }
        .class-icon {
            font-size: 2.6rem;
            filter: drop-shadow(2px 3px 4px rgba(0,0,0,0.1));
            background: rgba(255,250,225,0.6);
            width: 58px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            backdrop-filter: blur(2px);
        }
        .card-title {
            font-size: 1.75rem;
            font-weight: 580;
            letter-spacing: -0.3px;
            color: #2d3e3f;
            text-shadow: 0 1px 0 rgba(255,255,230,0.6);
            line-height: 1.2;
        }

        .examples-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px 20px;
            align-content: start;
            margin-top: 6px;
        }

        .flip-card {
            background-color: transparent;
            height: 68px;
            perspective: 1000px;
            cursor: pointer;
        }
        .flip-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
            border-radius: 60px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .flipped .flip-inner {
            transform: rotateY(180deg);
        }
        .flip-front, .flip-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 0 16px;
            gap: 12px;
            background: rgba(255, 250, 240, 0.85);
            backdrop-filter: blur(3px);
            border: 1px solid rgba(210, 180, 140, 0.45);
            box-sizing: border-box;
        }
        .flip-front {
            background: rgba(253, 245, 230, 0.9);
            color: #2b4a3b;
            font-weight: 500;
        }
        .flip-back {
            background: #fef3e4;
            transform: rotateY(180deg);
            font-weight: 500;
            color: #2d4a3e;
            font-size: 0.85rem;
            justify-content: flex-start;
            word-break: break-word;
        }
        .example-icon {
            font-size: 1.6rem;
            min-width: 42px;
            text-align: center;
            filter: drop-shadow(0 1px 1px rgba(0,0,0,0.1));
        }
        .front-text-placeholder {
            font-size: 0.9rem;
            font-weight: 500;
            color: #7b5f4b;
            letter-spacing: 0.3px;
        }

        @media (max-width: 720px) {
            .flip-front, .flip-back {
                padding: 0 10px;
            }
            .example-icon {
                font-size: 1.3rem;
                min-width: 34px;
            }
            .front-text-placeholder {
                font-size: 0.75rem;
            }
            .flip-card {
                height: 60px;
            }
            .card-title {
                font-size: 1.4rem;
            }
        }

        .navigation {
            position: absolute;
            bottom: 16px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 16px;
            z-index: 12;
            background: rgba(245, 235, 220, 0.7);
            backdrop-filter: blur(12px);
            padding: 6px 20px;
            border-radius: 60px;
            width: fit-content;
            margin: 0 auto;
            bottom: 16px;
            pointer-events: auto;
            border: 0.5px solid rgba(255,245,215,0.9);
        }
        .nav-btn {
            background: #f1e3d4;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 60px;
            font-size: 1.8rem;
            font-weight: 400;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: #846b56;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }
        .nav-btn:hover {
            background: #ffe0c4;
            transform: scale(1.02);
            color: #5d3a28;
        }
        .dots {
            position: absolute;
            bottom: 22px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 12px;
            z-index: 11;
            pointer-events: none;
        }
        .dot {
            width: 10px;
            height: 10px;
            background: #c3aa95;
            border-radius: 50%;
            transition: all 0.2s;
            pointer-events: auto;
            cursor: pointer;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .dot.active {
            background: #6f4f3a;
            width: 26px;
            border-radius: 20px;
        }
        .cards-slider {
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body>
<div class="slider-container">
    <div class="cards-slider" id="cardsSlider"></div>
    <div class="navigation">
        <button class="nav-btn" id="prevBtn">←</button>
        <button class="nav-btn" id="nextBtn">→</button>
    </div>
    <div class="dots" id="dotsContainer"></div>
</div>

<script>
    // =======================  ИТОГОВЫЕ ДАННЫЕ (с возвращённой иконкой шин 🚗⚙️) =======================
    const cardsData = [
        {
            classNumber: "I",
            title: "Отходы I класса опасности",
            mainIcon: "☠️⚡",
            examples: [
                { text: "ртутьсодержащие отходы", icon: "💧🌡️" },
                { text: "трансформаторы и конденсаторы на ПХД", icon: "⚡🧪" },
                { text: "стройматериалы с асбестом", icon: "🏚️⚠️" },
                { text: "соли мышьяка", icon: "⚗️💀" },
                { text: "пестициды на основе хлорорганики", icon: "🧪🐛" },
                { text: "концентрированные кислоты и щелочи", icon: "⚗️🔥" }
            ]
        },
        {
            classNumber: "II",
            title: "Отходы II класса опасности",
            mainIcon: "⚠️🔋",
            examples: [
                { text: "автоаккумуляторы свинцовые", icon: "🚗🔋" },
                { text: "смесь жидких пестицидов", icon: "🧪🐛" },
                { text: "семена зерновых, протравленные фунгицидами", icon: "🌾🧴" },
                { text: "кислотные и щелочные электролиты", icon: "🧫⚗️" },
                { text: "гудрон кислый", icon: "🛢️⚠️" },
                { text: "расплав электролита алюминиевого производства", icon: "🏭🔥" }
            ]
        },
        {
            classNumber: "III",
            title: "Отходы III класса опасности",
            mainIcon: "🛢️⚠️",
            examples: [
                { text: "нефтешламы", icon: "🛢️💧" },
                { text: "отходы моющих средств", icon: "🧼🧴" },
                { text: "табачная пыль", icon: "🚬🍂" },
                { text: "свежий куриный помет", icon: "🐔💩" },
                { text: "свежий свиной навоз", icon: "🐷💨" },
                { text: "гербицид на основе диметахлора", icon: "🌿🧪" },
                { text: "покрышки автомобильные", icon: "🚗⚙️" },      // ← ВЕРНУЛ ПРЕЖНЮЮ ИКОНКУ
                { text: "промасленная ветошь", icon: "🧵🛢️" }
            ]
        },
        {
            classNumber: "IV",
            title: "Отходы IV класса опасности",
            mainIcon: "🖥️🗑️",
            examples: [
                { text: "компьютерный монитор", icon: "🖥️📺" },
                { text: "пищевые отходы кухонь", icon: "🍌🍚" },
                { text: "шлам нейтрализации сточных вод", icon: "💧🏭" },
                { text: "мусор от офисных и бытовых помещений", icon: "🗑️📄" },
                { text: "перепревший навоз КРС", icon: "🐄🌿" },
                { text: "пыль газоочистки щебеночная", icon: "🏭🌫️" },
                { text: "навоз конский свежий", icon: "🐎💨" },
                { text: "навоз мелкого рогатого скота свежий", icon: "🐑💨" }
            ]
        },
        {
            classNumber: "V",
            title: "Отходы V класса опасности",
            mainIcon: "♻️🌱",
            examples: [
                { text: "стеклянная тара", icon: "🥃♻️" },
                { text: "офисная бумага", icon: "📄♻️" },
                { text: "древесная стружка", icon: "🌳✨" },
                { text: "семена с истекшим сроком годности", icon: "🌾⏳" },
                { text: "силос", icon: "🌽🥫" },
                { text: "скорлупа яиц", icon: "🥚🐣" },
                { text: "незагрязненная упаковка ПЭТ", icon: "🧴✅" },
                { text: "стебли подсолнечника", icon: "🌻🌿" }
            ]
        }
    ];

    const pastelGradients = [
        "linear-gradient(135deg, #ffe0db 0%, #ffd1c4 100%)",
        "linear-gradient(135deg, #ffe6cf 0%, #ffdbb5 100%)",
        "linear-gradient(135deg, #f9efcf 0%, #f5e2b8 100%)",
        "linear-gradient(135deg, #daf1e4 0%, #c8e6da 100%)",
        "linear-gradient(135deg, #d2eaf5 0%, #c0def0 100%)"
    ];

    const sliderEl = document.getElementById('cardsSlider');
    const dotsContainer = document.getElementById('dotsContainer');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    let currentIndex = 0;
    let totalCards = cardsData.length;

    function buildCards() {
        sliderEl.innerHTML = '';
        cardsData.forEach((card, idx) => {
            const cardDiv = document.createElement('div');
            cardDiv.className = 'card';
            cardDiv.style.background = pastelGradients[idx];
            cardDiv.style.borderRadius = '44px';
            cardDiv.style.boxShadow = 'inset 0 0 0 1px rgba(255,250,210,0.7), 0 4px 12px rgba(0,0,0,0.05)';

            const header = document.createElement('div');
            header.className = 'card-header';
            const iconSpan = document.createElement('div');
            iconSpan.className = 'class-icon';
            iconSpan.innerText = card.mainIcon;
            const titleSpan = document.createElement('div');
            titleSpan.className = 'card-title';
            titleSpan.innerText = card.title;
            header.appendChild(iconSpan);
            header.appendChild(titleSpan);

            const grid = document.createElement('div');
            grid.className = 'examples-grid';

            card.examples.forEach(example => {
                const flipContainer = document.createElement('div');
                flipContainer.className = 'flip-card';
                const flipInner = document.createElement('div');
                flipInner.className = 'flip-inner';

                const front = document.createElement('div');
                front.className = 'flip-front';
                const iconElem = document.createElement('span');
                iconElem.className = 'example-icon';
                iconElem.innerText = example.icon;
                const textHint = document.createElement('span');
                textHint.className = 'front-text-placeholder';
                textHint.innerText = '👆 нажми';
                front.appendChild(iconElem);
                front.appendChild(textHint);

                const back = document.createElement('div');
                back.className = 'flip-back';
                const backIcon = document.createElement('span');
                backIcon.className = 'example-icon';
                backIcon.innerText = example.icon;
                const backText = document.createElement('span');
                backText.innerText = example.text;
                backText.style.flex = '1';
                backText.style.textAlign = 'left';
                back.appendChild(backIcon);
                back.appendChild(backText);

                flipInner.appendChild(front);
                flipInner.appendChild(back);
                flipContainer.appendChild(flipInner);

                flipContainer.addEventListener('click', (e) => {
                    e.stopPropagation();
                    flipContainer.classList.toggle('flipped');
                });

                grid.appendChild(flipContainer);
            });

            cardDiv.appendChild(header);
            cardDiv.appendChild(grid);
            sliderEl.appendChild(cardDiv);
        });
    }

    function buildDots() {
        dotsContainer.innerHTML = '';
        for (let i = 0; i < totalCards; i++) {
            const dot = document.createElement('div');
            dot.classList.add('dot');
            if (i === currentIndex) dot.classList.add('active');
            dot.addEventListener('click', () => scrollToCard(i));
            dotsContainer.appendChild(dot);
        }
    }

    function scrollToCard(index) {
        if (index < 0) index = 0;
        if (index >= totalCards) index = totalCards - 1;
        const cardWidth = sliderEl.clientWidth;
        if (cardWidth === 0) return;
        sliderEl.scrollTo({ left: cardWidth * index, behavior: 'smooth' });
        currentIndex = index;
        updateDotsActive();
    }

    function updateDotsActive() {
        const dots = document.querySelectorAll('.dot');
        dots.forEach((dot, idx) => {
            if (idx === currentIndex) dot.classList.add('active');
            else dot.classList.remove('active');
        });
    }

    function syncIndexFromScroll() {
        const scrollLeft = sliderEl.scrollLeft;
        const cardWidth = sliderEl.clientWidth;
        if (cardWidth === 0) return;
        const newIndex = Math.round(scrollLeft / cardWidth);
        if (newIndex !== currentIndex && newIndex >= 0 && newIndex < totalCards) {
            currentIndex = newIndex;
            updateDotsActive();
        }
    }

    function nextCard() { currentIndex < totalCards - 1 ? scrollToCard(currentIndex + 1) : scrollToCard(totalCards - 1); }
    function prevCard() { currentIndex > 0 ? scrollToCard(currentIndex - 1) : scrollToCard(0); }

    function init() {
        buildCards();
        buildDots();
        setTimeout(() => {
            sliderEl.scrollLeft = 0;
            currentIndex = 0;
            updateDotsActive();
            syncIndexFromScroll();
        }, 30);
        let scrollTimeout;
        sliderEl.addEventListener('scroll', () => {
            if (scrollTimeout) clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => syncIndexFromScroll(), 20);
        });
        sliderEl.addEventListener('scrollend', () => syncIndexFromScroll());
        sliderEl.addEventListener('touchend', () => setTimeout(() => syncIndexFromScroll(), 40));
        prevBtn.addEventListener('click', prevCard);
        nextBtn.addEventListener('click', nextCard);
        window.addEventListener('resize', () => setTimeout(() => { if (sliderEl.clientWidth > 0) scrollToCard(currentIndex); }, 80));
    }

    init();

    const extra = document.createElement('style');
    extra.textContent = `
        .flip-card {
            transition: transform 0.1s;
        }
        .flip-card:hover {
            transform: scale(1.01);
        }
        .flip-front, .flip-back {
            transition: all 0.2s;
        }
        .card {
            scrollbar-width: thin;
        }
        .example-icon {
            font-size: 1.7rem;
        }
        .front-text-placeholder {
            font-size: 0.8rem;
            opacity: 0.7;
        }
        .flip-back {
            font-size: 0.82rem;
            line-height: 1.3;
            font-weight: 520;
        }
        @media (max-width: 650px) {
            .flip-back {
                font-size: 0.7rem;
            }
            .example-icon {
                font-size: 1.3rem;
                min-width: 32px;
            }
        }
    `;
    document.head.appendChild(extra);
</script>
</body>
</html>
